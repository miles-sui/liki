# Mingli API server + Caddy (TLS).
# Build:  docker compose -f deploy/mingli/docker-compose.yml build
# Start:  docker compose -f deploy/mingli/docker-compose.yml up -d
# Domain: set DOMAIN env var (default: localhost)

services:
  mingli:
    image: 25types-mingli:latest
    build:
      context: ../..
      dockerfile: deploy/mingli/Dockerfile
    expose: ["8080"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: 25types-caddy:latest
    build:
      context: ../..
      dockerfile: deploy/caddy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      mingli:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  caddy_data:
