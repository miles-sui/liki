# LingJi — AI Chinese Metaphysics Service
# Build:  docker compose -f deploy/lingji/docker-compose.yml build
# Start:  docker compose -f deploy/lingji/docker-compose.yml up -d

services:
  lingji:
    image: lingji:latest
    build:
      context: ../..
      dockerfile: deploy/lingji/Dockerfile
    expose: ["8080"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LISTEN_ADDR=:8080
      - DB_PATH=/var/lib/lingji/lingji.db
      - PDF_DIR=/var/lib/lingji/pdfs
      - RETURN_URL=${RETURN_URL}
    volumes:
      - lingji_data:/var/lib/lingji
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2'

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-liki.hk}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web_data:/srv/web:ro
      - caddy_data:/data
    depends_on:
      lingji:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  lingji_data:
  caddy_data:
  web_data:
