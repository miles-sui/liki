# Liki — AI Chinese Metaphysics Service
# Build:  docker compose -f deploy/liki/docker-compose.yml build
# Start:  docker compose -f deploy/liki/docker-compose.yml up -d

services:
  liki:
    image: liki:latest
    build:
      context: ../..
      dockerfile: deploy/liki/Dockerfile
    expose: ["8080"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LISTEN_ADDR=:8080
      - DB_PATH=/var/lib/liki/liki.db
    volumes:
      - liki_data:/var/lib/liki
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2'

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-liki.hk}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web_data:/srv/web:ro
      - caddy_data:/data
    depends_on:
      liki:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  liki_data:
    name: liki_data
  caddy_data:
  web_data:
    name: liki_web_data
