# 25types — Docker Compose (Production)
# Uses the SAME Caddyfile as dev. Only env vars differ.
# Build: docker compose -f deploy/docker-compose.prod.yml build
# Deploy: scripts/deploy.sh

services:
  backend:
    image: 25types-backend:latest
    build:
      context: ../..
      dockerfile: deploy/app/Dockerfile
    expose: ["8080"]
    restart: unless-stopped
    volumes:
      - ./db:/var/lib/25types
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET required}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-resend}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - DODO_API_KEY=${DODO_API_KEY:-}
      - DODO_WEBHOOK_KEY=${DODO_WEBHOOK_KEY:-}
      - DODO_TEST_MODE=${DODO_TEST_MODE:-1}
      - DODO_PRODUCT_DONATION=${DODO_PRODUCT_DONATION:-}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID:-}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY:-}
      - TENCENT_REGION=${TENCENT_REGION:-ap-hongkong}
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: 25types-caddy:latest
    build:
      context: ../..
      dockerfile: deploy/caddy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=25types.com
      - CF_API_TOKEN=${CF_API_TOKEN:?CF_API_TOKEN required for SSL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./routes:/etc/caddy/routes:ro
      - ./static_routes:/etc/caddy/static_routes:ro
      - caddy_data:/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  caddy_data:
