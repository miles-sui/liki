# 25types — Docker Compose (Development)
# Same Caddyfile as production, same build, same routing.
# Start: docker compose -f deploy/docker-compose.yml up --build
# Or:    bash scripts/dev.sh

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/app/Dockerfile
    expose: ["8080"]
    restart: unless-stopped
    volumes:
      - ../../data:/var/lib/25types
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID:-}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY:-}
      - TENCENT_REGION=${TENCENT_REGION:-ap-hongkong}
      - EMAIL_FROM=${EMAIL_FROM:-}
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 1s

  caddy:
    build:
      context: ../..
      dockerfile: deploy/caddy/Dockerfile
    ports: ["8080:80"]
    environment:
      - DOMAIN=localhost
      - CF_API_TOKEN=${CF_API_TOKEN:-}
    volumes:
      - ../caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ../caddy/routes:/etc/caddy/routes:ro
      - ../caddy/static_routes:/etc/caddy/static_routes:ro
      - ../../web/dist:/app/frontend/dist:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
