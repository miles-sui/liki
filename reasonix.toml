default_model = "deepseek/deepseek-v4-flash"
[permissions]
allow = ["Bash(curl -s:*)", "Bash(curl -s -D - -o /dev/null https://liki.hk/ | head -20)", "Bash(curl -s -D - -o /dev/null https://liki.hk/zh-Hans/ 2>&1 | head -20)", "Bash(# Test JSON-RPC bazi.chart\ncurl -s -X POST https://liki.hk/jsonrpc \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"bazi.chart\",\"params\":{\"birth\":{\"time\":\"1984-02-04T18:30:00+08:00\",\"longitude\":116.4},\"gender\":\"male\"}}' | python3 -m json.tool 2>/dev/null | head -30)", "Bash(# Test rpc.discover\ncurl -s -X POST https://liki.hk/jsonrpc \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"rpc.discover\",\"params\":{}}' | python3 -c \"import sys,json; d=json.load(sys.stdin); print('methods:', len(d.get('result',{}).get('methods',[])))\" 2>/dev/null)", "Bash(# Check favicon\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/favicon.svg)", "Bash(# Check og-image\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/img/og-image.png)", "Bash(# Check i18n files\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/i18n/zh-Hans.json\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/i18n/zh-Hant.json\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/i18n/en.json)", "Bash(# Check locale redirects\ncurl -s -o /dev/null -w '%{http_code} -> %{redirect_url}' https://liki.hk/zh-Hans\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} -> %{redirect_url}' https://liki.hk/zh\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} -> %{redirect_url}' https://liki.hk/zh/about\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} -> %{redirect_url}' https://liki.hk/en\necho \"\")", "Bash(# Check wiki pages\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/wiki/zh-hans/how-to-choose-a-good-name.html\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/wiki/zh-hant/how-to-choose-a-good-name.html\necho \"\"\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/wiki/en/how-to-choose-a-good-name.html)", "Bash(# Check for common issues - test a non-existent page\ncurl -s -o /dev/null -w '%{http_code}' https://liki.hk/nonexistent-page\necho \"\"\ncurl -s -o /dev/null -w '%{http_code}' https://liki.hk/zh-Hans/nonexistent)", "Bash(# Check the skills directory - is it publicly accessible?\ncurl -s -o /dev/null -w '%{http_code} %{size_download}' https://liki.hk/skills/liki.md)", "Bash(# Check llms.txt\ncurl -s https://liki.hk/llms.txt)", "Bash(# Check 404 for non-existent paths\ncurl -s -o /dev/null -w '%{http_code}' https://liki.hk/zh-Hans/api/nonexistent)", "parallel_tasks", "Edit", "Bash(cd /home/sq/wsp/liki && go vet ./internal/http/ ./internal/engine/ziwei/ 2>&1)", "Bash(cd /home/sq/wsp/liki && go build ./cmd/liki/ 2>&1)", "Bash(grep -r \"i18n\\.js\" /home/sq/wsp/liki/web/*.html /home/sq/wsp/liki/web/js/*.js 2>/dev/null || echo \"no references found\")", "Bash(cd /home/sq/wsp/liki && git diff --stat)", "Bash(cd /home/sq/wsp/liki && git diff)", "Bash(cd /home/sq/wsp/liki && go test ./internal/http/ ./internal/engine/ziwei/ 2>&1 | tail -5)", "Bash(rm /home/sq/wsp/liki/web/js/i18n.js && echo \"deleted i18n.js\")", "Bash(cd /home/sq/wsp/liki && go build ./cmd/liki/ 2>&1 && echo \"build ok\")", "Bash(cd /home/sq/wsp/liki && go test ./internal/http/ ./internal/engine/ziwei/ 2>&1 | tail -3)", "Bash(cd /home/sq/wsp/liki/web && npx vitest run js/__tests__/i18n.test.js 2>&1 | tail -15)", "Bash(cd /home/sq/wsp/liki && git diff web/css/app.css)", "Bash(cd /home/sq/wsp/liki/web && npx vitest run js/__tests__/ 2>&1 | tail -10)", "Bash(cd /home/sq/wsp/liki && go build ./cmd/liki/ 2>&1 && echo ok)", "Bash(cd /home/sq/wsp/liki && git add -A && git commit -m \"修复: 移除起名评分相关误导性描述\n\n- tools.json: 起名单名评分 → 起名单名评价分析\n- agent-architecture.md: 候选名列表→综合评分排序 → 单个名字→八字五行五格音韵分析\n- report.spec.js: 删除不存在的 score:95 mock 字段\n\n系统不做评分，只做基于命理的分析评价\" && git push 2>&1)"]
[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }

[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash", "deepseek-v4-pro"]
default     = "deepseek-v4-flash"
