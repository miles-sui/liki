# Fivefold Types Questionnaire — 简体中文（中国文化适应版）
# 25types — 标准自评量表。
# 三元自由选：每题 3 个选项，选符合的任意个（0–3 个）。
# 6 轮 × 5 题 = 30 题。轮内元素平衡：每元素出场 3 次。
# 全局：每对元素恰好 9 次同题比较。
# 题目 ID（Q01-Q30）是所有语言版本共享的规范键值。
# 评分：每次选中 = 1 分，等权重。

meta:
  version: "4.0"
  language: zh-CN
  response_mode: free-choice
  description: >
    Fivefold Types 将人格评估为基于三元自由选得出的 5D 形状向量 d（Σd=0）。
    结果按峰值模式归类为 25 种身份类别。共 30 题，分 6 轮，每轮 5 题。
    每题 3 个行为选项——选符合的任意个（0–3 个，各计 1 分）。
    每个选项对应一个五行元素。

rounds:
  # ===================================================================
  # Round 1: Daily Life & Routines
  # Triads: {W,F,E} {W,M,R} {F,E,M} {W,F,R} {E,M,R}
  # ===================================================================
  - id: R01
    questions:
      - id: Q01
        text: >
          想象一个完全自由的周末——没有安排，没有必须做的事，时间完全属于你。
          你实际上做了什么？
        options:
          - { text: "出去活动——探索、运动、尝试新体验", element: W }
          - { text: "与人连接——约朋友见面、参加聚会、一起度过时光", element: F }
          - { text: "打理空间和日常——照顾家里、身边的人、日常事务", element: E }

      - id: Q02
        text: >
          你决定学一个新东西——一门语言、一种乐器、一项手艺。
          第一个星期实际上是什么样的？
        options:
          - { text: "直接上手试，从做中学，不怕犯错", element: W }
          - { text: "先快速判断哪些资源靠谱、哪些是噪音——筛选出最好的，建一条高效路径", element: M }
          - { text: "不急于定计划——广泛吸收，让领域的大图自己浮现，让知识自然连接起来", element: R }

      - id: Q03
        text: >
          一个新人加入了你的团队、班级或社交圈。
          在最初几周里，你自然地扮演了什么角色？
        options:
          - { text: "以温暖的存在辐射全场——不用特意关照，你周围的空间已经让人安心，对方自然就松下来了", element: F }
          - { text: "做一个稳定、可接近的存在，对方可以向你靠拢", element: E }
          - { text: "帮助对方理解这里的运作方式——规则、规范、潜藏的模式", element: M }

      - id: Q04
        text: >
          你在一个认识大约一半人的场合——饭局、聚会、同事联谊。你不是主人。
          你通常会以什么状态出现？
        options:
          - { text: "让场子动起来——提议一个活动、开一个新话题、把氛围带起来", element: W }
          - { text: "你的在场让整个房间的温度自然变化——不用挨个去连接，人们会自己聚拢到你周围的暖区", element: F }
          - { text: "主动寻找有深度的对话——人少一些，交流更扎实", element: R }

      - id: Q05
        text: >
          看看你的物理环境——书桌、房间、生活空间。
          哪个描述最接近事实而非理想？
        options:
          - { text: "总体来说有序且让人感到踏实——不算一尘不染但安稳舒适", element: E }
          - { text: "有清晰的系统——每样东西有它的位置，井井有条", element: M }
          - { text: "简洁安静——只留重要的东西，不堆积多余之物", element: R }

  # ===================================================================
  # Round 2: Work & Decisions
  # Triads: {W,F,M} {W,E,R} {F,E,R} {W,E,M} {F,M,R}
  # ===================================================================
  - id: R02
    questions:
      - id: Q06
        text: >
          想想你通常怎么开始一个工作日或学习时段——坐下来后的头半小时，
          在查邮件、开会、被人打扰之前。那段时间里你实际上做了什么？
        options:
          - { text: "直接开始做最重要的一件事，马上动起来", element: W }
          - { text: "先感受整个空间的能量——让氛围自己沉下来，不必挨个触碰", element: F }
          - { text: "快速梳理今日待办并排出优先级再动手", element: M }

      - id: Q07
        text: >
          你正在推进一件重要的事，突然冒出一个意外障碍，原计划行不通了。
          意识到这一点之后的最初几分钟，内心发生了什么？
        options:
          - { text: "立刻寻找替代方案并转向，继续推进", element: W }
          - { text: "先稳住手头还能做的事，把能控的部分接住，不让局面继续散掉", element: E }
          - { text: "退出来重新理解局面——到底发生了什么，什么才是真正关键的下一步", element: R }

      - id: Q08
        text: >
          在你关心的群体里出现了真正的意见分歧——不是吵架，
          而是在重要事情上有不同的真实看法。你的本能第一反应是什么？
        options:
          - { text: "关注每个人的感受，先修复连接再解决问题", element: F }
          - { text: "把讨论锚回共同目标——不让分歧撕裂关系，确保沟通不散架", element: E }
          - { text: "退一步找出分歧背后各自没说出口的预设，先让大家看清楚真正的分歧在哪", element: R }

      - id: Q09
        text: >
          你需要买一件中等价格的物品——一件家具、一台设备，
          会在日常生活中使用一段时间的。你怎么做决定？
        options:
          - { text: "快速凭感觉决定然后继续——不值得花太多时间", element: W }
          - { text: "慢慢来不着急——等到合适的时机和合适的东西", element: E }
          - { text: "系统性地研究规格和对比，确保买到最优选择", element: M }

      - id: Q10
        text: >
          一个和你密切共事的同事或队友明显在挣扎——错过截止日期、比平时沉默。
          你不是他们的上级。你的第一直觉是什么？
        options:
          - { text: "全然在场——不给方案、不拉距离，只是安静而确定地让对方感到被一种温度托着", element: F }
          - { text: "给出具体可行的改进建议，帮对方理清思路", element: M }
          - { text: "给对方空间，同时让对方知道你随时可以倾听", element: R }

  # ===================================================================
  # Round 3: Social Dynamics & Pressure
  # Triads: {W,E,R} {F,E,M} {W,F,R} {W,F,M} {E,M,R}
  # ===================================================================
  - id: R03
    questions:
      - id: Q11
        text: >
          你注意到身体有一处持续的不适——不算严重，但它一直在那里，
          没有自己消失。你的第一反应是什么？
        options:
          - { text: "立刻采取行动——改变作息、尝试调理、现在就做点什么", element: W }
          - { text: "给它稳定的关注——温和调整，相信身体的节奏会自己找到平衡", element: E }
          - { text: "退一步追溯它的来龙去脉——先弄清楚它和什么有关，再决定怎么做", element: R }

      - id: Q12
        text: >
          你在教一个人做一件你很擅长的事——把你熟悉的技能传授给新手。
          你的教学风格自然是什么样的？
        options:
          - { text: "鼓励和带动——专注于让对方感到有能力和兴奋去学", element: F }
          - { text: "耐心而稳定——让对方按自己的节奏学，没有压力", element: E }
          - { text: "系统地拆解——清晰步骤、及早纠错、打好扎实基础", element: M }

      - id: Q13
        text: >
          你外出回来发现积压了一大堆——几十条未读消息、邮件或通知。
          你怎么处理？
        options:
          - { text: "一头扎进去快速清理，迅速消掉积压", element: W }
          - { text: "先找需要回复的人，处理好关系相关的优先事项", element: F }
          - { text: "退一步想清楚哪些真正需要你的关注，再动手", element: R }

      - id: Q14
        text: >
          你的团队或小组刚刚取得了重要成就——里程碑达成、获得认可。
          你如何自然地参与到那个时刻中？
        options:
          - { text: "你是那个把大家召集起来一起庆祝的人", element: W }
          - { text: "你对每个人的贡献表达真诚的温暖和欣赏", element: F }
          - { text: "你具体指出哪些方面做得好、哪些关键因素带来了成功", element: M }

      - id: Q15
        text: >
          你处于一段漫长的模糊期——等待一个无法控制的结果，没有明确的时间表。
          在这段悬而未决中，你的哪种倾向最突出？
        options:
          - { text: "照常过日子——保持日常节奏和手头的事，让踏实感从行动中长出来", element: E }
          - { text: "预案——描绘各种情形并为每种可能做准备", element: M }
          - { text: "转向内心——反复琢磨这件事的意义，在不确定中找到属于自己的一份理解", element: R }

  # ===================================================================
  # Round 4: Creation & Challenge
  # Triads: {W,M,R} {F,E,M} {W,F,E} {F,M,R} {W,E,R}
  # ===================================================================
  - id: R04
    questions:
      - id: Q16
        text: >
          你有一个空闲的下午来做一项个人的创造性活动——写作、制作、设计、
          建造属于你自己的东西。你怎么着手？
        options:
          - { text: "立刻开始动手，让创作本身告诉我该往哪里去", element: W }
          - { text: "先定标准——想好什么才算好，精准执行。标准本身有问题时，你也是那个敢推倒重设的人", element: M }
          - { text: "让想法孕育——从多个角度触碰它，不急于锁定方向，直到灵感自己凝聚成形", element: R }

      - id: Q17
        text: >
          回想你最近参与的几个团队——工作项目、志愿活动、学习小组都算。
          几次碰头之后，别人开始默默期待你承担什么角色？
        options:
          - { text: "凝聚者——关心每个人的感受，为团队带来温度和凝聚力", element: F }
          - { text: "稳定器——提供可靠的支持，让大家感到踏实和安全", element: E }
          - { text: "把关者——确保质量、及早发现问题、维持标准", element: M }

      - id: Q18
        text: >
          你刚搬到一个新社区或新地方。这是你的第一个月。
          你如何安顿下来？
        options:
          - { text: "主动探索——找到最好的店铺、走过每条街、在心里画出地图", element: W }
          - { text: "让自己的存在被自然感知——多在社区出现，让连接自己发生，不是刻意去建立", element: F }
          - { text: "建立日常节奏，让空间有家的感觉——按自己的步调慢慢融入", element: E }

      - id: Q19
        text: >
          有人在众人面前给你尖锐的批评反馈。很刺耳，而且至少部分不公平。
          在你还没来得及思考之前，你的本能反应是什么？
        options:
          - { text: "直接处理这个局面——说出刚才发生了什么，清理空气，让关系回到正轨", element: F }
          - { text: "问澄清性问题以确切理解对方在说什么以及为什么", element: M }
          - { text: "全盘吸收后再回应——不带情绪，给出有深度和视角的反馈", element: R }

      - id: Q20
        text: >
          你面临一个利害攸关的决定——没有明显正确的答案，
          后果会在几个月中逐渐显现。你实际上是怎么一步步做出决定的？
        options:
          - { text: "快速排出感觉最好的选项，选定后立即执行", element: W }
          - { text: "把每个选项落到实际中去检验——试运行、收集具体信息，让真实的反馈帮我决定", element: E }
          - { text: "从所有喧嚣中退出来独处——让内心深处的直觉告诉我哪个方向是对的", element: R }

  # ===================================================================
  # Round 5: Rhythms & Responses
  # Triads: {W,E,M} {F,E,R} {W,F,M} {E,M,R} {W,F,R}
  # ===================================================================
  - id: R05
    questions:
      - id: Q21
        text: >
          回想你典型的早晨——从醒来到出门或坐下开始的第一个小时。
          那段时间实际上是什么样的？
        options:
          - { text: "立刻起床开始行动，快速进入状态，不拖延", element: W }
          - { text: "按熟悉的节奏从容度过，不慌不忙", element: E }
          - { text: "在脑中整理好一天的计划，有条理有意识地开始", element: M }

      - id: Q22
        text: >
          漫长紧张的一周之后，你终于有一个晚上没有任何人对你有要求。
          你需要充电。你会做什么？
        options:
          - { text: "和亲近的人待在同一空间——不一定说话，共处本身就在充电", element: F }
          - { text: "恢复周围的秩序——收拾整理、赶上生活维护的进度", element: E }
          - { text: "沉浸在安静的独处中——阅读、反思、让思绪自由流动", element: R }

      - id: Q23
        text: >
          你被要求组织一场聚会或活动——规模不大，但大家指望你，
          而且没有现成模版。你怎么着手？
        options:
          - { text: "快速让事情动起来，边做决定边调整", element: W }
          - { text: "把参与者的体验放在首位——思考每个人会怎么感受和互动", element: F }
          - { text: "仔细规划后勤——时间线、资源、谁在什么时候做什么", element: M }

      - id: Q24
        text: >
          你正在搬到一个新家或新工作空间。你怎么处理这个过渡？
        options:
          - { text: "用持续的劳动把新空间变成家——拆箱、整理、一件一件安顿下来", element: E }
          - { text: "系统化搬迁——贴标签、分类、以清晰秩序布置新空间", element: M }
          - { text: "先不急于布置——花时间感受空间的节奏和光线，让物品自己去到它该在的位置", element: R }

      - id: Q25
        text: >
          你有一个难得的完全属于自己的日子，在一个陌生的地方——
          一个你不太熟悉的城市，旅途中的自由日。你会做什么？
        options:
          - { text: "出去主动探索——走路、漫步、看看能发现什么", element: W }
          - { text: "坐在城市的中心吸收——让城市的节奏流经你，让交流自己找到你", element: F }
          - { text: "找一个安静的地方，沉浸其中——观察、吸收、感受这个地方", element: R }

  # ===================================================================
  # Round 6: Depth & Integration
  # Triads: {W,F,E} {W,E,M} {W,M,R} {F,E,R} {F,M,R}
  # ===================================================================
  - id: R06
    questions:
      - id: Q26
        text: >
          你在给几个在意的人做饭——不是宴请，就是一顿普通的、大家一起吃的饭。
          你在厨房里是什么风格？
        options:
          - { text: "凭直觉做——即兴发挥、边做边调，菜谱只是参考，食物在手上自然成形", element: W }
          - { text: "把这餐饭当作共处的方式——边做边聊，连接的温度和食物一样重要", element: F }
          - { text: "按熟悉的节奏慢慢来——享受烹饪本身的过程，让一顿饭自然地完成", element: E }

      - id: Q27
        text: >
          你即将开始一个将持续数月的重要项目——是你关心的事，
          但你从未做过类似的事。你怎么开始？
        options:
          - { text: "一头扎进最令人兴奋的部分，从行动中建立势头", element: W }
          - { text: "缓慢而稳定地开始，从第一天就建立可持续的节奏", element: E }
          - { text: "在第一个行动之前，先画出完整计划、里程碑和依赖关系", element: M }

      - id: Q28
        text: >
          你在读一些有难度的东西——一篇密集的文章、一份技术文档、
          一段对你的工作或思考很重要的哲学论证。你的阅读风格是什么？
        options:
          - { text: "快速扫描能用的关键点，提取有用的部分然后继续前进", element: W }
          - { text: "带着问题读，快速定位关键论证，判断哪些可靠、哪些有漏洞", element: M }
          - { text: "慢慢读，让每个观点沉下去，和已有的知识自然连接成新的理解", element: R }

      - id: Q29
        text: >
          一个亲近的朋友正在经历困难时期，向你伸出手。
          他们不需要解决方案——他们需要陪伴。你自然地怎么回应？
        options:
          - { text: "给予温暖和情感上的在场——让对方感到真正被倾听和接纳", element: F }
          - { text: "用具体的事陪着——做顿饭、一起待着、该做什么做什么——让对方感到日子还在正常转", element: E }
          - { text: "专注地听——帮对方把乱的思绪理清楚，提出那些让他自己看到出口的问题", element: R }

      - id: Q30
        text: >
          你在一个会议上，正在讨论一个你很有想法的重大决定。
          讨论一直在绕圈子。你会怎么做？
        options:
          - { text: "处理阻碍进展的人际因素，让大家重新对齐", element: F }
          - { text: "用清晰的标准和结构切入，让团队重新聚焦在重要的事上", element: M }
          - { text: "退一步重新框定所有人一直在回避的深层问题", element: R }
