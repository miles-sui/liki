    main: 6     # 己
    mid: 10     # 癸
    minor: 8    # 辛
  3:  # 寅
    main: 1     # 甲
    mid: 3      # 丙
    minor: 5    # 戊
  4:  # 卯
    main: 2     # 乙
    mid: null
    minor: null
  5:  # 辰
    main: 5     # 戊
    mid: 2      # 乙
    minor: 10   # 癸
  6:  # 巳
    main: 3     # 丙
    mid: 7      # 庚
    minor: 5    # 戊
  7:  # 午
    main: 4     # 丁
    mid: 6      # 己
    minor: null
  8:  # 未
    main: 6     # 己
    mid: 2      # 乙
    minor: 4    # 丁
  9:  # 申
    main: 7     # 庚
    mid: 9      # 壬
    minor: 5    # 戊
  10: # 酉
    main: 8     # 辛
    mid: null
    minor: null
