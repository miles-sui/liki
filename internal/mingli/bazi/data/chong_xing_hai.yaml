# 六冲、相刑、六害

# 六冲 — 地支差 6 位，两两对冲
chong:
  pairs:
    - [1, 7]    # 子午冲
    - [2, 8]    # 丑未冲
    - [3, 9]    # 寅申冲
    - [4, 10]   # 卯酉冲
    - [5, 11]   # 辰戌冲
    - [6, 12]   # 巳亥冲

# 相刑
xing:
  # 无礼之刑
  - type: "wuli"
    branches: [1, 4]        # 子卯
  # 无恩之刑
  - type: "wuen"
    branches: [3, 6, 9]     # 寅巳申
  # 恃势之刑
  - type: "shishi"
    branches: [2, 8, 11]    # 丑未戌
  # 自刑
  - type: "zi"
    branches: [5, 7, 10, 12]  # 辰午酉亥

# 六害
hai:
  pairs:
    - [1, 8]    # 子未害
    - [2, 7]    # 丑午害
    - [3, 6]    # 寅巳害
    - [4, 5]    # 卯辰害
    - [9, 12]   # 申亥害
    - [10, 11]  # 酉戌害
