# 天干五合、地支六合、三合、三会

# 天干五合 — (stem_a, stem_b) → 化五行 element (1=木..5=水)
stem_he:
  pairs:
    - [1, 6, 3]   # 甲+己 → 土
    - [2, 7, 4]   # 乙+庚 → 金
    - [3, 8, 5]   # 丙+辛 → 水
    - [4, 9, 1]   # 丁+壬 → 木
    - [5, 10, 2]  # 戊+癸 → 火

# 地支六合 — (branch_a, branch_b) → 化五行
branch_he:
  pairs:
    - [1, 2, 3]    # 子+丑 → 土
    - [3, 12, 1]   # 寅+亥 → 木
    - [4, 11, 2]   # 卯+戌 → 火
    - [5, 10, 4]   # 辰+酉 → 金
    - [6, 9, 5]    # 巳+申 → 水
    - [7, 8, 3]    # 午+未 → 土

# 地支三合 — (branches) → 五行
triple_he:
  - branches: [9, 1, 5]    # 申子辰 → 水
    element: 5
  - branches: [12, 4, 8]   # 亥卯未 → 木
    element: 1
  - branches: [3, 7, 11]   # 寅午戌 → 火
    element: 2
  - branches: [6, 10, 2]   # 巳酉丑 → 金
    element: 4

# 地支三会（东方/南方/西方/北方）— 同方向三支全
triple_hui:
  - branches: [3, 4, 5]    # 寅卯辰 → 东方木
    element: 1
  - branches: [6, 7, 8]    # 巳午未 → 南方火
    element: 2
  - branches: [9, 10, 11]  # 申酉戌 → 西方金
    element: 4
  - branches: [12, 1, 2]   # 亥子丑 → 北方水
    element: 5
