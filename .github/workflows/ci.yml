name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast: Go vet + unit tests (< 5s) ──
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test (unit)
        run: go test -coverprofile=/tmp/unit.cover ./internal/engine/ ./internal/db/ ./internal/questionnaire/

      - name: Test (integration)
        run: go test -coverprofile=/tmp/integration.cover ./internal/sqlite/ ./internal/http/ ./internal/application/...

      - name: Coverage thresholds
        run: |
          set -o pipefail
          FAIL=0
          check() { local pkg=$1 min=$2
            cov=$(go test -cover ./"$pkg/" 2>&1 | grep -oP 'coverage: \K[0-9.]+(?=%)' || echo "0")
            if [ "$(echo "$cov < $min" | bc)" -eq 1 ]; then
              echo "FAIL $pkg: ${cov}% < ${min}%"; return 1
            fi
            echo "PASS $pkg: ${cov}% >= ${min}%"
          }
          check internal/engine 60 || FAIL=1
          check internal/db 70 || FAIL=1
          check internal/questionnaire 50 || FAIL=1
          check internal/sqlite 60 || FAIL=1
          check internal/http 50 || FAIL=1
          check internal/application/assessment 70 || FAIL=1
          check internal/application/user 60 || FAIL=1
          exit $FAIL

  # ── Contract: API response shapes + frontend data flow ──
  contract:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Start services
        run: |
          cd deploy
          docker compose up -d --build
          # Wait for healthy
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health && break
            sleep 2
          done

      - name: API contract tests
        run: scripts/test-api-contract.sh

      - name: Frontend data-flow tests
        run: scripts/test-frontend-data.sh

  # ── E2E: Playwright browser tests ──
  e2e:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright deps
        run: cd web && npm ci

      - name: Start services
        run: |
          cd deploy
          docker compose up -d --build
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health && break
            sleep 2
          done

      - name: Run Playwright
        run: cd web && node ./node_modules/@playwright/test/cli.js test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: web/test-results/
