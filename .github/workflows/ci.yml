name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
          args: --timeout=3m

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./... -coverpkg=./internal/...

      - name: Check coverage
        run: |
          COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COV}%"
          if [ "$(echo "$COV < 50" | bc)" -eq 1 ]; then
            echo "Coverage ${COV}% is below 50% threshold"
            exit 1
          fi

      - name: Build
        run: go build -o /dev/null ./cmd/lingji/

  docker-build:
    runs-on: ubuntu-latest
    needs: go-check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -f deploy/lingji/Dockerfile -t lingji:ci .
        env:
          DOCKER_BUILDKIT: 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Run gosec
        run: go run github.com/securecodewarrior/gosec/v2/cmd/gosec@latest -quiet ./...

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: HTML check
        run: node web/scripts/check-html.cjs

      - name: Compile Vue template
        run: node web/scripts/compile-vue-template.cjs

      - name: i18n check
        run: node web/scripts/check-i18n.cjs

      - name: Run Vitest
        run: cd web && npx vitest run js/__tests__/

  e2e:
    runs-on: ubuntu-latest
    needs: go-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node deps
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install chromium

      - name: Install Caddy
        run: |
          curl -sfL "https://caddyserver.com/api/download?os=linux&arch=amd64" -o caddy
          chmod +x caddy

      - name: Build Go server
        run: go build -o bin/lingji ./cmd/lingji/

      - name: Start servers
        run: |
          ./bin/lingji -addr :8081 -db /tmp/lingji-ci.db &
          ./caddy run --config deploy/lingji/Caddyfile.local &
          # Wait for Caddy to be ready (serving static files on :8080)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/zh/ 2>/dev/null | grep -q '<html'; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          if [ "$i" = "30" ]; then echo "Server failed to start" >&2; exit 1; fi

      - name: Run smoke test
        run: cd web && BASE_URL=http://localhost:8080 npx playwright test --config e2e/playwright.config.js journeys/smoke.spec.js

      - name: Run full E2E
        run: cd web && BASE_URL=http://localhost:8080 npx playwright test --config e2e/playwright.config.js --ignore-snapshots

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: web/test-results/
