id: FM
classical: >
  火克金：发光者的在场辐射（F）受规范者的筛选（M）制约。火曰炎上——你的光不是漫射的；
  金曰从革——照哪里、怎么照，心里早筛过了。不是对谁都一样亮——你的光经过了准绳。

portrait: >
  你的光不是漫射的——照哪里、怎么照，心里早筛过了。不是谁靠近你都得到一样的光。
  你照亮一个人，该给什么不给什么，早就清清楚楚——你不是那种毫无保留的发光。
  每一个被你照亮的人，都是你想过了的。只是当心——筛太狠的时候，有些人还没被照亮就被你的标准挡在外面了。偶尔让光散一散，不为什么。

figures:
  - name: 王菲
    domain: 当代
    bio: >
      华语乐坛天后，生于1969年。以其空灵的嗓音和独特的舞台存在感著称。台上的存在感辐射全场，但她只给出想给的——采访话少，从不浪费一句。
    desc: 台上的存在感辐射全场，但她只给出想给的。采访话少，但从不多说一句。她知道自己的光该照哪里——不该照哪里也清清楚楚。
  - name: 凯特·布兰切特
    domain: 影视
    bio: >
      澳大利亚演员，同时代最具实力的表演者之一。银幕上一出现就统治画面，私底下却极其低调——每一个角色都是筛过的，从不滥接。
    desc: 银幕上一出现就统治画面。但在私底下极其低调。每一个角色都是她筛过的——不是什么都接。
  - name: 卡卡西
    domain: 动漫
    bio: >
      漫画《火影忍者》中的精英忍者，木叶村第六代火影。永远只露一只眼——实力深不可测，但从不随便展示。他的每一次出手都有原因。
    desc: 永远只露一只眼。他的实力深不可测，但从不随便展示。教佐助千鸟不是因为佐助强——是因为他觉得佐助需要。
  - name: 罗杰·费德勒
    domain: 体育
    bio: >
      瑞士网球运动员，世界第一在位310周。球场上像火一样耀眼——但他的优雅不是天生的，是筛过一万次失误之后剩下来的。
    desc: 球场上像火一样耀眼——但每一个动作都是打磨过的。他的优雅不是天生的，是筛过一万次失误之后剩下来的。
  - name: 萨菲罗斯
    domain: 游戏
    bio: >
      《最终幻想VII》中的传奇反派。全场最强的存在感，但从不轻易出手。每一次出现都有目的——不是谁都值得他亮剑，但一亮就是致命一击。
    desc: 全场最强的存在感，但从不轻易出手。他每一次出现都是有目的的。不是谁都值得他亮剑——但一亮，就是致命一击。

growth: >
  你的天赋是精准辐射——你不乱照，照了就精准。你的功课是偶尔让光散一散——
  不是每一次照亮都需要理由。有时无目的的暖，对别人可能是一天的救赎。不是每个人都得通过你的标准才值得被照——有些人还没达标，正需要你那一点光来达标。
