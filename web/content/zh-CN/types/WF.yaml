id: WF
classical: >
  木生火：开创者的推进（W）生出发光者的在场辐射（F）。木曰曲直——你的行动本身就是信号；
  这股行动力推高火焰，让势头自然扩散。不是靠说服——是靠动起来之后，能量自己传播。

portrait: >
  你开始干一件事，不用叫人——你的劲头本身就是信号。你干着干着，旁边的人自己就动起来了。
  不是你会说话，是你的势头会传染。你的行动不只是行动——它像火把一样，别人看着看着就也想动。
  你的影响力不在你说服了谁，在你做了什么。你一动，世界就跟着动了。不是登高一呼——是在工作台上坐着，旁边的人看着看着就加入了。不知不觉，一群人在你身后。
  只是当心——有时候跑太快，后面的人跟不上了。停一秒回头看看：他们跟你跑的方向，是你想去的地方吗？

figures:
  - name: 李云龙
    domain: 影视
    bio: >
      电视剧《亮剑》中的八路军团长。不等命令，先干再说——劲头不靠演讲，靠冲锋。身边的兵看着他的背影，不由自主就跟上去了。
    desc: 不等命令，先干再说。他的劲头不靠演讲——靠冲锋。身边的兵看着他往前冲，不由自主就跟上去了。
  - name: 漩涡鸣人
    domain: 动漫
    bio: >
      漫画《火影忍者》主角。从全村最差的吊车尾冲到火影——没有任何说服技巧，只是永不放弃地往前冲。冲到最后，整个忍界都被他感染了。
    desc: 从吊车尾到火影，他没有任何说服技巧。他只是永不放弃地往前冲——冲到最后，整个忍界都被他感染了。
  - name: 埃隆·马斯克
    domain: 当代
    bio: >
      美国企业家，生于1971年。特斯拉和SpaceX创始人。别人说火箭不能回收，他直接造了一枚——行动本身比任何商业计划都更有说服力。
    desc: 别人说火箭不能回收，他直接造了一枚。他的行动本身比任何商业计划书都有说服力。
  - name: 阿拉贡
    domain: 文学
    bio: >
      托尔金《魔戒》中的人类王者后裔。从未要求任何人跟随——他走进危险，然后人们自己跟上去了。行动本身就是最响亮的信号。
    desc: 从未要求任何人跟随——他只是走进危险，然后人们自己跟上去了。不是他说服了谁，是他的行动本身就是最响亮的号召。你一动，世界就跟着动了。
  - name: 皮卡丘
    domain: 游戏
    bio: >
      《宝可梦》系列最标志性的角色。不说话，只用十万伏特——但它一上场，整个队伍的电力就满了。所有训练师都想要一只。
    desc: 不说话，只用十万伏特。但所有训练师都想要一只——不是因为稀有，是因为它一上场，整个队伍都有电了。

growth: >
  你的天赋是启动——你一动手，别人就跟着动。你的功课是确认方向。你带着大家冲的时候，
  停一秒回头看看——他们跟你跑的是你想去的方向吗？
