id: EF
classical: >
  土生火：培育者的日常照料（E）生出在场辐射（F）。土曰稼穡——你的稳不让人觉得重；
  靠在你这像充电。逆生序意味着土的承载是火的光的土壤——不是先照亮再落地，是先落地再照亮。

portrait: >
  你的稳不让人觉得重——让人觉得暖。靠在你这不累，反而像充电。温度不在嘴里，在你每天的行动里。
  你不说漂亮话，但跟你待久了自然会知道。你不是那种一进房间就照亮全场的人——
  你是那种在一起久了之后，发现自己越来越亮的人。你的温度是慢热的，但热了就不凉。只是当心——你太低调了，别人根本不知道你在。不是每个人都会主动靠近你。有时候你要自己走出门，让别人知道你这有壁炉。

figures:
  - name: 沙和尚
    domain: 古典
    bio: >
      《西游记》中唐僧的三徒弟。不是最能打的，不是最聪明的——但他是队伍里最稳的那个。每天挑着担，不喊累。跟久了才知道他才是底盘。
    desc: 不是最能打的，不是最聪明的。但队伍里最稳的那个。他每天挑着担，不喊累。跟久了才知道——他才是队伍的底盘。
  - name: 基努·里维斯
    domain: 影视
    bio: >
      加拿大演员，生于1964年。《黑客帝国》《疾速追杀》系列主演。好莱坞最不像明星的明星——坐地铁、给孕妇让座、在街头跟流浪汉聊天。暖在每一天。
    desc: 好莱坞最不像明星的明星。坐地铁、给孕妇让座、在街头跟流浪汉聊天。他的暖不在采访里——在每一天。
  - name: 灶门炭治郎
    domain: 动漫
    bio: >
      漫画《鬼灭之刃》主角。全家被杀，妹妹变成鬼——但他对每个人还是暖的。不是圣母，是他每天在做的选择。连鬼都被他暖化了。
    desc: 全家被杀，妹妹变成鬼——但他对每个人还是暖的。不是圣母——是他每天在做的选择。连鬼都被他暖化了。
  - name: 蒂姆·邓肯
    domain: 体育
    bio: >
      美国篮球运动员，生于1976年。圣安东尼奥马刺队二十年基石，五次NBA总冠军。不说话、不秀——但每个队友都说：有他在，就觉得能赢。
    desc: 马刺队二十年基石。不说话、不秀——但每个队友都说：有他在，我就觉得能赢。不是光环，是每天的稳。
  - name: 动物森友会的你
    domain: 游戏
    bio: >
      任天堂《动物森友会》中的玩家角色。每天上线浇水、钓鱼、跟邻居打招呼——没什么大目标，但岛上的每个人都知道你每天在。久了，岛就是家。
    desc: 每天上线浇水、钓鱼、跟邻居打招呼。没什么大目标——但岛上的每个人都知道你每天在。久了之后，岛就是家。

growth: >
  你的天赋是慢热的温度。你不急着照亮——你的光是一天一天养出来的。你的功课是别太低调——
  有时候别人不知道你有多暖，是因为你从来没让他们靠近过。
