id: WR
classical: >
  木生水：开创者的推进（W）生出蕴蓄者的深潜（R）。木曰曲直——你的每一次行动底下都有攒了很久的东西。
  逆生序意味着行动的力量来自积累——不凭一时冲动，凭动之前已经沉够了。每一动都有分量。

portrait: >
  你的出手不轻飘。每一次行动底下都有攒了很久的东西——不凭一时冲动，凭积累。动之前已经沉过了，
  所以每一动都有分量。你不是那种一边做一边想的人——你是想够了才动手。但一旦动了，就停不下来。
  你的行动不像冲锋，像重锤——慢，但每一击都落在点上。只是当心——想太久才出手，机会可能已经过去了。你不是忘了怎么动，你是太不舍得从深处出来。攒够了就放手。

figures:
  - name: 邓小平
    domain: 当代
    bio: >
      中国改革开放总设计师，1904-1997年。看似不声张，每一次出手背后都是反复掂量。改革开放不是一拍脑袋——是沉了多年之后的精准出手。
    desc: 看似不声张，每一次出手背后都是反复掂量。改革开放不是一拍脑袋——是沉了多年之后的精准出手。
  - name: 埃尔内斯特·沙克尔顿
    domain: 历史
    bio: >
      英爱极地探险家，1874-1922年。南极探险船沉了，他在浮冰上带领27人活了两年——每一个决定都经过了深水层的计算，无一人丧生。
    desc: 南极探险船沉了，他在浮冰上带了27个人活了两年。每一个决定都经过了深水层的计算——动之前全算好了。
  - name: 利威尔·阿克曼
    domain: 动漫
    bio: >
      漫画《进击的巨人》中的"人类最强士兵"。平时不说话，但每一刀的出手都是精确计算过的——他的刀不轻，底下全是经验。
    desc: 人类最强士兵。平时不说话，但每一刀的出手都是精确计算过的。他的刀不轻——底下全是经验。
  - name: 汤姆·布雷迪
    domain: 体育
    bio: >
      美国橄榄球四分卫，生于1977年。NFL选秀第199顺位——但他把每年的沉淀攒成了22个赛季和七次超级碗冠军。每一次传球都有分量。
    desc: NFL历史上最伟大的四分卫之一。选秀第199顺位——但他把每一年的沉淀都攒成了生涯22个赛季。每一次传球都有分量。
  - name: 王羲之
    domain: 古典
    bio: >
      东晋书法家，303-361年。被尊为"书圣"。一池水洗笔洗成墨色——你看他一笔下去轻描淡写，底下是几十年。代表作《兰亭序》。
    desc: 书圣。你看他一笔下去轻描淡写——但那一笔底下是一池水洗成墨色的功夫。出手不轻飘，每一笔都有几十年的分量。不凭冲动，凭积累。

growth: >
  你的天赋是分量——你的每一动都不轻。你的功课是别想太久。沉是为了动，
  不是替代动。攒够了就该出手——等太久，机会可能已经过去了。
