id: MR
classical: >
  金生水：规范者的筛选（M）生出蕴蓄者的深度（R）。金曰从革——你先把没用的切掉，
  剩下的才值得深潜。过滤不是目的——是为了腾出空间，让真正值得的东西沉下去、连起来。

portrait: >
  你不玩表面。先切掉没用的，剩下的再往深走。在真正值得的对话里，你的话不多——但一出来就成了
  所有人围绕展开的点。你不是对什么都感兴趣——你只对少数事情认真，但一旦认真，就比谁都深。
  你的深度不是偶然——是你敢切掉 80% 的噪音，把剩下的 20% 沉到底。只是当心——别删太多。有些东西看起来没用，但可能是种子。给意外留一条缝，说不定缝里会长出你没算到的东西。

figures:
  - name: 鲁迅
    domain: 文学
    bio: >
      中国现代文学家、思想家，1881-1936年。新文化运动旗手。以杂文和小说批判国民性，被誉为"民族魂"。
    desc: 一刀切掉废话，剩下的话沉到骨头里。他写的每一句都是筛过的。不是没话说——是只把精的往外放。
  - name: 杨绛
    domain: 当代
    bio: >
      中国作家、翻译家，1911-2016年。代表作《我们仨》。写的东西精瘦——不是没话，是把该删的都删了。剩下来的每个字都沉到了骨头里，经得起读一百遍。
    desc: 写的东西精瘦——不是没话，是把该删的都删了。剩下来的每个字都沉到了骨头里。她删掉的可能比留下来的多十倍——但留下来的每一个字都经得起反复读。
  - name: 琼·狄迪恩
    domain: 文学
    bio: >
      美国作家，1934-2021年。新新闻主义代表人物。以精准、冷峻的散文风格著称，代表作《奇想之年》。
    desc: 她写的东西每个字都像被刀削过。不是不会写长——是她知道什么不配留在纸上。删掉的比出版的多十倍。
  - name: 鲍比·菲舍尔
    domain: 体育
    bio: >
      美国国际象棋冠军，1943-2008年。1972年击败苏联棋手斯帕斯基，终结苏联对世界冠军长达24年的垄断。天才也是谜。
    desc: 国际象棋天才。每一步之前他已经淘汰了一万种走法。别人看他在想——其实他在删。留下来的那一步就是对的。
  - name: 谢泼德指挥官
    domain: 游戏
    bio: >
      游戏《质量效应》系列主角。人类精英军人，银河系的命运掌握在他/她的每一个决定之中。
    desc: 银河系的命运压在肩上，但他做的每个决定都干脆。不犹豫——因为该筛的早就筛过了。

growth: >
  你的天赋是聚焦。你把精力投在最值得的地方。你的功课是别删太多——有些东西看起来没用，
  但可能是种子。留一点空白，给意外留一条缝。
