id: EM
classical: >
  土生金：培育者的转化（E）生出规范者的框架（M）。土曰稼穡——你先把一切接住，
  在转化过程中自然长出条理。不是先设计再执行——是先接住，然后秩序自己浮现。
  别人看到的框架，是你日复一日接住事物之后沉淀下来的。

portrait: >
  你什么都先接住，然后一点一点整出条理。别人以为你好说话——直到发现底下有一套你没声张的
  框架。你的秩序是真的，只是不挂在外面。你不先画蓝图——你先做事。做着做着，别人发现
  你做出来的东西自己就有结构。你的逻辑不在嘴上，在行动里。只是当心——别什么都接。你的框架很强，但不需要装下全世界。偶尔问自己：这件事，我该不该接？

figures:
  - name: 曾国藩
    domain: 古典
    bio: >
      清朝名臣，1811-1872年。什么事都先兜住——太平天国之前大清已烂了一半，他一个一个问题的接、一件一件的理顺。不是天才，是兜得住。
    desc: 什么事都先兜住。太平天国之前大清已烂了一半，他一个一个问题的接、一件一件的理顺。不是天才——是兜得住。
  - name: 安格拉·默克尔
    domain: 当代
    bio: >
      德国前总理，2005-2021年在任。难民危机、欧债危机、英国脱欧——从来不急着表态。先接住、再消化、然后给方案。底下有一套没人看得到的框架。
    desc: 难民危机、欧债危机、英国脱欧——她从来不急着表态。先接住、再消化、然后给方案。底下有一套没人看得到的框架。
  - name: 比克大魔王
    domain: 动漫
    bio: >
      漫画《龙珠》中的角色。从那美克星来的战士，从反派变成悟饭的师父。不说教——带着悟饭一天一天练。一年后悟饭比他亲爹还靠谱。
    desc: 从反派变成悟饭的师父。他不说教——他带着悟饭一天一天练。一年之后，悟饭比他亲爹悟空还靠谱。
  - name: 李昌镐
    domain: 体育
    bio: >
      韩国围棋棋手，生于1975年。不做花哨的棋——每一手都先接住对手的意图，再自然长出应对。他的棋风不是设计出来的，是几万盘下完了回头看，处处有条理。
    desc: 不做花哨的棋——每一手都先接住对手的意图，再自然长出应对。他的棋风不是设计出来的——是几万盘棋下完了回头看，发现处处有条理。先接住，秩序自己浮现。
  - name: 林巧稚
    domain: 当代
    bio: >
      中国妇产科医学先驱，1901-1983年。一生接生五万多个婴儿。什么事都先接住——六十年的临床经验自己长成了中国现代妇产科的体系。不是先设计的，是先做了够多。
    desc: 一生接生五万多个婴儿。什么事都先接住——六十年的临床经验自己长成了中国现代妇产科的体系。不是先设计的——是接住的东西够多了，条理自己浮上来的。

growth: >
  你的天赋是在行动中建立秩序。你不画蓝图但蓝图自己浮现。你的功课是偶尔抬头——
  别光顾着接，忘了问自己：这件事我该不该接。学会相信：你不接，事情也不会散架。拒绝，有时候比兜住更能建出真正的框架。
