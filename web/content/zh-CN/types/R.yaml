id: R
classical: >
  水的本质是向下渗透——有缝就进，积蓄待发。
  你的底层驱力是下沉：让东西自己渗透进来、自己连起来，积蓄够了再贯通。

portrait: >
  你不是不合群——你比别人需要更多独处的时间。一个人待着对你不是孤独，是回血。
  你不急着开口——让事情自己往下沉，自己连起来。出来的不是最多的，但经常是别人没看到的那个点。
  话少，但一说，场上就安静了。别人在表面忙，你在底下连。别人追逐热点的时候，你在深处找到
  了别人忽略的东西。只是当心——有时候沉得太久，忘了浮上来说话。别人不知道你底下在连什么，
  你要学会主动告诉他们。

figures:
  - name: 庄子
    domain: 古典
    bio: >
      战国时期哲学家，约前369-前286年。道家代表人物，与老子并称"老庄"。代表作《庄子》，以寓言和想象探索自由与生命的本质。
    desc: 别人在庙堂争论，他在河边看鱼。他沉下去想的不是怎么赢——是人生到底是怎么回事。一开口，几千年后还在回响。
  - name: 绫波丽
    domain: 动漫
    bio: >
      动画《新世纪福音战士》中的EVA驾驶员。人造人，话极少，情感内敛。她的沉默不是空洞——是整部作品最深的情感暗流。
    desc: 话最少的那个人。但每一次开口，整个故事的走向就变了。她的深度不在语言里——在沉默里。
  - name: 鲍勃·迪伦
    domain: 音乐
    bio: >
      美国创作歌手，生于1941年。2016年诺贝尔文学奖得主。他的歌词改变了流行音乐的定义，但他本人始终与名声保持距离。
    desc: 记者问他问题，他沉默十秒才答一句话。那一句话记者想了半辈子。他的歌词不是写出来的——是沉出来的。
  - name: 村上春树
    domain: 当代
    bio: >
      日本作家，生于1949年。代表作《挪威的森林》《1Q84》。以孤独特质和超现实叙事闻名，长年诺贝尔文学奖热门人选。
    desc: 每天凌晨四点起床写作，跑完步就一个人待着。他不追逐文坛——他沉在自己的世界里，然后一本书改变一代人。
  - name: 塞尔达公主
    domain: 游戏
    bio: >
      《塞尔达传说》系列中的海拉鲁公主。拥有封印灾厄的神圣之力。在《旷野之息》中，她独自在城堡中压制灾厄盖侬一百年。
    desc: 不是最能打的——但她是整个海拉鲁大陆上最沉得住的人。她一个人在深处守了一百年，等林克醒来。

growth: >
  你的天赋是深度。你看见别人漏掉的东西。你的功课是浮上来说话——你在底下连好的那些东西，
  别人看不到。不要等人来发现你。把你沉出来的东西说出来，对别人可能是钥匙。
