id: RM
classical: >
  水生金：蕴蓄者的深潜（R）生出规范者的结构（M）。水曰润下——你的深度不是漫无边际的；
  沉到底之后自然浮现骨架。逆生序意味着深度不是为了迷路——是为了盖出东西来。
  你沉下去的时候心里有蓝图。

portrait: >
  你的深沉不是漫无边际的——底下有结构。沉进去不是为了迷路，是为了盖出东西来。
  不随波逐流。你把深度建成了能住人的地方。别人以为你在发呆——其实你在底下搭框架。
  你的内省不是逃避，是施工。只是当心——不是每次深潜都需要施工。有时候泡在水里本身就是目的。偶尔放下蓝图，让自己漂一会儿。

figures:
  - name: 卡尔·荣格
    domain: 当代
    bio: >
      瑞士精神病学家、分析心理学创始人，1875-1961年。提出集体无意识、原型、人格类型等概念。他的深度不是漫游——是建成了心理学的地基。
    desc: 一个人沉得比谁都深——集体无意识、原型、红书。但他不是乱沉。他把深度建成了心理学的地基。
  - name: 艾伦·图灵
    domain: 当代
    bio: >
      英国数学家、计算机科学之父，1912-1954年。沉在最抽象的数学深处——却从那里建出了整个计算机时代的理论地基。不是沉下去迷路，是沉下去盖房子。
    desc: 沉在最抽象的数学深处。但沉进去不是迷路——是从里面建出了整个计算机时代的理论地基。别人沉下去是潜水，他沉下去是盖房子的。深度戴着建筑师的安全帽。
  - name: 克里斯托弗·诺兰
    domain: 影视
    bio: >
      英国电影导演，生于1970年。代表作《盗梦空间》《星际穿越》《奥本海默》。以非线性叙事和精密的结构著称，把哲学深度装进了类型片的框架。
    desc: 盗梦空间、星际穿越——每一部都在深层哲学里泡着。但每一部都有极其精密的结构。他的深沉戴着建筑师的安全帽。
  - name: 马格努斯·卡尔森
    domain: 体育
    bio: >
      挪威国际象棋特级大师，生于1990年。多次世界冠军，史上最高等级分保持者。以局面判断精准和终局耐力著称。
    desc: 世界象棋冠军。他沉在棋盘里的深度无人能及——但每一手都是算好的。不冲动，不迷路，底下全是骨架。
  - name: 塞尔达传说里的神庙设计者
    domain: 游戏
    bio: >
      《塞尔达传说》系列中散落各地的神庙——每一个都是深度迷宫，但每一个都有出口、有逻辑、有解法。设计者从不露面，只留结构。
    desc: 每一个神庙都是一个深度的迷宫——但每一个都有出口、有逻辑、有解法。不是让你迷路，是让你找到结构。

growth: >
  你的天赋是把深度建成结构。别人沉下去会迷路，你沉下去能盖房子。
  你的功课是偶尔放下蓝图——不是每次深潜都需要施工。有时泡在水里本身就是目的。
