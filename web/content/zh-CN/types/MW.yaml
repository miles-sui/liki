id: MW
classical: >
  金克木：规范者的筛选（M）制约开创者的冲动（W）。金曰从革——你不是不想动，是不乱动；
  木曰曲直——等想好了才出手。克不是压制：是让冲动经过准绳，找到最对的那个位置再出手。

portrait: >
  你不是不想动——你是不乱动。等你想好了，动的时候不用解释，因为清清楚楚。你的停顿不是犹豫，
  是在找对的位置。别人可能觉得你慢——但你不是慢，你是在瞄。你瞄的时候是静止的，
  但出手的那一刻，没人比你更快更准。你的力量在静止里——别人以为你没在做事，其实你正在做最重要的那件事：对准。只是当心——瞄太久，别人先出手了。不是每个目标都需要算到百分之百。有些事等你看清了，窗口也关了。

figures:
  - name: 张良
    domain: 古典
    bio: >
      西汉开国谋臣，约前250-前186年。与韩信、萧何并称"汉初三杰"。以智谋著称，运筹帷幄之中，决胜千里之外。
    desc: 运筹帷幄，算好了才出手。他不像韩信那样冲在前面——但他每一次动都改变了整个棋局。不是不动，是只在最对的地方动。
  - name: 苏炳添
    domain: 体育
    bio: >
      中国短跑运动员，生于1989年。亚洲百米纪录保持者。跑得比谁都快——但起跑的每一个角度都经过了反复筛选。不是蛮冲，是冲之前已经调好了每一步。
    desc: 百米跑得比谁都快。但他起跑的每一个角度都经过了反复筛选。不是蛮冲——是冲之前已经调好了每一处。动的速度惊人，但动之前的精准更惊人。
  - name: 宇智波鼬
    domain: 动漫
    bio: >
      漫画《火影忍者》中的宇智波一族天才忍者。为保护村子屠尽全族，独自背负叛忍之名。全剧最深不可测的角色之一。
    desc: 全剧最沉得住气的人。他做的每一件事——包括屠杀全族——都不是冲动，是算到了十年之后的精准出手。
  - name: 李安
    domain: 影视
    bio: >
      华裔电影导演，生于1954年。两次奥斯卡最佳导演奖得主。作品跨越武侠、爱情、奇幻等多种类型，以细腻和克制著称。
    desc: 一部电影前期准备可能三五年。不急——他在找最对的那个故事、最对的那个镜头。一旦开拍，就干净利落。
  - name: 杰洛特
    domain: 游戏
    bio: >
      游戏《巫师》系列主角，猎魔人。以接委托杀怪物为生，但每一个选择都在灰色地带。利维亚的杰洛特，白狼。
    desc: 每次战斗之前先涂剑油、喝魔药。他不是怕——他是不浪费。打之前已经筛过了，打的时候一刀是一刀。

growth: >
  你的天赋是精准出手。你动的每一刀都是对的。你的功课是别瞄太久——
  你的精准不来自一次瞄准，来自一万次出手。打偏了的那几次，比正中靶心的那几次更值钱。不出手，你连偏的机会都没有。出手本身就是校准。
