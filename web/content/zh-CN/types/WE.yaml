id: WE
classical: >
  木克土：开创者的推进（W）受培育者的稳重（E）制约。木曰曲直——你往前推但不急；
  土曰稼穡——动之前地已经夯过了。克不是压制，是约束：冲劲带着地基，每一步都踩实。

portrait: >
  你往前推，但不急。你的推动不让人觉得仓促——动之前地已经夯过了。冲劲带着地基，每一步都是
  踩实了的。你不是那种不管不顾的冲锋——你会先确认脚底下有没有东西。不是慢，是稳。开会讨论方向的时候你不一定发言——你已经在下面动手搭了。等方向定了，你把成型的东西推到桌上。
  别人的冲可能是跳，你的冲是推土机——每一步都压过去。只是当心——有时候地已经够实了，你还在夯。不是每块地都需要压到百分之百。偶尔踩一脚就走。

figures:
  - name: 任正非
    domain: 当代
    bio: >
      华为公司创始人，生于1944年。极速推进但极其务实——每一步扩张都先夯实地基。不像互联网公司烧钱抢滩，像农民种地，一块一块推。
    desc: 极速推进但极其务实。华为的每一步扩张都是技术和市场的双重夯实地基。不像互联网公司烧钱——像农民种地，一块一块推。
  - name: 袁隆平
    domain: 当代
    bio: >
      中国农学家，1930-2021年。杂交水稻之父。他的开创不是灵光一闪——是几十年如一日在田里踩出来的。每一步都有土，每一次突破都是在上一次的基础上推出来的。
    desc: 杂交水稻之父。他的开创不是灵光一闪——是几十年如一日在田里踩出来的。每一步都有土，每一次突破都是在上一次的基础上推出来的。
  - name: 埃尔文·史密斯
    domain: 动漫
    bio: >
      漫画《进击的巨人》中调查兵团第十三任团长。最激进的冲锋者，但每一次冲锋前都在书房里研究地图到深夜——冲得比谁都凶，但底下全算过了。
    desc: 调查兵团最激进的团长，但每一次冲锋之前他都在书房里研究地图到深夜。冲得比谁都凶——但底下全算过了。
  - name: 杰辛达·阿德恩
    domain: 当代
    bio: >
      新西兰前总理，生于1980年。危机时果断决策——但每一次出手背后都是充分的准备和扎实的执行。不是冲动型领袖，是准备好才出手的领袖。
    desc: 新西兰前总理。危机时的果断决策背后是充分的准备和扎实的执行。不是冲动型领袖——是准备好才出手的领袖。
  - name: 稻盛和夫
    domain: 当代
    bio: >
      日本企业家，1932-2022年。创办京瓷和KDDI两家世界500强，晚年重建日航。泡沫经济年代别人烧钱抢市场，他一步一步踩实了才走。
    desc: 创办两家世界500强，晚年重建日航。泡沫经济年代别人烧钱抢市场——他一步一个脚印，踩实了才走。冲劲带着地基，每一步都压过去。

growth: >
  你的天赋是稳推——你的冲劲不虚，每一步都踩实。你的功课是别夯太久——
  有时候地已经够实了，你还在夯。不是每块地都需要压到 100%。
