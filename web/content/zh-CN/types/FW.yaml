id: FW
classical: >
  火生木：发光者的在场辐射（F）生出开创者的行动（W）。火曰炎上——你的光不只在表面；
  当你真正照亮一个人，对方自己就动了。逆生序意味着火的辐射是源头，木的行动是结果——
  不是先动再照亮，是先照亮，然后被照亮的人自己动起来。

portrait: >
  你照亮一个人的时候，对方自己就动了。你的光不只在表面——它推着人往前走。你不只照亮人，
  你点燃人。你不是对谁都说好话——但你一旦真的看见了一个人，那个人就会开始变。
  你的影响力不来自推动，来自照亮。光到了，动就自然发生了。只是当心——你的光太烈的时候，反而让人睁不开眼。不是每个人都准备好了被你的光推着走。有时候，光照一照就够了，不用把人往前推。

figures:
  - name: 奥普拉·温弗瑞
    domain: 当代
    bio: >
      美国脱口秀主持人、媒体大亨、慈善家。她的节目播出25年，每天触及数百万观众，重塑了日间电视的定义。
    desc: 她不追逐——整个房间围绕她重新组织。当她真正在场时，那些放弃了自己的人开始重新相信，不是因为她说了什么，而是因为她的相信是一种力量，你隔着整个房间都能感受到。
  - name: 海伦·凯勒
    domain: 历史
    bio: >
      美国作家、活动家，1880-1968年。婴儿期因病失去视力和听力，却成为世界知名的残疾人权益与社会正义倡导者。
    desc: 看不见听不见，却用在场的光点燃了无数人。她的老师沙利文只是照亮了她——然后她照亮了全世界。
  - name: 沙利文老师
    domain: 历史
    bio: >
      美国教育家，1866-1936年。海伦·凯勒的家庭教师。她只照亮了一个看不见听不见的孩子——但这个孩子被她的光推着往前走，最终照亮了全世界。
    desc: 她只照亮了一个人——海伦·凯勒。但她的光推着海伦往前走，海伦又照亮了全世界。不是她自己发光，是她让另一个人亮起来，然后那个人自己动了。
  - name: J.K. 罗琳
    domain: 文学
    bio: >
      英国作家，生于1965年。《哈利·波特》作者。她的故事照亮了全球几亿孩子——不是让他们坐着看，是让他们站起来去读、去写、去想象。光到了，动就自然发生了。
    desc: 她的故事照亮了全球几亿孩子。不是让他们坐着看——是让他们站起来去读、去写、去想象。她点亮的东西变成了一代人的行动。光到了，动就自然发生了。
  - name: 阳光马里奥
    domain: 游戏
    bio: >
      任天堂《超级阳光马里奥》中的马里奥形象。不命令任何人——只在一个被污染的世界里到处清理、到处照亮。然后整个岛都被他激活了。
    desc: 他不需要命令任何人。他只是在一个被污染的世界里到处清理、到处照亮。然后整个岛都被他激活了。

growth: >
  你的天赋是点燃——你不需要推，你只需要照亮。你的功课是看清楚你照亮的是谁。
  不是每个人都准备好了被点燃。有时你的光到了，对方也需要时间才能动。
