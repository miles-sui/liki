id: RF
classical: >
  水克火：蕴蓄者的深潜（R）制约发光者的辐射（F）。水曰润下——你沉得深但亮得挑；
  火曰炎上——出来的东西在底下待够了才浮上来。克不是压制：是让辐射经过深水层的淬炼，
  每一份光都值得。

portrait: >
  你沉得深，但亮得挑。出来的东西在底下待够了才浮上来——每一个字都值。别人能感到你没亮出来的
  部分还多得多。他们是对的。你不是沉默——你是在让东西自己沉到该浮的时候。浮出来的不是一半，
  是全部准备好了。只是当心——别淬太久。你以为是在让东西更好，其实是在让东西永远出不来。最深的那个想法如果不浮上来，对这个世界来说就等于不存在。

figures:
  - name: 伦纳德·科恩
    domain: 音乐
    bio: >
      加拿大创作歌手、诗人，1934-2016年。以低沉嗓音和深厚文学性的歌词闻名。一首《Hallelujah》写了五年，每一个词都泡透了才放出来。
    desc: 一首歌能写五年。每一个词都在底下泡透了才放出来。他的演唱不是表演——是沉了很多年之后不得不说的东西。
  - name: 苏轼
    domain: 古典
    bio: >
      北宋文学家，1037-1101年。被贬一次，诗就深一层。黄州、惠州、儋州——越是沉到底，浮上来的东西越亮。不是天生的光，是在最深的地方淬出来的。
    desc: 被贬一次，诗就深一层。黄州、惠州、儋州——越沉越底，浮上来的东西越亮。他的光不是天生的——是在最暗的地方淬出来的。沉够了，每一个字都值。
  - name: 艾伦·耶格尔
    domain: 动漫
    bio: >
      漫画《进击的巨人》主角。从复仇少年到灭世者，他的转变是整个故事最深的暗线。前两季被低估，后面证明了一切。
    desc: 前两季几乎被观众骂——以为他只会吼。但他一直在底下酝酿。第三季之后，他沉出来的东西改变了整个故事。
  - name: 中本聪
    domain: 当代
    bio: >
      比特币创始人，真实身份至今未知。2008年发布白皮书，2009年挖出创世区块，2010年完全消失。他创造的东西改变了世界对货币的定义。
    desc: 创造了比特币然后消失。没有人知道他是谁。但他沉出来的那篇白皮书，改变了全世界对钱的定义。然后他就沉回去了。
  - name: 萨姆斯·阿兰
    domain: 游戏
    bio: >
      游戏《银河战士》系列主角。银河系最著名的赏金猎人。大部分时间独自行动，不说话，只完成任务。
    desc: 银河系最沉默的赏金猎人。不说话，但每一件武器都经过了反复测试。你不看她准备的过程——你只看到任务完成的那一刻。

growth: >
  你的天赋是淬炼——每一个字、每一个行动都经过了深水层。你的功课是别淬太久——
  不是每一句话都需要在水底待一年。有时即时的分享比完美的沉默更有用。你没说出来的那些——再深也没人知道。说出来，就算不完美，也可能正好是别人等的那句话。
