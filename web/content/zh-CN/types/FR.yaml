id: FR
classical: >
  火克水：发光者的在场辐射（F）制约蕴蓄者的深潜（R）。火曰炎上——你的光不是一下子全亮出来；
  水曰润下——在底下沉够了才浮上来。克不是压制：是让辐射经过沉淀，每句话都有分量。

portrait: >
  你的光不是一下子全亮出来——在底下沉够了才浮上来。每一句都有分量，因为没一句是顺便说的。
  你不是不说话——你是只在水底待够了才说。别人可能觉得你慢热——但你不是慢，你是在让话自己
  酿到位。酿出来的不是廉价温暖，是沉甸甸的光。只是当心——有时候酿太久了，别人已经走了。不是每句话都需要在水底泡一年。偶尔浮上来，说点没准备好的话——对别人可能也够了。

figures:
  - name: 张爱玲
    domain: 文学
    bio: >
      中国作家，1920-1995年。代表作《倾城之恋》《金锁记》。出名极早却深居简出，晚年独居洛杉矶——她的光沉到最暗的地方才浮上来，每一个字都是渗出来的。
    desc: 出名极早，但人几乎不在公共场合出现。她的光不浮在表面——在底下沉了几十年，每一个字都是从深处渗出来的。不急着被看见。
  - name: 石黑一雄
    domain: 文学
    bio: >
      日裔英国小说家，生于1954年。诺贝尔文学奖得主。他的小说不说破——每一句对话底下都是深海，读到第三遍才发现第一页已经告诉你了一切。
    desc: 诺贝尔文学奖得主。他的小说不说破——但每一句对话底下都是深海。你读到第三遍才发现第一页已经告诉你了一切。
  - name: 王家卫
    domain: 影视
    bio: >
      香港电影导演，生于1958年。代表作《花样年华》《重庆森林》。一部电影拍好几年——不是慢，是在等每一帧的光都从底下浮上来。
    desc: 一部电影拍好几年——不是慢，是在等每一帧的光都从底下浮上来。他的电影不解释，但每帧画面底下都是暗流。光在底下待够了才让人看见。
  - name: 陶渊明
    domain: 古典
    bio: >
      东晋诗人，约365-427年。不为五斗米折腰，归隐田园。不在庙堂发光——在田地里沉了一辈子，浮上来的诗却照亮了千年。
    desc: 不在庙堂发光——在田地里沉了一辈子。但他的诗浮上来，照了一千多年。光不急，在底下待够了才上来。不是不亮——是时候没到。
  - name: 艾莉
    domain: 游戏
    bio: >
      游戏《最后生还者》的女主角。末世中长大的少女，不说害怕——但每句笑话底下都是深渊。她的光不是一把火，是一滴一滴渗出来的。
    desc: 最后生还者里的艾莉。她不说她害怕——但每句笑话底下都是深渊。她的光不是一把火——是一滴一滴渗出来的。

growth: >
  你的天赋是分量——你的每句话都不是顺便说的。你的功课是偶尔别等那么久——
  不是每次分享都需要沉到最底。有时候浮在表面的东西，对别人来说也够了。你在水底待着的时候，别人不知道你还在不在。偶尔浮上来冒个泡——让他们知道你还在，而且快出来了。
