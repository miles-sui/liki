id: FE
classical: >
  火生土：发光者的在场辐射（F）生出培育者的日常照料（E）。火曰炎上——你的光从中心向外扩散；
  这股温度落进泥土，化作日复一日的实际行动。不是一闪而过的温暖——是能让人反复回来取暖的壁炉。

portrait: >
  你的光不是一闪而过——是一个别人反复回来取暖的壁炉。你照亮人的方式不在嘴上，在每天的日常里。
  身边的人既被你看亮，也被你接住。你不说漂亮话，但跟你待久了的人都知道——你暖。
  你的温度不是表现，是习惯。每一天都亮一点，每一天都接一点。久了之后，你的存在本身就成了别人的安全感。只是当心——壁炉烧久了也会空。你一直暖着别人，别忘了给自己添柴。你也需要被别人暖一暖。

figures:
  - name: 刘备
    domain: 古典
    bio: >
      三国时期蜀汉开国皇帝，161-223年。不靠口才聚拢人心——靠的是日复一日的真心实意。关羽张飞跟他一辈子，不是因为他说了什么。
    desc: 他在场人心就聚拢。不是靠口才——是靠日复一日的真心实意。关羽张飞跟他一辈子，不是因为他说了什么。
  - name: 哆啦A梦
    domain: 动漫
    bio: >
      日本漫画家藤子·F·不二雄创作的经典角色。22世纪的猫型机器人，永远在大雄身边。不是每次都有万能道具——但他永远在，每一天。
    desc: 永远在大雄身边。不是每次都有万能道具——但他永远在。他的光芒不在某一刻，在每一天。
  - name: 弗雷德·罗杰斯
    domain: 影视
    bio: >
      美国电视主持人，1928-2003年。创办并主持《罗杰斯先生的邻居》33年，每天告诉几代美国儿童"你是特别的"——不是演技，是真的在意。
    desc: 美国几代人的邻居。他每天在电视上对孩子们说你是特别的——不是演技，是每一天真的在意。
  - name: 德雷克·基特
    domain: 体育
    bio: >
      美国棒球运动员，生于1974年。纽约洋基队队长十余年。不是最能轰的——但他是每天最先到球场的那个。队友靠的不是他的全垒打，是靠他每天都在。
    desc: 洋基队长二十年。不是最能轰的——但他是每天先到球场的那个。队友靠的不是他的全垒打，是靠他每天都在。
  - name: 桃花公主
    domain: 游戏
    bio: >
      任天堂《超级马里奥》系列中的公主。被困了无数次，但每一次被救后都真心感谢。她的温度不是一次性的——是每次见面都让人觉得被在意。
    desc: 被困了无数次，但每一次被救之后都真心感谢。她的温度不是一次性的——是每次见面都让人觉得被在意。

growth: >
  你的天赋是持续照亮——你不是一闪而过的烟火，你是壁炉。你的功课是别让自己烧光。
  壁炉也需要添柴。你自己也需要有人照亮——记得留一扇门给别人进来。
