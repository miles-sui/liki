id: ER
classical: >
  土克水：培育者的日常行动（E）制约蕴蓄者的深潜（R）。土曰稼穡——你能往深走但不会走丢；
  水曰润下——因为每天的行动兜住了你想的东西。克不是压制：是你的日常让你的深度不飘。

portrait: >
  你能往深走，但不会走丢。别人焦虑的时候，你是静的——不是不能往深想，是你想的东西被每天的
  行动接住了。你是那种人不在场了，别人才发现缺了什么的锚。你的深度不飘——因为它被每天的
  日常拴着。你不是哲学家那种沉——你是农民那种沉：脚踩在土里，头可以想得很远。只是当心——你太稳了，稳到别人以为你不需要任何东西。你把所有人的焦虑都消化在自己身上，忘了你也可以晃一晃。偶尔让别人看见你的浪——锚不是用来把自己钉死的。

figures:
  - name: 王阳明
    domain: 古典
    bio: >
      明代哲学家、军事家，1472-1529年。心学集大成者。不是在书斋里想出来的——是在贵州龙场垦荒、剿匪、治县的每一天中悟出来的。知行合一。
    desc: 心学大师，但他不是在书斋里想出来的——是在贵州龙场垦荒、剿匪、治县的每一天中悟出来的。知行合一就是土克水。
  - name: 一行禅师
    domain: 当代
    bio: >
      越南佛教僧侣、和平活动家，1926-2022年。将正念带入西方主流。他的正念不是打坐——是洗碗的时候知道自己在洗碗。深度被日常兜住，禅踩在地上。
    desc: 正念不是打坐——是洗碗的时候知道自己在洗碗。他的深度被日常兜住了。不是飘在空中的禅，是踩在地上的每一步。
  - name: 比企谷八幡
    domain: 动漫
    bio: >
      轻小说及动画《果然我的青春恋爱喜剧搞错了》主角。高中生的外表，大叔的内心——对人性的思考极深，但每次思考都落在一个具体的行动里。不飘。
    desc: 高中生的外表，大叔的内心。他对人性的思考极深——但每次思考都落在一个具体的行动里。不飘。
  - name: 安迪·穆雷
    domain: 体育
    bio: >
      英国网球运动员，生于1987年。三届大满贯冠军。不是最能跑的，但每一个回球都经过了深度判断——场上的思考不是飘的，每一次挥拍都接着前一拍。
    desc: 不是最能跑的，但每一个回球都经过了深度判断。他在场上的思考不是飘的——每一次挥拍都接着前一拍。
  - name: 最后生还者里的乔尔
    domain: 游戏
    bio: >
      游戏《最后生还者》的男主角。末世里话最少的人——但每一个决定都经过了深沉的考量，然后落在行动。不是不害怕，是每一步都踩稳了。
    desc: 末世里话最少的人。但每一个决定都经过了深沉的考量——然后落在行动。不是不害怕，是每一步都踩稳了。

growth: >
  你的天赋是锚——你的深度不飘。你的功课是偶尔松一松绳。允许自己有一天不产出、不消化、不兜着——只是漂着。漂一天，第二天你的锚会更稳。你不需要每天都做那个最靠得住的人。
