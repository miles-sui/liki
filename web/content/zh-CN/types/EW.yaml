id: EW
classical: >
  土克木：培育者的日常行动（E）制约开创者的冲动（W）。土曰稼穡——你不是冲最前面的，是把地夯实的；
  木曰曲直——有开创的底子但不靠冲。克不是压制：是用一步一步把冲动转化成不可阻挡的推进。

portrait: >
  你不是冲在最前面的那个——你在后面把地夯得最实。你有开创的底子，但不靠冲，靠一步一步踩过去。
  不快，但停不下来。脚下有地的人，不急。你是那种跑马拉松的人——起步不惊人，但跑着跑着，
  前面的人开始掉速，你还在匀速推进。因为你的动力不来自激情，来自每一天。只是当心——一直低头推，忘了抬头看方向。每一步都踩实了，但方向对不对？一直走对的路比一直走更重要。

figures:
  - name: 萧何
    domain: 古典
    bio: >
      西汉开国丞相，约前257-前193年。刘邦在前面打天下，他在后面经营关中——每一场胜仗的粮草都是他一天一天攒的。没有萧何就没有大汉。
    desc: 刘邦在前面打天下，他在后面经营关中。每一场胜仗的粮草都是他一天一天攒的。没有萧何就没有大汉。
  - name: 蒂姆·库克
    domain: 当代
    bio: >
      苹果公司CEO，生于1960年。不是那个在发布会上惊艳世界的人——他是让每一部iPhone准时到达你手上的人。供应链之土。
    desc: 不是那个在发布会上惊艳世界的人——他是那个让每一部 iPhone 准时到达你手上的人。他是供应链之土。
  - name: 罗伊·马斯唐
    domain: 动漫
    bio: >
      漫画《钢之炼金术师》中的国家炼金术师，焰之炼金术师。最有野心的角色——但不靠冲，靠一步一步往上爬。每一步都踩稳了才迈下一步。
    desc: 钢之炼金术师里最有野心的角色。但他的野心不是冲——是一步一步往上爬。每一步都踩稳了才迈下一步。
  - name: 德克·诺维茨基
    domain: 体育
    bio: >
      德国篮球运动员，生于1978年。达拉斯小牛队效力21年——不是每年都争冠，但每年都在。最后一年拿总冠军，不是因为爆发，是因为从来没停。
    desc: 在小牛队打了21年。不是每年都争冠——但每年都在。最后一年拿了总冠军，不是因为爆发，是因为他从来没停。
  - name: 我的世界里的史蒂夫
    domain: 游戏
    bio: >
      游戏《我的世界》的默认玩家角色。一块一块挖，一块一块盖——第一天只挖了三块木头，一年之后你盖了一座城。不是魔法，是每一天。
    desc: 一块一块挖，一块一块盖。第一天只挖了三块木头——但一年之后，你盖了一座城。不是魔法，是每一天。

growth: >
  你的天赋是不可阻挡。你不快——但没人能让你停下来。你的功课是偶尔抬头看看方向——
  你可以一直走，但往哪儿走是你选的。选错了不怕，你有的是耐力走回来。怕的是一直没发现自己走错了，等你抬头，已经离想去的地方太远。
