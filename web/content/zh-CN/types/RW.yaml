id: RW
classical: >
  水生木：蕴蓄者的深潜（R）生出开创者的行动（W）。水曰润下——你在深处消化透了才浮上来；
  这股积蓄的力量推高木，让每一次出手都有分量。不是冲动——是底下转了很久之后，不能再等了。

portrait: >
  你消化得久，然后动得干净。别人以为是冲动——其实底下已经转了很久。每一次出手底下都有东西
  托着。你不是轻易动手的人——但一旦动了，别人就知道你已经想透了。你的行动不解释——
  因为解释在动之前就已经完成了。让人看到你动之前的那些沉——这一点，你最别藏。只是当心——你的沉不是用来替代动的。不是每个时机都需要完美才出手。有时候六成的把握就够了，剩下的四成是动起来之后才知道的。

figures:
  - name: 司马懿
    domain: 古典
    bio: >
      三国时期魏国谋臣、军事家，179-251年。以隐忍著称——装病、装老、装怂，最终一举发动高平陵之变，为西晋奠基。
    desc: 隐忍几十年，装病、装老、装怂。所有人以为他废了的时候，他一动，天下易主。那几十年不是浪费——是在沉。
  - name: 纳尔逊·曼德拉
    domain: 当代
    bio: >
      南非反种族隔离革命家，1918-2013年。被囚禁27年后当选南非首位黑人总统。出狱后推动民族和解而非复仇，获诺贝尔和平奖。
    desc: 二十七年牢狱。出来那天，他没有仇恨——他把二十七年消化成了和解。那一步，底下是二十七年的沉淀。
  - name: 鲁路修
    domain: 动漫
    bio: >
      动画《Code Geass》主角。被流放的皇子，获得绝对命令之力后走上推翻帝国的道路。每一场战役都在脑子里打过一百遍。
    desc: 每一场战役之前，他已经在脑子里打了一百遍。观众看到的只是他一个眼神——底下是整盘棋。
  - name: 凯文·杜兰特
    domain: 体育
    bio: >
      美国篮球运动员，生于1988年。两次NBA总冠军，以无解的得分能力和柔顺的投篮手感著称。不是最能说的，但每一次得分都像已经算好了。
    desc: 不是最能说的——但他每次得分都像已经算好了。防守球员以为他在犹豫——其实他在算角度。投篮那一刻，底下是几千小时的训练。
  - name: 姜子牙
    domain: 古典
    bio: >
      周朝开国元勋，约前1156-前1017年。在渭水边钓了半辈子鱼——不是闲着，是沉着。七十二岁才出手，一动就帮武王灭了商朝。那几十年的沉默不是空白，是蓄力。
    desc: 渭水边钓了半辈子鱼——不是闲着，是沉着。七十二岁才出手，一动就帮武王灭了商朝。那几十年的沉默不是浪费——是在深处转够了、转透了，然后一击。

growth: >
  你的天赋是积蓄之后的爆发。你动的每一下都有分量。你的功课是别等太久——
  你底下攒的那些东西，不出水面就不算数。找一个人，把你沉了很久的想法说给他听——说的过程本身就是浮上来。说出来，才有下一步。
