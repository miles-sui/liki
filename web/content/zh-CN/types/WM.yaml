id: WM
classical: >
  木克金：开创者的推进（W）制约规范者的筛选（M）。木曰曲直——你的行动先过了自己那关；
  金曰从革——动了就是已经对准了的。克不是压制：是让冲动穿过筛子，只留下精准的行动。

portrait: >
  你的行动先过了自己那关。不冲动——动了就是已经对准了的。不是做得多，是每一动都踩在点上。
  出手干净，因为该筛的早就筛过了。你是那种做之前就在脑子里过了一遍的人——不是犹豫，
  是校准。别人以为你出手快，其实你出手之前已经淘汰了十种方案。但你不是停下来算——你是在动的同时筛的。跑起来，筛子还在转。淘汰和行动是同一个动作。比如你点菜——菜单翻着，手指已经落下了。三道刚好，一道没浪费。翻和筛和点是同一个动作。
  只是当心——筛太久，机会从筛子底下漏过去了。不是每次行动都需要淘汰十个方案。有时候冲动也有价值——凭直觉来一发。

figures:
  - name: 霍去病
    domain: 古典
    bio: >
      西汉名将，前140-前117年。十七岁出征，封狼居胥。少年战神，动如闪电——但每一击都经过了精准判断，不浪费一兵一卒。
    desc: 少年战神，动如闪电。但每一击都经过了精准的判断——不浪费一兵一卒。不是蛮冲，是每一次冲锋都已经算到了尽头。
  - name: 凯瑟琳·格雷厄姆
    domain: 当代
    bio: >
      美国《华盛顿邮报》掌门人，1917-2001年。决定刊登五角大楼文件和水门事件报道的那一刻，她已经在心里筛过了所有后果——动了就是对的。
    desc: 华盛顿邮报掌门人。决定刊登五角大楼文件的那一刻，她已经在心里筛过了所有后果。动了就是对的。
  - name: 李小龙
    domain: 影视
    bio: >
      美籍华人武术家、演员，1940-1973年。截拳道创始人。"吸收有用的，丢弃无用的"——不是会一千种踢法，是一种踢法练一千遍。出手就是对的。
    desc: 截拳道创始人。"吸收有用的，丢弃无用的"——不是会一千种踢法，是一种踢法练一千遍。每一招都过了筛子。出手干净——因为该淘汰的早就淘汰了。
  - name: 基利安·姆巴佩
    domain: 体育
    bio: >
      法国足球运动员，生于1998年。世界杯冠军得主，以惊人速度闻名——但他的快不是冲动，跑位之前就已经算好了球会往哪去。
    desc: 世界杯决赛进球那一脚——不是冲动。他在跑位之前就已经算好了球会往哪去。冲得比谁都快，但每一步都精准。
  - name: 毁灭战士
    domain: 游戏
    bio: >
      游戏《毁灭战士》系列主角。没废话，拔枪就打——但每一枪都是最优解。知道每把枪的性能和每个怪的弱点，不浪费一颗子弹。
    desc: 没废话，拔枪就打。但每一枪都是最优解——他知道手里每把枪的性能，知道每个怪的弱点。不浪费一颗子弹。

growth: >
  你的天赋是精准行动——你动的每一下都值。你的功课是别筛太久——
  有时候冲动也有价值。不是每个行动都需要经过完整的成本核算。偶尔凭直觉来一发。
