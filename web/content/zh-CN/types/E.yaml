id: E
classical: >
  土的本质是播种、转化、收获的完整循环——不急，不跳步。
  你的底层驱力是接住：把原料变成成品，把混沌养成秩序。

portrait: >
  你不是场上最显眼的那个。但你是每天到、每天做、不跳步骤的那个人。别人把烂摊子丢给你，
  过一阵子，烂摊子变成了能用的东西。不是魔法——是日复一日不放弃。你不追求快，你追求做完。
  你也不追求聚光灯，你追求的是交出东西的时候可以说：我尽了力。只是当心——别什么烂摊子都接。
  你手里的地只有一块，耕好了自己的，才有余力帮别人。

figures:
  - name: 诸葛亮
    domain: 古典
    bio: >
      三国时期蜀汉丞相，181-234年。事必躬亲，稳扎稳打。蜀汉几度危亡，他一次次接住、收拾、再交出去。不是天才一闪——是一生不跳步。
    desc: 事必躬亲，稳扎稳打。蜀汉几度危亡，他一次次接住、收拾、再交出去。不是天才一闪——是一生不跳步。
  - name: 梅丽尔·斯特里普
    domain: 影视
    bio: >
      美国演员，生于1949年。21次奥斯卡提名——不是靠天才一闪，是靠每一次都做足功课。不跳步骤，不取巧，每个角色从头耕到尾。
    desc: 21次奥斯卡提名——不是靠天才一闪，是靠每一次都做足功课。不是最抢眼的，却是最扎实的。不跳步骤，每个角色都从头耕到尾。烂摊子到她手里，总能变成好东西。
  - name: 汤姆·汉克斯
    domain: 影视
    bio: >
      美国演员，生于1956年。两获奥斯卡影帝。不是最帅的，不是最会演的——却是好莱坞最被信任的人。他演的每个角色都是普通人把烂摊子变成好东西。
    desc: 不是好莱坞最帅的，不是最会演的——但他是所有人最信任的。他演的每个角色都是普通人把烂摊子变成好东西。
  - name: 山姆怀斯·甘姆吉
    domain: 文学
    bio: >
      托尔金《魔戒》中的霍比特人，魔戒远征队成员。唯一从头到尾没有放弃的人——佛罗多倒了，他扛。不是英雄，是每天到、每天做。
    desc: 魔戒远征队里唯一一个从头到尾没有放弃的人。佛罗多倒了，他扛。不是英雄——是每天到、每天做。
  - name: 史蒂夫·纳什
    domain: 体育
    bio: >
      加拿大篮球运动员，生于1974年。两届NBA最有价值球员。不是最快的、不是最高的——他把每一场比赛都当成一块地来耕，靠每一天的组织和传控。
    desc: 不是最快的、不是最高的。但他把每一场比赛都当成一块地来耕。两届MVP不是靠天赋，是靠每天的组织和传控。

growth: >
  你的天赋是把事情做完。你让混沌变成秩序。你的功课是学会说不——不是每块地都要你耕。
  你手里的种子有限，选对的地，才能真正育出东西。
