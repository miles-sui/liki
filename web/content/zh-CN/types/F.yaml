id: F
classical: >
  火的本质是从中心向外辐射。你的底层驱力是在场——不用一个一个去照亮。
  你在哪里，光就在哪里，周围自然被照到。

portrait: >
  你走进来，场子温度就不一样。不是你说了什么、做了什么——是你这个人在这里，空气就变了。
  你不用一个一个去关照谁——你在，光就在，大家都被照到了。别人记住的，不是你说了哪句话，
  是你本身的存在。你的影响力不在你的行动里，在你的在场里。只是当心——你在场的时候空气围着你转，别人可能退到边上去了。
  不是每个人都能在你旁边也亮着。偶尔收一点光，让别人也能照进来。

figures:
  - name: 李白
    domain: 古典
    bio: >
      唐代诗人，701-762年。被尊为"诗仙"。一生浪迹天下，走到哪里哪里的空气就变了——他的在场本身就是诗。
    desc: 走到哪里，哪里的空气就变了。不用说话，一出现就照亮全场。他的在场本身就是诗。
  - name: 张国荣
    domain: 音乐
    bio: >
      香港歌手、演员，1956-2003年。他的舞台存在感不需要解释——站在那里，整个空间就被他定义了。光不挑人，来的人都照。
    desc: 他的舞台存在感不需要解释——站在那里，整个空间就被他定义了。不讨好、不追逐，光自己往外走。来的每一个人都被照到，不是因为他看谁——是因为他在。
  - name: 罗宾·威廉姆斯
    domain: 影视
    bio: >
      美国喜剧演员，1951-2014年。凭借《死亡诗社》《心灵捕手》等作品闻名。走进任何房间能量就变了——他不是在表演，他本身就是温度。
    desc: 走进任何一个房间，能量就变了。他不是在表演——他本身就是那个温度。全世界的观众都感到被一个人照亮。
  - name: 泰勒·斯威夫特
    domain: 当代
    bio: >
      美国创作歌手，21世纪最具影响力的流行音乐人。她的歌写的是自己的故事，但几亿人在里面找到了自己。
    desc: 她的演唱会不只是演出——是全场几万人同时感到被看见。她的歌写的是自己的故事，但每个人都在里面找到了自己。
  - name: 马里奥
    domain: 游戏
    bio: >
      任天堂标志性游戏角色，1981年诞生。一个永远往前的管道工——不说大道理，不为难别人。他的乐观不是说的，是辐射出来的。
    desc: 从来不说大道理，从来不为难别人。他只是永远在那里，永远往前跳。他的乐观不是说的——是辐射出来的。

growth: >
  你的天赋是在场。你不需要做什么——你在就够。你的功课是记得给自己回光。
  不能一直亮着不给油。你的能量来自在场——但也因此不习惯关灯。偶尔一个人待着不是消耗，是保养。灯歇够了，下一场亮得更久。
