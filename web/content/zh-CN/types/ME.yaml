id: ME
classical: >
  金生土：规范者的筛选（M）生出培育者的土壤（E）。金曰从革——你的标准高但不是冰的；
  底下有土壤托着。逆生序意味着精准不是为了淘汰——是为了让人长好。你挑毛病的时候，
  对方知道你不是否定他，是在给他养分。

portrait: >
  你标准高，但不脆——底下有土壤托着。你挑毛病的时候，别人知道你是为了让他长好，不是否定他。
  精准里头有耐心。你不是那种挑完刺就走的人——你挑完还把肥递过来。你的标准不是墙，是梯子。只是当心——有些人需要先被接住，再听标准。你太急着挑毛病的时候，对方还没站稳，你的养分就变成了压力。先给土壤，再给尺子。

figures:
  - name: 孔子
    domain: 古典
    bio: >
      中国古代思想家、教育家，前551-前479年。儒家学派创始人。弟子三千，因材施教——对子路和对子贡的标准不一样。不是偏心，是知道每个人该从哪长。
    desc: 弟子三千，因材施教。他对子路和对子贡的标准不一样——不是偏心，是知道每个人该从哪长。标准高，但有土。
  - name: 泰德·拉索
    domain: 影视
    bio: >
      美剧《泰德·拉索》主角。美国橄榄球教练被请去教英国足球——按理没资格。但他对球员的标准不是踢得好不好，是你有没有比昨天好一点。
    desc: 美国橄榄球教练去教英国足球——按理说他没资格。但他对每个球员的标准不是踢得好不好，是你有没有比昨天好一点。
  - name: 杀老师
    domain: 动漫
    bio: >
      漫画《暗杀教室》中的章鱼形教师。本应毁灭地球的怪物当了三年E班老师——对每个学生都有超高要求，但每个学生都知道老师是为了他们长。精准，但全是土。
    desc: 毁灭地球的怪物当了三年E班老师。他对每个学生都有超高要求——但每一刀的落点都是让学生长。精准不是目的，是施肥的工具。
  - name: 叶问
    domain: 影视
    bio: >
      咏春拳宗师，1893-1972年。李小龙的师父。对徒弟要求极严——但每个徒弟都知道师父是为了自己好。不是挑剔，是施肥。标准高，底下全是土壤。
    desc: 李小龙的师父。对每个徒弟要求极严——但每个徒弟都知道师父是为了自己好。他挑毛病的时候，对方知道不是在否定他，是在给他养分。精准底下全是土壤。
  - name: 塞尔达传说里的猫头鹰
    domain: 游戏
    bio: >
      《塞尔达传说》系列中的大猫头鹰Kaepora Gaebora。每次都跳出来讲一堆话——你可能觉得烦，但每一条提示都精准，而且说完都等你消化完再走。
    desc: 每次都跳出来讲一堆话，你可能觉得烦。但每一条提示都精准——而且每次说完都等你消化完再走。

growth: >
  你的天赋是用高标准帮助人成长。你不是只挑刺——你给养分。你的功课是有时别急着挑——
  有些人需要先被接住，再听标准。先问一句"你准备好了吗"——对方的点头比你的一针见血更值钱。
