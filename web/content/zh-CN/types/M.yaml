id: M
classical: >
  金的本质是循标准，又不守死标准——从是遵从，革是革新。
  你的底层驱力是过筛：不过关的过不去，筛子不对了连筛子一起改。

portrait: >
  你天生有根准绳。东西好不好、话对不对——你过一下就知道了。你不一定讲出来，但不过关的东西
  在你这过不去。别人开始可能觉得你挑剔，后来发现你点头的事基本不会出错。你那根准绳不是死的——
  标准不对，你连标准一起改。你不是只守规矩的人，你是立规矩的人。只是有时候也量量
  自己，轻一点。最好的标准不是最严的，是最对的。

figures:
  - name: 包拯
    domain: 古典
    bio: >
      北宋名臣，999-1062年。铁面无私，以清廉公正闻名。心里有根准绳——皇亲国戚过不了他那关也过不去。他立的不是规矩，是底线。
    desc: 铁面无私，心里有根准绳。皇亲国戚过不了他那关也过不去。他立的不是规矩——是底线。
  - name: 宇智波佐助
    domain: 动漫
    bio: >
      漫画《火影忍者》中的宇智波一族末裔。对自己狠，对别人也狠——有一套自己的标准。不是谁的认可都要，只有过了自己那关才算。
    desc: 对自己狠，对别人也狠。他有一套自己的标准——不是谁的认可都要，只有过了自己那关才算。
  - name: 宫崎骏
    domain: 影视
    bio: >
      日本动画大师，生于1941年。吉卜力工作室联合创始人。一张画稿不满意就撕掉重来——不是苛刻，是他心里知道什么是对的。他改的不是画，是标准本身。
    desc: 一张画稿不满意就撕掉重来。不是苛刻——是他心里知道什么是对的。他改的不是画，是标准本身。
  - name: 科比·布莱恩特
    domain: 体育
    bio: >
      美国篮球运动员，1978-2020年。五次NBA总冠军，洛杉矶湖人传奇。凌晨四点的洛杉矶不是传说——他对自己有一把尺子，刻度比别人细十倍。
    desc: 凌晨四点的洛杉矶不是传说。他对自己有一把尺子，刻度比别人细十倍。不达标的事他不接受——包括自己。
  - name: 林克
    domain: 游戏
    bio: >
      《塞尔达传说》系列的主角。不说话，不解释——但每把剑都磨好了，每个迷宫都走完了。他的标准不在嘴上，在每一次拔剑之前就已经设好了。
    desc: 不说话，不解释。但每把剑都磨好了，每个迷宫都走完了。他的标准不在嘴上——在每一次拔剑之前就已经设好了。

growth: >
  你的天赋是精准。你让好东西不被淹没。你的功课是把尺子放轻一点——对自己，也对别人。
  不是每件事都需要满分。有时候六十分就够了，剩下的空间留给别人去长。
