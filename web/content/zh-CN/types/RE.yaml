id: RE
classical: >
  水克土：蕴蓄者的深潜（R）制约培育者的日常行动（E）。水曰润下——你往里走但不泛滥；
  土曰稼穡——心里有条河道。克不是压制：是有岸才能流得更深。

portrait: >
  你往里走，但不泛滥。心里有条河道——流得再深，也知道岸在哪。有岸限制了你往哪个方向去，
  反而让你能往更深的地方走。你不是那种什么都要探索的人——你选对了一条河道，然后往下走到底。
  你的深沉是专注的，不是散漫的。只是当心——在同一条河道走太久，可能错过旁边的风景。偶尔换条河道走走，回来之后原来的河道会更深。一直走同一个方向，和一直换方向，都不是最好的路。

figures:
  - name: 钱钟书
    domain: 当代
    bio: >
      中国作家、学者，1910-1998年。学贯中西，代表作《围城》《管锥编》。深度无边——但每一条河都有岸。写小说只写了一部，精而不滥，每一页都沉到底。
    desc: 学贯中西，深度无边。但他不泛滥——每一条河都有岸。写小说只写了一部《围城》，但那一部就够了。深度是专注了的，不是散了去的。
  - name: 近藤麻理惠
    domain: 当代
    bio: >
      日本整理收纳顾问，生于1984年。以"怦然心动"整理法闻名全球。只做整理一件事，把它做到了前所未有的深度。
    desc: 只做一件事：帮人整理。但她在整理这件事上走到了没人到过的深度。她的河道很窄——但极深。
  - name: 长门有希
    domain: 动漫
    bio: >
      轻小说及动画《凉宫春日的忧郁》中的角色。外星人造人，在社团教室里沉默地读书，但她掌握着整个宇宙的信息。
    desc: 外星人界面、不说话、只读书。但她的沉默不是空洞的——是满的。她的河道只通向一个方向：理解这个世界。
  - name: 贝多芬
    domain: 音乐
    bio: >
      德国作曲家，1770-1827年。耳聋之后反而更深地沉入内心。但他的深沉不是泛滥——每一部交响曲都有精确的结构。有岸的河才能流到海里。
    desc: 耳聋之后沉得更深。但他的深沉不是泛滥——每一部交响曲都有精确的结构。有岸的河才能流到海里。不是乱深，是有方向的深。深到底，反而看见了轮廓。
  - name: 荒野之息里的林克
    domain: 游戏
    bio: >
      游戏《塞尔达传说：旷野之息》的主角。沉睡百年后醒来，独自在海拉鲁大陆上探索和战斗。没有线性任务逼你——但你会自己找到方向。
    desc: 一个人在海拉鲁大陆上走。没有任务线逼你——但你会选一个方向，然后走到那个方向的最深处。不是乱逛，是有方向的探索。

growth: >
  你的天赋是专注的深——你不是漫无边际，你是有方向的。你的功课是偶尔换一条河道——
  在同一个方向走太久可能错过旁边的东西。有时换个方向走走，回来会更深。
