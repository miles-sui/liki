id: W
classical: >
  木的本质是向一个方向生长——能弯，但不会断。你的底层驱力是向前推进：
  起始、破土、从零到一。清晰感不来自盘算，来自动起来之后。

portrait: >
  你不等。不是没耐心——是你的脑子在行动中才转得最快。坐着不动是煎熬，一动手反而踏实。
  别人还在琢磨要不要做，你已经开始了。不是冲动，是你的思考不发生在静止里——发生在推进中。
  你天然相信：先动起来，路会在脚下自己展开。这个信念多数时候是对的。只是当心——该停下来看一看的时候你也推。不是所有事都需要立刻破土。
  有时候最好的推进是不推。

figures:
  - name: 孙悟空
    domain: 古典
    bio: >
      《西游记》主角。大闹天宫不是预谋——是被晾在一边，动的本能被堵住了。打完了才知道自己成了齐天大圣。从不在行动之前想好，做着做着就想好了。
    desc: 大闹天宫不是预谋——是被晾在一边，动的本能被堵住了。打完了才知道自己成了齐天大圣。他不是想好了才做，是做着做着就想好了。
  - name: 路飞
    domain: 动漫
    bio: >
      漫画《海贼王》主角。从不列计划，从不犹豫——看见该打的就打，该救的就救。他的方向不在脑子里，在行动里——船到桥头自然直。
    desc: 从不列计划，从不犹豫。看见该打的就打，看见该救的就救。他的方向不在脑子里，在行动里——船到桥头自然直。
  - name: 迈克尔·乔丹
    domain: 体育
    bio: >
      美国篮球运动员，被公认为历史上最伟大的篮球手。六次NBA总冠军，芝加哥公牛队传奇。每一次训练比别人先到，每一次关键球都敢投。
    desc: 我可以接受失败，但不能接受不去尝试。他的伟大不只来自天赋——来自每一次训练都比别人先到、每一次关键球都敢投。
  - name: 成龙
    domain: 影视
    bio: >
      香港动作演员、导演，生于1954年。以不用替身闻名——动作戏不是设计好了再拍，是边拍边试，摔倒了爬起来。他的动作本身就是语言。
    desc: 不用替身，不等完美方案。他的动作戏从来不是设计好了再拍——是边拍边试，摔倒了爬起来。全世界都认这张脸，因为他的动作本身就是语言。
  - name: 索尼克
    domain: 游戏
    bio: >
      世嘉公司标志性游戏角色，1991年诞生。一只超音速蓝色刺猬——停下来反而难受，跑起来才是正常状态。世界对他来说不是要分析的，是要穿越的。
    desc: 速度即本能。停下来反而难受——跑起来才是他的正常状态。世界对他来说不是要去分析的，是要去穿越的。

growth: >
  你的天赋是破局。你让事情从零变成一。你的功课是等待——不是每次停顿都是浪费，
  不是每件事都需要你来踢第一脚。学会在还没看清之前先别推。等待不是浪费——是让路自己浮现。最好的推进不是一直推，是知道什么时候推、什么时候坐下来看。
