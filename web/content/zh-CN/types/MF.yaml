id: MF
classical: >
  金克火：规范者的筛选（M）制约发光者的在场辐射（F）。金曰从革——你的精准不是冷冰冰的；
  火曰炎上——它烧过，标准里有余温。克不是压制：是让精准经过人情，不伤人。

portrait: >
  你的精准不是冷冰冰的——它烧过。你的标准里有余温，因为你自己被推翻过、被要求过。
  精准，但不伤人。你是那种能挑出最狠的刺但对方不恨你的人——因为对方知道你是为了让他好。
  你不是挑剔机器——你是知道玻璃碎片会扎人、所以帮你捡干净的那个人。只是当心——你的火有时候不是淬是烧。不是每个人都准备好了被你的高温淬炼。偶尔降降温再挑——冷水里出不了好东西，但开水里也没有。

figures:
  - name: 乔布斯
    domain: 当代
    bio: >
      美国企业家，苹果公司联合创始人，1955-2011年。对产品极致挑剔，骂人骂到哭——但那些被他骂过的人后来说：他让我做到了自己以为做不到的事。标准里有余温。
    desc: 对产品极致挑剔，骂人骂到哭。但那些被他骂过的人后来说：他让我做到了我自己以为做不到的事。他的标准里有余温。
  - name: 布鲁斯·斯普林斯汀
    domain: 音乐
    bio: >
      美国摇滚歌手，生于1949年。人称"The Boss"。每一首歌的录制都要求完美到折磨人——但他的乐队跟了他几十年，因为他的精准不是冷的，是烧过的。
    desc: 每一首歌的录制都要求完美到折磨人的程度。但他的乐队跟了他几十年——因为他的精准不是冷的，是烧过的。
  - name: 里维
    domain: 动漫
    bio: >
      漫画《进击的巨人》中的"人类最强士兵"，调查兵团兵长。对部下的要求苛刻到变态——但每一个士兵都愿意为他死，因为他的标准底下是全队的安全。
    desc: 人类最强士兵，对部下的要求苛刻到变态——但每一个士兵都愿意为他死。因为他的标准底下是全队的安全。
  - name: 格雷格·波波维奇
    domain: 体育
    bio: >
      美国NBA传奇教练，生于1949年。圣安东尼奥马刺队主教练近三十年。在场边骂球员骂到裁判看不下去——但球员退役后都回来找他喝酒。精准不伤人。
    desc: 在场边骂球员骂到裁判都看不下去。但他的球员退役后都回来找他喝酒。精准不伤人——这是最难的事。
  - name: 战神里的奎托斯
    domain: 游戏
    bio: >
      游戏《战神》系列主角，斯巴达战士。对儿子阿特柔斯的要求比神还高——但每一句训斥底下都是保护。教他精准，是为了让他活下来。
    desc: 对儿子阿特柔斯的要求比神还高。但每一句训斥底下都是对儿子的保护。教他精准，是为了让他活下来。

growth: >
  你的天赋是温暖地挑剔。你的标准底下有人。你的功课是别烧太猛——
  不是每个人都准备好被你的火淬。有时要降温再挑——不是让你变冷，是让你找那个刚好能淬出好钢的温度。温的准绳比冰的标准更能让人长。
