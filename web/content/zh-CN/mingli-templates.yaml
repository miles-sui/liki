day_masters:
  "1":
    stem: "甲"
    element: "木"
    name: "甲木"
    portrait: "如参天大树——正直刚毅，有领导气质。甲木之人以德服人，坚守原则，不怒自威。他们通过稳健的成长实现目标，是天生的栋梁之才。"
  "2":
    stem: "乙"
    element: "木"
    name: "乙木"
    portrait: "如蜿蜒藤萝——灵活应变，柔韧持久。乙木之人善于在复杂环境中找到出路。他们是富有创造力的连接者，不强求直线前进，而是顺势而为，以柔克刚。"
  "3":
    stem: "丙"
    element: "火"
    name: "丙火"
    portrait: "如正午烈日——光芒四射，热情慷慨，令人无法忽视。丙火之人走到哪里就把光和热带到哪里。他们是天生的激励者，精力充沛，但需要足够的舞台绽放光芒。"
  "4":
    stem: "丁"
    element: "火"
    name: "丁火"
    portrait: "如烛火明灯——专注凝练，明察秋毫。丁火之人将能量聚焦于一点，格外敏锐。他们善于洞察本质，不为浮华所惑，追求有深度的事物而非表面的喧哗。"
  "5":
    stem: "戊"
    element: "土"
    name: "戊土"
    portrait: "如巍峨山岳——稳重可靠，厚德载物。戊土之人是他人信赖的靠山。他们行事稳健，看重忠诚，拥有不张扬的自信，一步一步构筑自己的城池。"
  "6":
    stem: "己"
    element: "土"
    name: "己土"
    portrait: "如沃野田园——滋养万物，包容接纳。己土之人善于培育他人成长。他们是富同理心的协调者，为身边的人创造扎根和繁盛的空间。"
  "7":
    stem: "庚"
    element: "金"
    name: "庚金"
    portrait: "如百炼成钢——果断刚毅，纪律严明。庚金之人以清晰的判断力斩断纷乱。他们崇尚规则与实力，一言九鼎，承诺即是契约。"
  "8":
    stem: "辛"
    element: "金"
    name: "辛金"
    portrait: "如精雕细琢的珠宝——优雅精致，一丝不苟。辛金之人对细节的把控近乎艺术。他们对自己要求极高，天性倾向于美、精致和恰如其分的事物。"
  "9":
    stem: "壬"
    element: "水"
    name: "壬水"
    portrait: "如浩瀚海洋——视野开阔，智慧通达，不可限量。壬水之人以全局眼光思考问题。他们是直觉敏锐的战略家，如水般绕开障碍，却总能抵达远方。"
  "10":
    stem: "癸"
    element: "水"
    name: "癸水"
    portrait: "如深潭静水——沉静深邃，直觉超群。癸水之人能洞察表象之下的本质。他们是安静的观察者，深度容易被低估，智慧如暗流涌动。"

match_levels:
  "上等匹配":
    label: "上等匹配"
    desc: "两命局五行互相呼应——天干相合、地支相助。五行元素天然互补，形成互生互助的良性关系。这是难得的良缘佳配。"
  "中等匹配":
    label: "中等匹配"
    desc: "整体契合度良好，关键维度有明确的连接。虽非每项皆完美，但核心元素良性互动，有扎实的基础和深化空间。"
  "一般":
    label: "一般"
    desc: "吉凶参半——有些维度表现出和谐，有些则显示摩擦。此关系可行但需要双方有意识地弥合差异。非命中注定，也非绝无可能。"
  "不合":
    label: "不合"
    desc: "多个维度存在显著的五行冲突。两命局在先天能量构成上差异较大。这并非意味着关系不可能，而是需要双方投入更多理解、包容与成长。"
