types:
  # 纯型 (×5)
  - id: W
    label: 开创者
    tagline: "不等风来，你就是风。"
  - id: F
    label: 发光者
    tagline: "你在场，温度就不一样。"
  - id: E
    label: 培育者
    tagline: "不是魔法，是每一天。"
  - id: M
    label: 规范者
    tagline: "过不了自己那关的，就不算数。"
  - id: R
    label: 蕴蓄者
    tagline: "沉得住，说得少，一说就中。"
  # 生序复合型 (×10)
  - id: WF
    label: 木火通明
    tagline: "你一动，别人就跟着动了。"
  - id: FE
    label: 火土相生
    tagline: "你的光不是一闪而过——是一个别人反复回来的壁炉。"
  - id: EM
    label: 土金相生
    tagline: "先接住一切，再理出头绪。"
  - id: MR
    label: 金水相生
    tagline: "先删掉没用的，剩下的再往深走。"
  - id: RW
    label: 水木相生
    tagline: "消化透了再动，一动就不回头。"
  - id: FW
    label: 火木相生
    tagline: "你照亮一个人的时候，对方自己就动了。"
  - id: EF
    label: 土火相生
    tagline: "靠在你这不累，反而像充电。"
  - id: ME
    label: 金土相生
    tagline: "你挑毛病，是为了让人长好。"
  - id: RM
    label: 水金相生
    tagline: "你的深沉不是漫无边际——底下有骨架。"
  - id: WR
    label: 木水相生
    tagline: "你的每一动，底下都攒够了分量。"
  # 克序复合型 (×10)
  - id: WE
    label: 木土相制
    tagline: "你往前推，但每一步都踩实了。"
  - id: FM
    label: 火金相制
    tagline: "你的光不乱照——照哪里、怎么照，心里筛过了。"
  - id: ER
    label: 土水相制
    tagline: "你能往深走，但不会走丢。"
  - id: MW
    label: 金木相制
    tagline: "不是不动——是不乱动。"
  - id: RF
    label: 水火相制
    tagline: "沉得深，但亮出来的每一句都值。"
  - id: EW
    label: 土木相制
    tagline: "你不是冲在最前面的——你是把地夯实的。"
  - id: MF
    label: 金火相制
    tagline: "精准但不冰冷。你的标准底下有余温。"
  - id: RE
    label: 水土相制
    tagline: "深而不滥。有岸，才能流得更远。"
  - id: WM
    label: 木金相制
    tagline: "你动的每一下，都是筛过的。"
  - id: FR
    label: 火水相制
    tagline: "你的光不刺眼——在底下沉够了才浮上来。"
