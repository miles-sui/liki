id: EM
classical: >
  Earth nourishes Metal: the Cultivator's steady receiving (E) transforms into the Refiner's
  invisible framework (M). Earth sows and reaps — you take things in first, and in the process
  of digesting them, structure emerges on its own. Not blueprint first, then build — build first,
  and the blueprint reveals itself in what you've built.

portrait: >
  You take things in — all of it — and then, quietly, order emerges. People mistake your receptivity
  for passivity until they notice the invisible scaffolding underneath everything you do. You don't
  announce your framework; you just live it, and over time people realize your decisions are never
  random. The messy project lands on your desk, and six months later it has bones — not because you
  imposed a structure, but because you worked it until the structure revealed itself. The shadow:
  you accept so much before sorting that you risk overload. Not everything that arrives deserves a
  place in your system.

figures:
  - name: Angela Merkel
    domain: Contemporary
    bio: >
      German physicist and politician, Chancellor of Germany 2005-2021. Navigated the
      Eurozone crisis, refugee wave, and Brexit — never rushed to pronounce, always processed first.
    desc: Eurozone crisis, refugee wave, Brexit — she never rushed to pronounce. She took it all in,
      processed, then delivered. Beneath the calm surface was a framework no one saw being built.

  - name: Eleanor Roosevelt
    domain: History
    bio: >
      American diplomat and activist, 1884-1962. Longest-serving First Lady of the United
      States. Redefined the role through steady, principled daily presence and built the framework for the Universal Declaration of Human Rights.
    desc: She redefined the role of First Lady not through grand pronouncements but through steady, principled daily presence — traveling, listening, and methodically building the framework for what became the Universal Declaration of Human Rights. Order emerged from her constancy, not from a pre-written blueprint.

  - name: Piccolo
    domain: Animation
    bio: >
      Character from Dragon Ball Z. Once a demon king, became Gohan's mentor and one of
      Earth's most reliable defenders. Never lectured — trained Gohan day by day until the student surpassed the master.
    desc: From demon king to Gohan's mentor. He never lectured — he trained Gohan day by day. A year
      later, Gohan was steadier than his own father. Order built through daily presence.

  - name: Derek Jeter
    domain: Sports
    bio: >
      American baseball player, born 1974. New York Yankees captain for over a decade.
      Never the most physically gifted, but always the most reliable — consistent, precise execution of fundamentals every single game.
    desc: The Yankees captain for over a decade, he was never the most physically gifted player on the field but was always the most reliable. His signature was the consistent, precise execution of fundamentals game after game, season after season — teammates knew Jeter would be exactly where he needed to be, every single time.

  - name: Isabelle
    domain: Gaming
    bio: >
      Beloved Shih Tzu secretary from the Animal Crossing video game series. Arrives in a
      new town and never issues decrees — waters flowers, picks weeds, talks to everyone. Structure through presence.
    desc: She arrives in a new town and doesn't issue decrees. She waters flowers, picks weeds, talks
      to everyone — and somehow the town runs better than it ever has. Structure through presence.

growth: >
  Your gift is order that emerges from practice — you don't draw blueprints, but blueprints draw
  themselves around you. Your work is to be selective about what you take in. Your framework is
  strong, but it doesn't need to hold everything.
