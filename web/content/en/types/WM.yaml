id: WM
classical: >
  Wood restrains Metal (reverse ke) — the Pioneer (W) drives the Refiner (M). In the standard
  cycle, Metal restrains Wood; here the direction is reversed. W's forward momentum pushes M's
  exacting standards into motion. Ke is not suppression: the filter is not removed — it is run at
  speed. Action does not bypass the sieve; it passes through it in real time. The move has already
  been vetted before it leaves you. What lands is not impulse — it is impulse that survived
  elimination.

portrait: >
  Your action passes through an internal checkpoint before it exits. You are not impulsive — by the
  time you move, the move is already aligned. You don't do a lot; you do the right thing, cleanly.
  Others may think you act fast, but what they don't see is the rapid elimination round that happens
  inside you first — ten options discarded before the one survives. Your output looks effortless
  because the effort was spent in the culling, not in the doing. You move clean, precise, decisive —
  no debris. Shadow side: the filter can become so efficient that it screens out spontaneity
  entirely. Not every worthwhile action survives a cost-benefit analysis in advance.

figures:
  - name: The Wright Brothers
    domain: History
    bio: >
      Orville and Wilbur Wright, American inventors and aviation pioneers. Years of wind-tunnel
      tests and glider experiments led to the first powered flight at Kitty Hawk in 1903.
    desc: Years of wind-tunnel tests, glider experiments, and meticulous notebooks — then one December
      morning at Kitty Hawk, a twelve-second flight that changed everything. The action was the visible
      tip of a mountain of filtered data.

  - name: Akira Kurosawa
    domain: Film & TV
    bio: >
      Japanese filmmaker, 1910-1998. Director of Seven Samurai, Rashomon, and Ran.
      Every frame composed like a painting — yet his films erupt with raw, unstoppable life.
    desc: Every frame composed like a painting, every movement choreographed to the millimeter. But
      the films erupt with life — rain-soaked battles, galloping horses, raw emotion. The precision
      is invisible; the impact is total.

  - name: Kylian Mbappe
    domain: Sports
    bio: >
      French footballer, born 1998. World Cup winner known for devastating speed — but
      his off-ball reading of the game is what makes the speed lethal. He runs the vector before his legs move.
    desc: His sprint is among the fastest in football, but watch his runs off the ball — he is
      already shaping his trajectory before the pass is played. The speed is dazzling; the reading
      of the game that precedes it is what makes the speed lethal. He ran the vector before his
      legs moved.

  - name: Sekiro
    domain: Gaming
    bio: >
      Protagonist of the video game Sekiro: Shadows Die Twice. A shinobi who dies and retries
      endlessly — each death eliminates one wrong move until only the perfect strike remains.
    desc: >
      You die. You die again. Each death teaches one thing: what not to do. By the time the blade
      lands, a thousand failures have been deleted. The final strike is not impulse — it is the one
      move that survived every filter the game could throw at it.

  - name: Ernest Hemingway
    domain: Literature
    bio: >
      American novelist and journalist, 1899-1961. Wrote with violent economy — every
      word fought for its place. His spare prose was the survivor of relentless deletion.
    desc: Wrote with an almost violent economy — every word had to fight for its place on the page.
      His prose feels spontaneous, but the drafts show a man who deleted more than he kept. The
      sentences that survived were the ones that couldn't be killed.

growth: >
  Your gift is filtered action — every move you make has already passed inspection. The edge to
  watch is over-filtering the unquantifiable: some of the best decisions don't survive a spreadsheet.
  Let a few moves through on instinct — the filter will still be there when you need it.
