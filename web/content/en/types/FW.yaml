id: FW
classical: >
  Fire nourishes Wood (reverse sheng): the Luminary's radiance (F) ignites the Pioneer's action (W)
  in others. Fire flares upward — your light doesn't only illuminate; it activates. This is the
  reversed order: the radiance is the source, and the movement is the result. You don't push people
  into motion — you light them up, and they start moving on their own.

portrait: >
  When your attention lands on someone, they start moving. You don't push — you illuminate, and the
  illumination itself becomes propulsion. You're not a motivational speaker in the traditional sense;
  you're someone whose genuine seeing of another person is electric. When you really look at someone —
  really see what they could be — something in them catches fire. The people you've touched don't
  say you convinced them. They say you saw them. That was enough. The shadow: not everyone is ready
  to be seen that clearly. Your light can overwhelm those who are still finding their own shape.

figures:
  - name: Oprah Winfrey
    domain: Film & TV
    bio: >
      American talk show host, media mogul, and philanthropist. Her television program
      ran for 25 years and made her one of the most influential women in the world.
    desc: She doesn't chase — the room reorganizes around her. When Oprah is present, people who
      had given up on themselves start believing again, not because she told them to, but because
      her belief in them is a force you can feel from across the room.

  - name: Helen Keller
    domain: History
    bio: >
      American author and activist, 1880-1968. Deaf and blind from infancy, she became
      a world-renowned advocate for disability rights, women's suffrage, and social justice.
    desc: Deaf and blind, she couldn't see or hear — yet her presence ignited movements. Her teacher
      Anne Sullivan lit her up first; then she lit up the world.

  - name: Naruto Uzumaki
    domain: Animation
    bio: >
      Protagonist of the manga and anime series Naruto. An orphaned outcast who befriends
      enemies through relentless warmth and becomes the leader of his village.
    desc: He doesn't defeat his enemies — he befriends them. His warmth is so relentless, so unwilling
      to give up on anyone, that it rewrites the logic of the world around him. People don't follow
      Naruto because he gives orders; they follow because his light makes them believe they can change.

  - name: Jürgen Klopp
    domain: Sports
    bio: >
      German football manager. Led Borussia Dortmund and Liverpool FC to major titles with
      charismatic, high-intensity football; revered for his emotional bond with players and fans.
    desc: His players don't run for him out of fear — they run because he believes in them so visibly
      that they start believing it too. His faith in people is an engine.

  - name: Mario
    domain: Gaming
    bio: >
      Nintendo's iconic video game character, created in 1981. A plumber who jumps, breaks
      blocks, and restores light to darkened worlds across decades of adventures.
    desc: He doesn't give orders. He arrives in a darkened world and just starts moving — jumping,
      breaking blocks, restoring color. By the end, the whole kingdom has been activated by his
      unstoppable presence.

growth: >
  Your gift is ignition — you don't push people, you light them. Your work is to read readiness.
  Not everyone is prepared to be seen that fully. Sometimes your light arrives before they're ready
  to move — give them time to catch up.
