id: RM
classical: >
  Water nourishes Metal (reverse sheng): the Reservoir's depth (R) generates the Refiner's structure
  (M). Water soaks downward — but your depth is not boundless drift; when it hits bottom, a
  framework crystallizes. This is the reversed order: depth isn't for getting lost — it's for
  building something that holds. You go deep with a blueprint in your pocket.

portrait: >
  Your depth has architecture. You don't drift in open water — you sink with intention, and what
  surfaces has bones. While others get lost in introspection, you come back with floor plans. Your
  inner life isn't an escape — it's a construction site. People mistake your stillness for absence,
  but you're not absent at all; you're in the deep, assembling. When you finally speak, what you
  say has structure: not random insights, but an integrated view. The shadow: not every deep dive
  needs to produce something. Sometimes the point of being in the water is just being in the water.

figures:
  - name: Carl Jung
    domain: Science
    bio: >
      Swiss psychiatrist, 1875-1961. Founded analytical psychology. Went deeper into the
      psyche than anyone — collective unconscious, archetypes, the Red Book. Depth that built a framework, brick by brick.
    desc: He went deeper into the psyche than anyone — collective unconscious, archetypes, the Red
      Book. But he didn't wander. He built analytical psychology from the depths, brick by brick.

  - name: Christopher Nolan
    domain: Film & TV
    bio: >
      British-American filmmaker, born 1970. Director of Inception, Interstellar, and
      Oppenheimer. Every film swims in deep philosophical waters — but each one has an exquisitely precise structure.
    desc: Inception, Interstellar, Tenet — every film swims in deep philosophical waters. But each
      one has an exquisitely precise structure. His depth wears an architect's hard hat.

  - name: Michael Phelps
    domain: Sports
    bio: >
      American swimmer, born 1985. Most decorated Olympian of all time with 28 medals.
      Spent more time underwater than above it — every stroke calibrated, every turn measured to the millisecond.
    desc: He spent more time underwater than above it. Every stroke calibrated, every turn measured
      to the millisecond. The medals weren't won on race day — they were forged in the thousands
      of hours of silent, structured depth.

  - name: Rei Ayanami
    domain: Animation
    bio: >
      Character from the anime Neon Genesis Evangelion. Barely speaks, but when she does,
      each word carries the weight of an entire inner architecture — depth built in silence that you feel in every chosen word.
    desc: She barely speaks, but when she does, the words carry the weight of an entire inner
      architecture. Her depth isn't chaos — it's a structure she's been building in silence. You
      don't see the scaffolding, but you feel it in every word she chooses to say.

  - name: The Shrine Designers (Zelda)
    domain: Gaming
    bio: >
      The ancient Sheikah monks who built the shrines in The Legend of Zelda: Breath of
      the Wild. Every shrine is a deep puzzle — but every one has a logic, an exit, a solution. Depth built to lead through, not to trap.
    desc: Every shrine is a deep puzzle — but every one has an exit, a logic, a solution. They aren't
      built to trap you in confusion; they're built to lead you through depth into clarity.

growth: >
  Your gift is depth that builds — where others get lost, you construct. Your work is to let
  yourself float sometimes. Not every descent needs a blueprint. Some dives are just for being in
  the water.
