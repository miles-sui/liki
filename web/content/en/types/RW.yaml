id: RW
classical: >
  Water nourishes Wood: the Reservoir's deep processing (R) fuels the Pioneer's decisive action (W).
  Water soaks downward — you digest things in the depths before surfacing. This accumulated force
  lifts Wood, giving every move weight. Not impulse — it's been turning below the surface for a
  long time, and now it can't wait any longer.

portrait: >
  You process long, and then you act clean. What looks sudden to others has been turning in the
  depths for weeks, months, sometimes years. Every move you make has ballast — something underneath
  holding it steady. You're not someone who acts casually, and when you finally do move, people
  know it wasn't a whim. The explanation happened long before the action; the action itself is just
  the visible tip. Don't hide that. Let people see the depth that came before the move — it's what
  gives your action its weight. The shadow: you can sit so long in the deep that the window closes.
  Not every move needs perfect clarity beforehand.

figures:
  - name: Nelson Mandela
    domain: History
    bio: >
      South African anti-apartheid leader, 1918-2013. Imprisoned for 27 years, then became
      his country's first Black president. When he walked out, he didn't carry resentment — he had processed it all in the deep.
    desc: Twenty-seven years in prison. When he walked out, he didn't carry resentment — he had
      processed it all. His first step into freedom had twenty-seven years of depth beneath it.

  - name: Mob
    domain: Animation
    bio: >
      Protagonist of the manga and anime Mob Psycho 100. Immense psychic power held behind
      a quiet, unassuming face. Absorbs, processes, and only acts when every other option is exhausted — then the world shifts.
    desc: Immense psychic power held behind a quiet, unassuming face. He doesn't erupt — he absorbs,
      processes, and only when every other option is exhausted does he act. And when he does, the
      world shifts.

  - name: Joni Mitchell
    domain: Music
    bio: >
      Canadian singer-songwriter and painter, born 1943. Her songs don't arrive — they
      surface after turning in the depths for years. Blue and Court and Spark redefined what popular music could hold.
    desc: Her songs don't arrive — they surface. Each one has been turning in the depths for years,
      accruing weight. When she finally sings it, the silence before the first note is as heavy as
      the note itself.

  - name: Kareem Abdul-Jabbar
    domain: Sports
    bio: >
      American basketball player, born 1947. NBA's all-time leading scorer for 39 years.
      Quiet, bookish, deeply thoughtful — and the skyhook, the most unstoppable shot in basketball history, was years of solitary refinement.
    desc: Quiet, bookish, deeply thoughtful — and the most unstoppable shot in basketball history. The
      skyhook wasn't flash; it was years of solitary refinement. Depth and action fused into one
      unblockable arc.

  - name: Solid Snake
    domain: Gaming
    bio: >
      Protagonist of the Metal Gear Solid video game series. Before every mission, the
      codec rings — he listens, processes, asks the hard questions. Then he moves alone, carrying the weight of everything he's absorbed.
    desc: Before every mission, the codec rings. He listens, processes, asks the hard questions. Then
      he moves — alone, precise, carrying the weight of everything he's absorbed. The action is just
      the last step in a long chain of depth.

growth: >
  Your gift is the weight behind your action — every move is earned in the deep. Your work is to
  know when enough processing is enough. Sometimes sixty percent certainty is all you get. The other
  forty reveals itself only after you move.
