id: ER
classical: >
  Earth restrains Water — the Cultivator (E) gives banks to the Reservoir (R). Earth sows and reaps,
  turning each day into solid ground; Water sinks and accumulates, reaching depth through stillness.
  Ke is not suppression: the depth is held by daily action. You can go deep without getting lost,
  because what you contemplate is tethered to what you do every day.

portrait: >
  You go deep, but you don't go missing. When others spiral into anxiety, you are still — not because
  you can't think deeply, but because your thinking is caught by the rhythm of your days. You are the
  kind of person whose absence is felt as a loss of gravity — an anchor people didn't realize was
  holding the room in place. Your depth doesn't float away into abstraction; it's fastened to real
  soil. You are not the philosopher lost in the clouds; you are the farmer whose hands are in the
  dirt while the mind travels far. Shadow side: your groundedness can become rigidity — the daily
  rhythm that keeps you sane can also keep you from ever breaking the surface.

figures:
  - name: Marcus Aurelius
    domain: History
    bio: >
      Roman emperor, 121-180 AD. His Meditations — the foundational text of Stoic philosophy —
      were written in the margins of military campaigns, not in a library. Deep thought grounded by daily duty.
    desc: Emperor of Rome, steward of an empire — yet his Meditations were written in the margins of
      military campaigns, not in a library. His deepest thoughts were not escapes from duty but
      the byproduct of showing up every day to a job he never asked for.

  - name: Guillermo del Toro
    domain: Film & TV
    bio: >
      Mexican filmmaker, born 1964. Director of Pan's Labyrinth and The Shape of Water.
      His imagination plumbs the deepest wells of myth and monster — yet every frame is built with painstaking daily craftsmanship.
    desc: His imagination plumbs the deepest wells of myth, monster, and memory — yet every creature and every frame is built with painstaking daily craftsmanship. He fills notebooks with obsessive sketches, grounding his wildest visions in the rhythm of hands at a workbench. Depth that never floats away from the soil.

  - name: Serena Williams
    domain: Sports
    bio: >
      American tennis player, born 1981. 23 Grand Slam singles titles — the most in the
      Open Era. The deepest well of competitive intensity in tennis, banked by decades of showing up when no one was watching.
    desc: The deepest well of competitive intensity in tennis history, but what made it count was the daily grind — practice courts, rehab sessions, decades of showing up when no one was watching. Her fire never burned out because it was banked by the discipline of a woman who treated every Tuesday practice like a final.

  - name: J.R.R. Tolkien
    domain: Literature
    bio: >
      English writer and philologist, 1892-1973. Author of The Lord of the Rings. Built
      an entire mythology — languages, genealogies, creation myths — while grading exams and raising four children.
    desc: Built an entire mythology — languages, genealogies, creation myths — but he did it while
      grading exam papers at Oxford and raising four children. Middle-earth was not a burst of
      inspiration; it was a lifetime of daily, patient accretion.

  - name: David Attenborough
    domain: Contemporary
    bio: >
      British broadcaster and natural historian, born 1926. For over seven decades has
      traveled the planet narrating the lives of creatures most people will never see — the deepest naturalist of our time, anchored by the daily craft of television.
    desc: For over seven decades he has traveled the planet narrating the lives of creatures most people will never see — but his wonder never drifts into abstraction. Every script is researched, every fact checked, and the daily rhythm of production anchors his vast knowledge in something tangible. The deepest naturalist of our time, held steady by the practical craft of television.

growth: >
  Your gift is anchored depth — you can think as far as you want because your feet are on the ground.
  The edge to watch is forgetting to loosen the tether. Not every day needs to mean something;
  some days are for drifting. Drift is not waste — it's how the depth replenishes.
