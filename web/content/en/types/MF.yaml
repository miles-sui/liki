id: MF
classical: >
  Metal restrains Fire (reverse ke) — the Refiner (M) tempers the Luminary (F). In the standard
  cycle, Fire restrains Metal; here the direction is reversed. M's precision focuses F's expansive
  radiance into something selective, earned. Ke is not suppression: the standard is not cold —
  it was forged in the very fire it now channels. This precision carries residual warmth: it has
  burned, broken, and been rebuilt before it became a measure. The result is a demanding presence
  that does not wound.

portrait: >
  Your precision is not clinical — it has been through the flame. The standards you hold others to
  are standards you have first held yourself against, and the burn marks show. You are the person
  who can deliver the sharpest critique in the room and still have the recipient thank you, because
  it is obvious the blade was heated before it cut. You are not a cold filtering machine running
  a checklist;
  you are someone who knows exactly how much it hurts to be on the receiving end of a standard, and
  you deliver it anyway — not to wound, but to forge. Shadow side: your fire-tempered precision can
  burn someone who isn't ready for it. Not everyone's metal needs forging at the temperature you
  bring to the table.

figures:
  - name: Abraham Lincoln
    domain: History
    bio: >
      16th President of the United States, 1809-1865. Held the Union together through
      the Civil War. His steel resolve had been through the fire of his own deep depression, and it showed in every tempered word.
    desc: Held the Union to an almost impossible standard — preservation at any cost — but his
      letters to grieving families and defeated generals radiate a warmth that only deep personal
      suffering can produce. The steel of his resolve had been through the fire of his own
      depression, and it showed in every tempered word.

  - name: Bruce Springsteen
    domain: Music
    bio: >
      American singer-songwriter, born 1949. "The Boss." Demands perfection in the studio
      yet his E Street Band has stayed with him for decades — precision that burns hot, but burns for the song.
    desc: Demands perfection in the studio — takes after take, arrangement after arrangement — yet
      his E Street Band has stayed with him for decades. The precision is real, but so is the
      brotherhood. His standards burn hot, but they burn for the song, never against the players.

  - name: Naomi Osaka
    domain: Sports
    bio: >
      Japanese-Haitian tennis player, born 1997. Four-time Grand Slam champion. Known for
      setting extremely high standards for herself while advocating openly for mental health — precision that is self-directed fire.
    desc: Known for setting extremely high standards for herself — pulling out of tournaments to
      protect her mental health, demanding excellence on her own terms. Yet her public vulnerability
      and quiet kindness have made her beloved. Her precision is self-directed fire, and the warmth
      she radiates in her advocacy is unmistakable.

  - name: James Baldwin
    domain: Literature
    bio: >
      American novelist, essayist, and civil rights voice, 1924-1987. Author of The Fire
      Next Time and Giovanni's Room. His sentences cut like a scalpel — but the hand that held the blade had bled.
    desc: His sentences cut like a scalpel, but the hand that held the blade was a hand that had
      bled. He could dissect American racism with surgical clarity because he had lived inside the
      wound. The precision was devastating; the warmth was what made the devastation bearable.

  - name: Olivia Colman
    domain: Film & TV
    bio: >
      English actor, born 1974. Academy Award winner for The Favourite. Brings surgical
      emotional precision to every role — yet off-screen radiates a disarming warmth, apologizing through every acceptance speech.
    desc: Brings a surgical emotional precision to every role — she can pivot from comedy to
      devastation in a single line reading. Yet off-screen she radiates a disarming warmth,
      apologizing through every acceptance speech, genuinely moved. Her exacting craft never comes
      at the expense of her humanity.

growth: >
  Your gift is warm precision — your blade cuts clean because it was heated before it touched skin.
  The edge to watch is temperature mismatch: not everyone is at a forge-ready stage. Some people
  need the standard delivered at a lower heat before they can withstand your full flame.
