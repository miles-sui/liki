id: E
classical: >
  Earth sows, transforms, and harvests — the full cycle from seed to fruit. In the circular flow of qi, it sits at the pivot, the axis where rising meets descending and direction turns. Its transformation is transformation itself: digesting, converting, making one thing into another. Your core drive is catching — taking raw material and turning it into something that works.

portrait: >
  You're not the loudest person in the room. You're the one who shows up every day, does the work, doesn't skip steps. Someone hands you a mess, and a while later, the mess is a system. It's not magic — it's daily, unglamorous persistence. You don't chase speed; you chase completion. You don't need the spotlight; you need to hand something over and say, honestly, I gave it everything. Just be careful — not every broken thing is yours to fix. You only have one field. Till it well before you take on someone else's.

figures:
  - name: Florence Nightingale
    domain: History
    bio: >
      British nurse, 1820-1910. Founder of modern nursing. Walked Crimean War hospital wards
      at night, lamp in hand, methodically transforming battlefield care from death traps into places of healing.
    desc: She didn't give speeches — she walked the wards at night, lamp in hand, checking every bed. She turned battlefield hospitals from death traps into places of healing, not with genius but with methodical, daily care.

  - name: Tom Hanks
    domain: Film & TV
    bio: >
      American actor, born 1956. Two-time Academy Award winner. Not the flashiest — but
      Hollywood's most trusted. His career is a garden tended season after season, not a firework.
    desc: Not the flashiest actor in Hollywood — but the one everyone trusts. He plays ordinary people who take chaos and quietly turn it into something bearable. His career isn't a firework; it's a garden, tended season after season.

  - name: Tim Duncan
    domain: Sports
    bio: >
      American basketball player, born 1976. Nicknamed "The Big Fundamental." Five NBA
      championships with the San Antonio Spurs across two decades of quiet, relentless excellence.
    desc: The Big Fundamental. Never the fastest, never the loudest — but he treated every possession like a row to be hoed. Five rings didn't come from highlights; they came from showing up and doing the work two decades straight.

  - name: Samwise Gamgee
    domain: Literature
    bio: >
      Samwise Gamgee from J.R.R. Tolkien's The Lord of the Rings. The only member of the
      Fellowship who never broke. Not the hero — the one who made the hero possible.
    desc: The only member of the Fellowship who never broke, never wavered, never stopped carrying the weight. When Frodo couldn't walk, Sam carried him. He's not the hero of the story — he's the one who made the hero possible.

  - name: Link
    domain: Gaming
    bio: >
      Hero of The Legend of Zelda video game series. Never gives speeches. Sharpens the
      sword, stocks the pouch, and saves Hyrule one room, one puzzle, one swing at a time.
    desc: He doesn't give speeches. He sharpens the sword, stocks the pouch, and walks into every dungeon the same way — prepared. Hyrule doesn't get saved in one dramatic moment. It gets saved one room, one puzzle, one swing at a time.

growth: >
  Your gift is finishing. You turn chaos into order, raw into ready. Your work is learning to say no — not every field needs your plow. Your seeds are finite. Choose the ground that can actually bear fruit, and let the rest lie fallow.
