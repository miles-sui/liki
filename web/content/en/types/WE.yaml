id: WE
classical: >
  Wood restrains Earth — the Pioneer (W) is grounded by the Cultivator (E). Wood bends and straightens,
  reaching forward; Earth sows and reaps, grounding each stride. Ke is not suppression: the urge to push ahead
  is channeled onto steady ground. Every forward impulse lands on something solid — no leaps taken without
  earth beneath the feet.

portrait: >
  You push forward, but never recklessly. Your momentum doesn't make people nervous — the ground has been
  compacted before you move. Every step forward is a step that lands. You are not the person who charges
  in blind; you check what you're standing on first. It's not slowness, it's sureness. Where others sprint
  and stumble, you advance like a bulldozer — steady, unstoppable, every inch pressed flat behind you.
  Shadow side: you can spend so long compacting the ground that the moment to advance passes you by.

figures:
  - name: Dwight D. Eisenhower
    domain: History
    bio: >
      American general and 34th U.S. President, 1890-1969. Planned the D-Day invasion over
      a year of weather data and logistics — the push was immense, the preparation more so.
    desc: Planned the largest amphibious invasion in history without rushing a single detail. D-Day
      was not a gamble — it was a year of weather data, logistics tables, and deception campaigns
      before anyone set foot on sand. The push was immense; the preparation was more immense.

  - name: Bong Joon-ho
    domain: Film & TV
    bio: >
      South Korean filmmaker, born 1969. Director of Parasite, Snowpiercer, and The Host
      — wild, genre-bending visions that never lose control because every frame is meticulously storyboarded.
    desc: Parasite, Snowpiercer, The Host — wild, genre-bending visions that never lose control.
      Every chaotic frame is storyboarded within an inch of its life. The audacity lands because
      the craft underneath it is solid.

  - name: Eliud Kipchoge
    domain: Sports
    bio: >
      Kenyan marathon runner, born 1984. First human to run a marathon under two hours —
      a staggering feat built on years of methodical, unglamorous preparation and a team of rotating pacemakers.
    desc: >
      First human to run a marathon under two hours. The feat was staggering — but behind it: a
      team of rotating pacemakers, a custom-designed course, and years of methodical, unglamorous
      preparation. The breakthrough was built on ground so compacted it couldn't fail.

  - name: Peter Parker (Marvel's Spider-Man)
    domain: Gaming
    bio: >
      The Spider-Man of Marvel's New York, featured in Insomniac's video game series.
      Swings through Manhattan with breathtaking momentum — every landing anchored in protecting the people below.
    desc: He swings through Manhattan with breathtaking momentum — but every landing, every web shot,
      is anchored in protecting the people below. Action in service of care. The city holds him as
      much as he holds it.

  - name: Katherine Johnson
    domain: Science
    bio: >
      American mathematician, 1918-2020. Her trajectory calculations were the ground beneath
      every Apollo mission. The astronauts soared; the certainty came from her decimal-by-decimal work.
    desc: Her calculations were the ground beneath every Apollo mission. While the astronauts soared,
      she stayed at her desk, checking and rechecking the numbers. The glory was in the launch; the
      certainty came from her. One decimal at a time.

growth: >
  Your gift is grounded momentum — every push lands because the ground was prepared. The edge to watch
  is over-preparation: sometimes the ground is firm enough, and you're still tamping. Not every step
  needs compression to one hundred percent before you take it.
