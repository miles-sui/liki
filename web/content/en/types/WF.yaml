id: WF
classical: >
  Wood nourishes Fire: the Pioneer's forward momentum (W) generates the Luminary's radiant presence (F).
  Wood bends and straightens — your action itself is the signal. This drive fans the flame,
  spreading energy outward without effort. You don't persuade — you move, and the movement itself
  becomes contagious.

portrait: >
  You start something, and people just start moving. Not because you asked — because your momentum
  is a signal. You're not the loudest in the room, but you're often the first one in motion, and
  that motion has a gravity of its own. Others catch your energy the way a room catches light when
  someone opens the blinds. Your influence doesn't run through words — it runs through velocity.
  The shadow: sometimes you're already three steps ahead and haven't checked if anyone's still with you.
  Not every hill needs charging — some need circling first.

figures:
  - name: Harriet Tubman
    domain: History
    bio: >
      American abolitionist, c.1822-1913. Escaped slavery, then returned 13 times to
      lead others to freedom via the Underground Railroad. Never lost a single passenger.
    desc: She didn't campaign for abolition — she went back thirteen times and led people out. No
      speeches, no manifestos. Her courage was so complete that it made others brave simply by
      standing next to her.

  - name: Pelé
    domain: Sports
    bio: >
      Brazilian footballer, 1940-2022. Won three FIFA World Cups and scored over 1,200
      goals. His pure joy on the pitch changed how the entire world saw the beautiful game.
    desc: He played with a joy so pure it changed how the world saw the game. He didn't tell anyone to
      love football — he ran, and the stadium ran with him. Action as invitation.

  - name: Monkey D. Luffy
    domain: Animation
    bio: >
      Protagonist of the manga and anime One Piece. A pirate captain who never recruits —
      he just charges toward his dream, and people join because his momentum is irresistible.
    desc: He doesn't recruit crewmates with speeches. He just charges toward his dream, and one by
      one, people see his momentum and decide they want to be part of it.

  - name: Tracer
    domain: Gaming
    bio: >
      Hero from the video game Overwatch. A time-jumping British pilot who never stops
      moving; her relentless optimism and speed lift everyone around her.
    desc: Never stops moving, never stops lifting the team. Her energy isn't a tactic — it's who she
      is, and it's contagious. "The world could always use more heroes" — and she makes you want to
      be one.

  - name: Lin-Manuel Miranda
    domain: Music
    bio: >
      American composer, actor, and playwright. Created the Broadway musicals Hamilton
      and In the Heights; rapped the first Hamilton song at the White House before the rest existed.
    desc: He didn't wait for Broadway to invite him. He wrote Hamilton in motion — rapping the first
      song at the White House before the rest even existed. The momentum pulled everyone in.

growth: >
  Your gift is ignition — you move first, and the world follows. Your work is to check direction
  mid-stride. Pause and look back: are they running toward where you meant to go?
