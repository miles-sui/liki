id: MR
classical: >
  Metal nourishes Water: the Refiner's filtering (M) clears space for the Reservoir's depth (R).
  Metal cuts and reforms — you remove what doesn't matter first, and only then do you sink into
  what remains. The filtering isn't the point — it's what makes the depth possible. Cut the noise,
  and the signal opens all the way down.

portrait: >
  You don't do surface. First you cut away what doesn't belong — then you go deep on what's left.
  In the conversations that matter, you're quiet for long stretches, and when you finally speak,
  what you say becomes the center of gravity for everyone else. You're not interested in everything —
  you're deeply interested in a few things, and that intensity is palpable. Your depth is earned:
  you had the discipline to say no to eighty percent so you could say yes completely to the twenty.
  The shadow: sometimes you cut too soon. Not everything worthless on the surface is empty underneath —
  some things need time to reveal their depth.

figures:
  - name: Joan Didion
    domain: Literature
    bio: >
      American writer, 1934-2021. Essayist, novelist, and screenwriter. Every sentence
      cut to the bone — she stripped away until only what was necessary remained. What she deleted was ten times what she published.
    desc: Every sentence was cut to the bone. She didn't over-write — she stripped away until only
      what was necessary remained. What she deleted was ten times what she published.

  - name: Marie Kondo
    domain: Contemporary
    bio: >
      Japanese organizing consultant and author, born 1984. Built a global movement on a
      single question: does this spark joy? Her genius was the clarity to know what to keep and the courage to let everything else go.
    desc: >
      She built a global movement on a single question: does this spark joy? Her genius wasn't
      tidying — it was the clarity to know what to keep and the courage to let everything else go.

  - name: Ichiro Suzuki
    domain: Sports
    bio: >
      Japanese baseball player, born 1973. MLB single-season hits record holder. His
      pre-at-bat routine was identical for twenty years — every distraction deleted before the pitch arrived.
    desc: His pre-at-bat routine was identical for twenty years — every stretch, every swing, every
      pause. That ritual wasn't superstition; it was a filter. By the time the pitch arrived, every
      distraction had already been deleted. What remained was pure contact.

  - name: Shikamaru Nara
    domain: Animation
    bio: >
      Genius strategist from the manga and anime Naruto. Looks lazy — lying in the grass,
      watching clouds. But beneath the stillness, he's already run ten thousand scenarios and discarded all but one.
    desc: He looks lazy — lying in the grass, watching clouds. But beneath that stillness, he's already
      run ten thousand scenarios and discarded all but one. The genius isn't in thinking fast; it's in
      eliminating everything that doesn't lead to the outcome.

  - name: Commander Shepard
    domain: Gaming
    bio: >
      Protagonist of the Mass Effect video game trilogy. The fate of the galaxy on their
      shoulders, and every decision was clean — because the irrelevant had already been cut away long before the moment arrived.
    desc: The fate of the galaxy on their shoulders, and every decision was clean. No hesitation —
      because the irrelevant had already been cut away long before the moment arrived.

growth: >
  Your gift is focus — you put your energy where it counts most. Your work is to leave the door
  slightly open. Some things look useless at first and turn out to be seeds. Don't cut them all.
