id: RE
classical: >
  Water restrains Earth (reverse ke) — the Reservoir (R) channels the Cultivator (E). In the
  standard cycle, Earth restrains Water; here the direction is reversed. R's accumulated depth
  provides direction for E's daily action. Ke is not suppression: daily effort without depth is
  scattered. With depth as its channel, action flows where it matters — focused, directed, each
  day's work digging the same riverbed deeper rather than starting a new one every morning.

portrait: >
  You go deep, but you don't flood. There is a channel inside you — a direction — and the depth
  follows it rather than spreading in all directions. The banks that limit where you go are exactly
  what let you go so far. You are not the person who wants to explore everything; you chose a single
  riverbed long ago and you have been digging it deeper ever since. Your profundity is not scattered —
  it is concentrated, like a canyon carved by water that never diverted. Shadow side: your channel
  can become a trench. The same focus that lets you go deeper than anyone else can also keep you from
  noticing that another river, just over the ridge, is flowing toward the same sea.

figures:
  - name: Albert Einstein
    domain: History
    bio: >
      German-born theoretical physicist, 1879-1955. Developed the theory of relativity
      and won the 1921 Nobel Prize. Spent a decade chasing general relativity down a single channel — the equivalence principle.
    desc: Spent a decade chasing general relativity down a single channel — the equivalence principle.
      He did not flit between topics; he dug into one question until the structure of spacetime
      yielded. The channel was narrow; the depth was universe-altering.

  - name: Ursula K. Le Guin
    domain: Literature
    bio: >
      American science fiction and fantasy author, 1929-2018. Built Earthsea and the
      Hainish Cycle over decades, returning to the same worlds and deepening them with each book. Said more in a novella than most do in a trilogy.
    desc: Built Earthsea and the Hainish Cycle over decades, returning to the same worlds and
      deepening them with each book rather than starting new ones every time. Her prose is economical
      and precise — she said more in a novella than most novelists do in a trilogy. The channel was
      speculative fiction, and she dug it deeper than anyone.

  - name: Katie Ledecky
    domain: Sports
    bio: >
      American swimmer, born 1997. Multiple Olympic gold medalist in distance freestyle
      events. Chose one lane and outworked everyone in it for over a decade — her channel is narrow, and she owns it completely.
    desc: Swims the long distances — the 800, the 1500 — events that reward sustained, channeled
      effort over flash. She has held world records for years not because she is the fastest in a
      sprint but because she has chosen one lane and outworked everyone in it for over a decade. Her
      channel is distance freestyle, and she owns it completely.

  - name: Wes Anderson
    domain: Film & TV
    bio: >
      American filmmaker, born 1969. Director of The Grand Budapest Hotel and Moonrise
      Kingdom. Instantly recognizable from a single frame — symmetrical, pastel, deadpan. Not interested in everything; interested in one thing more perfectly than anyone.
    desc: Makes films that are instantly recognizable from a single frame — symmetrical compositions,
      pastel palettes, deadpan delivery. He is not interested in doing everything; he is interested
      in doing one thing more perfectly than anyone ever has. The channel is narrow; the aesthetic
      world inside it is complete.

  - name: The Wanderer
    domain: Gaming
    bio: >
      Protagonist of the video game Shadow of the Colossus. Crosses a vast empty land with
      a single purpose — to fell sixteen colossi and revive the one he loves. The channel is narrow, and he walks it to its devastating end.
    desc: In Shadow of the Colossus, crosses a vast empty land with a single purpose — to fell every
      colossus and revive the one he loves. He does not explore for exploration's sake; every ride
      across the silent plain is directed toward the next giant. The channel is narrow — sixteen
      colossi, one goal — and he walks it to its devastating end.

growth: >
  Your gift is channeled depth — you don't spread thin, and you go further because of it. The edge
  to watch is never looking over the bank: the same channel that carved your depth may be missing a
  tributary worth taking. Sometimes detour enriches the destination more than discipline does.
