id: MW
classical: >
  Metal restrains Wood — the Refiner (M) focuses the Pioneer (W). Metal cuts and selects, choosing
  what meets the standard; Wood bends and pushes, eager to act. Ke is not suppression: the impulse
  to move is not killed, only channeled. You wait until the measuring rod confirms the spot, and
  then you move — not before. Action filtered is action amplified.

portrait: >
  You are not reluctant to act — you are unwilling to act randomly. The pause before you move is not
  hesitation; it's calibration. When you finally do move, you don't need to explain yourself, because
  the logic is already baked in. Others may read your stillness as slowness, but it's not slowness —
  it's aiming. You are the sniper, not the spray-gunner. The moment of release may be the fastest
  thing anyone has ever seen, but everything before it was stillness, measurement, breath. Shadow side:
  your calibration can become paralysis — you may wait for the perfect spot that never arrives, while
  a good-enough opening closes.

figures:
  - name: Leonardo da Vinci
    domain: History
    bio: >
      Italian Renaissance polymath, 1452-1519. Painter of the Mona Lisa, engineer, anatomist.
      Dissected cadavers to understand every tendon before painting a single finger — observation first, execution last.
    desc: He dissected cadavers to understand every tendon before painting a single finger. The
      Mona Lisa took sixteen years — not because he was slow, but because he refused to lay down
      a brushstroke until his eye said yes. Observation came first; execution was the last step.

  - name: Stanley Kubrick
    domain: Film & TV
    bio: >
      American filmmaker, 1928-1999. Director of 2001: A Space Odyssey, The Shining, and
      Dr. Strangelove. Shot 97 takes of a door walk — not indecision, but knowing exactly what he wanted and refusing to settle.
    desc: Shot ninety-seven takes of a man walking through a door — not from indecision, but because
      he knew exactly what he wanted and would not settle. Every frame in his films is a decision
      that survived an internal gauntlet most directors never run.

  - name: Jack Nicklaus
    domain: Sports
    bio: >
      American golfer, born 1940. Record 18 major championship wins. Studied every course
      before playing it — his pre-shot routine was a ritual of calibration. Eighteen majors built on a mind that ran every filter before releasing the club.
    desc: Studied every course before he played it — his pre-shot routine was a ritual of
      calibration, his course management legendary. He didn't swing until every variable was
      accounted for. Eighteen majors were not the product of athleticism alone but of a mind that
      ran every filter before releasing the club.

  - name: Aloy
    domain: Gaming
    bio: >
      Protagonist of the Horizon video game series. Scans every machine with her Focus before
      engaging — cataloging weak points and vulnerabilities. Every arrow is the final step of a process that began with silent observation.
    desc: Scans every machine with her Focus before engaging — cataloging weak points, elemental
      vulnerabilities, and terrain advantages. She does not rush into a Thunderjaw fight hoping to
      figure it out mid-battle. Every arrow is the final step of a process that began with silent
      observation.

  - name: Ada Lovelace
    domain: Science
    bio: >
      English mathematician, 1815-1852. The world's first computer programmer. Saw that
      Babbage's Analytical Engine was not a calculator but a platform for computation — identified the pattern before anyone had the vocabulary.
    desc: Saw that Babbage's Analytical Engine was not a calculator but a platform for computation —
      she identified the pattern before anyone else had the vocabulary for it. Her notes on the
      machine anticipated algorithmic thinking, computing, and even artificial music — all because
      she paused long enough to see what the machine could become rather than what it merely was.

growth: >
  Your gift is the calibrated strike — everything you do lands because nothing you do is random.
  The edge to watch is over-calibration: not every situation needs a hundred-percent lock. Sometimes
  seventy percent is enough, and the remaining thirty is discovered in the doing.
