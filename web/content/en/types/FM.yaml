id: FM
classical: >
  Fire restrains Metal — the Luminary (F) is filtered by the Refiner (M). Fire flares upward,
  expansive and radiant; Metal cuts and selects, letting through only what meets the standard.
  Ke is not suppression: the light does not scatter indiscriminately. It is focused through an
  internal measuring rod — illuminating selectively, landing exactly where it is meant to land.

portrait: >
  Your light is not a floodlight — it's a spotlight you aim with care. Before you shine on someone,
  you have already decided what they get and what they don't. Not everyone who steps into your orbit
  receives the same warmth, and you are at peace with that. You are not the person who radiates
  indiscriminately; you radiate with intent. Every person you illuminate has passed through a filter
  you barely notice you're using — but it's there, and it's sharp. Shadow side: your selectivity can
  read as coldness to those who haven't yet earned your light, even when they genuinely need it.

figures:
  - name: Ruth Bader Ginsburg
    domain: History
    bio: >
      American lawyer and U.S. Supreme Court Justice, 1933-2020. Her precise, incremental
      legal strategy over decades transformed gender equality law in the United States.
    desc: Her dissents were surgical. Every word weighed, every citation placed — not a syllable wasted.
      She radiated moral authority without raising her voice. The precision was the power, and the
      power was unmistakable.

  - name: Cate Blanchett
    domain: Film & TV
    bio: >
      Australian actor, widely regarded as one of the finest of her generation. Known for
      fiercely intelligent, chameleonic performances across blockbusters and arthouse films.
    desc: The moment she appears on screen, the frame belongs to her. Yet off-screen she is intensely
      private and famously selective — each role is a deliberate choice, not a career move. She does
      not scatter her presence; she places it.

  - name: Roger Federer
    domain: Sports
    bio: >
      Swiss tennis player, held world #1 for 310 weeks across a 24-year career. Famous
      for making an impossibly difficult sport look effortless through relentless refinement.
    desc: On court he burned with an almost effortless brilliance. But that elegance was the survivor
      of a million filtered-out mistakes — every stroke refined through relentless elimination of
      what didn't work. The grace was the residue of the grind.

  - name: Toni Morrison
    domain: Literature
    bio: >
      American novelist, 1931-2019. Won the Nobel Prize in Literature for novels like
      Beloved that radiate moral gravity with every sentence carefully weighed.
    desc: Her prose radiates a nearly biblical power, but every sentence was weighed before it landed.
      She said she wrote the books she wanted to read — which meant discarding everything that fell
      short of a standard only she could feel. Her light was fierce because it was filtered.

  - name: David Bowie
    domain: Music
    bio: >
      English musician and cultural icon, 1947-2016. Reinvented himself across decades —
      Ziggy Stardust, the Thin White Duke, Blackstar — each persona a meticulously crafted artifact.
    desc: >
      Reinvented himself so many times it looked like chaos — but each persona was a meticulously
      crafted artifact. Ziggy Stardust, the Thin White Duke, Blackstar: every reinvention was a
      precise calibration of image, sound, and message. The radiance was real; the craft was realer.

growth: >
  Your gift is precision radiance — you don't scatter your light, and when you shine it lands.
  The edge to watch is over-filtering: not every act of warmth needs a justification. Sometimes an
  unfiltered glow, given freely to someone who hasn't earned it, can be their lifeline for the day.
