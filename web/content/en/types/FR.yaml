id: FR
classical: >
  Fire restrains Water (reverse ke) — the Luminary (F) draws the Reservoir (R) to the surface.
  In the standard cycle, Water restrains Fire; here the direction is reversed. F's radiant
  presence pulls R's accumulated depth upward into expression. Ke is not suppression: the depth
  is not erased — it is surfaced. The light does not burst forth all at once; it rises only after
  it has settled in the depths. What emerges is not a flare but a slow, steady radiance that has
  earned every lumen. What was submerged becomes visible — steeped, still, and now shared.

portrait: >
  Your light isn't a sudden flash — it surfaces after a long descent. Every sentence you speak
  carries weight because none of it was casual. You are not the person who fills silence with
  chatter; you are the person who lets a thought ripen underwater until it is ready to breach on
  its own. Others may read you as slow to warm up, but it's not slowness — it's fermentation.
  What they get from you isn't cheap warmth; it's a light that has been compressed by depth, and
  when it arrives it lands with the gravity of something that almost stayed submerged. Shadow side:
  your long steep can look like disengagement to people who need a faster signal. By the time your
  light surfaces, they may have already assumed there was nothing there.

figures:
  - name: Mahatma Gandhi
    domain: History
    bio: >
      Leader of India's independence movement, 1869-1948. Pioneered nonviolent civil
      disobedience that toppled an empire; his public campaigns were the visible tip of a vast inner practice.
    desc: His public campaigns were the visible tip of a vast inner practice — fasting, prayer, silence.
      Every act of nonviolent resistance had been turning in the depths long before it surfaced. The
      world saw the march; he had already walked it a thousand times alone.

  - name: Kazuo Ishiguro
    domain: Literature
    bio: >
      British-Japanese novelist, born 1954. Nobel laureate and author of Never Let Me
      Go and The Remains of the Day. His novels let meaning seep through the gaps between words.
    desc: His novels don't tell you the point — they let it seep through the gaps between words.
      You finish a chapter thinking nothing happened, then realize days later that everything did.
      The light in his prose is slow-release; it surfaces only after the book is closed.

  - name: Denis Villeneuve
    domain: Film & TV
    bio: >
      French-Canadian filmmaker, born 1967. Director of Arrival, Blade Runner 2049,
      and Dune — films that move at the pace of settling sediment and accumulate quiet force.
    desc: Makes films — Arrival, Blade Runner 2049, Dune — that move at the pace of sediment
      settling. Critics sometimes call his work cold, but audiences who sit with it feel the heat
      underneath. His light doesn't flash; it accumulates, frame by frame, until the whole screen
      is quietly incandescent.

  - name: Nina Simone
    domain: Music
    bio: >
      American singer, pianist, and civil rights activist, 1933-2003. Her voice carried
      the weight of the struggle — she didn't perform pain, she let a lifetime of it rise through song.
    desc: When she sat at the piano, the weight of the civil rights struggle, of a lifetime of being
      underestimated, of every slight she'd absorbed — all of it surfaced through her voice. She didn't
      perform pain; she let it rise. And when it rose, the room held its breath.

  - name: Satoshi Kon
    domain: Animation
    bio: >
      Japanese anime director, 1963-2010. Made only four features — Paprika, Perfect
      Blue, Millennium Actress, Tokyo Godfathers — and one series, each a layered deep dive.
    desc: Made only four feature films and one series before his death, each one a layered
      exploration of identity, dreams, and reality — Paprika, Perfect Blue, Millennium Actress.
      Every project was a deep dive, and nothing surfaced in his work that hadn't been submerged
      in obsession long enough to become essential.

growth: >
  Your gift is weighted light — what you share lands because it spent time in the depths. The edge
  to watch is permanent incubation: not every insight needs to reach the ocean floor before it's
  ready to surface. Sometimes the near-shore draft is exactly what the moment needs, and the
  perfect, fully-steeped version arrives too late to matter.
