id: W
classical: >
  Wood bends without breaking — directional growth that knows when to flex. In the circular flow of qi, it rises from below on the left, pushing upward. Its transformation is sprouting: breaking ground, moving from zero to one. Your core drive is forward momentum — clarity comes not from planning but from being in motion.

portrait: >
  You don't wait. It's not impatience — your mind works fastest when your hands are moving. Sitting still feels like holding your breath; starting something is the exhale. While others are still weighing options, you've already taken the first step. You trust that the path will reveal itself once you're walking it, and more often than not, you're right. But sometimes things need to sit — not every situation calls for a bulldozer. Your growth edge isn't learning to start. It's learning when not to.

figures:
  - name: Amelia Earhart
    domain: History
    bio: >
      American aviation pioneer, 1897-1937. First woman to fly solo across the Atlantic
      Ocean. Disappeared over the Pacific attempting a round-the-world flight.
    desc: She didn't wait for aviation to be safe or proven — she got in the plane and went. Her clarity arrived at altitude, not in the hangar. When she vanished over the Pacific, she was still pushing forward.

  - name: Michael Jordan
    domain: Sports
    bio: >
      American basketball player, widely considered the greatest of all time. Six NBA
      championships with the Chicago Bulls; his competitive drive and will to win were legendary.
    desc: >
      "I can accept failure. I can't accept not trying." First to practice, last to leave, always willing
      to take the final shot. His greatness wasn't just talent — it was forward motion made visible.

  - name: Charlie Chaplin
    domain: Film & TV
    bio: >
      English comic actor and filmmaker, 1889-1977. Created the Tramp, co-founded
      United Artists, and revolutionized silent cinema by putting motion before the plan.
    desc: He didn't wait for the industry — he built his own studio, wrote, directed, acted, and scored. The Tramp was born from putting on a costume and walking onto the set. Motion always came before the plan.

  - name: Beyoncé
    domain: Music
    bio: >
      American singer, songwriter, and performer. The most Grammy-awarded artist in
      history. Each album release breaks ground and redefines the pop landscape before anyone else is ready.
    desc: She doesn't release albums — she breaks ground. Each project redefines the landscape before anyone else knows the terrain shifted. Her drive isn't about fame; it's the sheer force of pushing forward before the world is ready.

  - name: Sonic the Hedgehog
    domain: Gaming
    bio: >
      Sega's iconic video game character, created 1991. A blue hedgehog who runs at
      supersonic speed — for Sonic, thinking and moving are the same act.
    desc: Standing still is the only thing that hurts. The world isn't something to analyze — it's something to run through. For Sonic, thinking and moving are the same act.

growth: >
  Your gift is breaking ground. You make things go from zero to one. Your work is learning to pause — not every stillness is stagnation, and not every situation needs you to kick the door open. Sometimes the best move forward is holding still long enough to see what's already stirring.
