id: WR
classical: >
  Wood nourishes Water (reverse sheng): the Pioneer's action (W) is backed by the Reservoir's
  accumulation (R). Wood bends and straightens — every move you make carries something that was
  stored up long before. This is the reversed order: the force behind the action comes from depth.
  Not impulse — accumulation. Every push forward has been earned in the deep.

portrait: >
  Your action doesn't land light. Every move you make has weight underneath it — not impulse, but
  accumulation. You don't act first and think later; you think until there's nothing left to think,
  and then you move, and the move is final. Your action isn't a sprint; it's a hammer swing — slow
  to wind up, but when it lands, it lands exactly where it was meant to. People underestimate your
  speed, then overestimate your luck. Neither is right. What looks like luck is just preparation
  that finished before anyone was watching. The shadow: you can accumulate so long that the moment
  passes. The depth is meant to serve the move — not replace it.

figures:
  - name: Ernest Shackleton
    domain: History
    bio: >
      Anglo-Irish polar explorer, 1874-1922. His ship Endurance was crushed by Antarctic
      ice; he led 27 men across frozen sea for two years without losing a single life.
    desc: His ship crushed by Antarctic ice, he led 27 men across frozen sea for two years. Every
      decision was made in the deep before it was executed. Survival wasn't luck — it was calculation.

  - name: Tom Brady
    domain: Sports
    bio: >
      American football quarterback, born 1977. Drafted 199th — dead last. Turned years
      of being underestimated into stored fuel; won seven Super Bowls across 22 seasons.
    desc: Drafted 199th — dead last in relevance. He turned every year of being underestimated into
      stored fuel. Twenty-two seasons later, every throw carried the weight of everything he'd absorbed.

  - name: Edward Elric
    domain: Animation
    bio: >
      Protagonist of the manga and anime Fullmetal Alchemist. A prodigy alchemist who lost
      two limbs and a brother's body to a forbidden ritual. Every transmutation carries the weight of that lesson.
    desc: A prodigy alchemist who lost two limbs and a brother's body to a forbidden ritual. Every
      transmutation he performs now carries the weight of that lesson. His action is fast — but it's
      never light. What he knows was paid for in full.

  - name: Malala Yousafzai
    domain: Contemporary
    bio: >
      Pakistani education activist, born 1997. Shot by the Taliban at 15 for going to school.
      Survived, kept speaking, and became the youngest Nobel Peace Prize laureate in history.
    desc: She was shot for going to school. She recovered, and kept speaking. Every word she delivers
      now carries the weight of everything she's survived. Her voice is quiet, but it lands like a
      hammer — because underneath it is a depth no one can question.

  - name: Doom Slayer
    domain: Gaming
    bio: >
      Protagonist of the Doom video game series. Never speaks. Every weapon known down
      to the bone — beneath every trigger pull lies thousands of hours of unseen training.
    desc: >
      He never speaks. But every weapon is known down to the bone. You don't see the training —
      you only see him on the field, one shot, one kill. Beneath every trigger pull: thousands of
      hours.

growth: >
  Your gift is weight — every move you make has ballast. Your work is to know when the accumulation
  is complete. Depth serves action, not the other way around. When you've stored enough, move.
  The window won't stay open forever.
