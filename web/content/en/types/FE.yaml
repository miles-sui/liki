id: FE
classical: >
  Fire nourishes Earth: the Luminary's expansive presence (F) becomes the Cultivator's steady,
  everyday warmth (E). Fire flares upward — but here, that radiance settles into soil, turning
  a bright flash into a hearth that can be returned to again and again. Not a moment of warmth —
  a place where warmth lives.

portrait: >
  Your light isn't a firework — it's a hearth. People come back to you not because you dazzled them
  once, but because you were warm yesterday, and the day before, and the day before that. You
  brighten people's lives in ways that feel ordinary to you but extraordinary to everyone else: a
  remembered detail, a check-in at the right moment, the dinner table that always has one more seat.
  Your warmth isn't performative — it's woven into your daily rhythm so naturally you barely notice it.
  The shadow: you give steady warmth so reliably that people forget the hearth needs fuel too. You
  can't keep everyone warm — save some heat for yourself.

figures:
  - name: Fred Rogers
    domain: Film & TV
    bio: >
      American television host, 1928-2003. Created and hosted Mister Rogers' Neighborhood
      for 33 years, telling millions of children they were loved — daily, quietly, without spectacle.
    desc: For thirty years, he told children they were special — not as a performance, but as a daily
      practice. His warmth wasn't in any single episode; it was in showing up every single day.

  - name: Dolly Parton
    domain: Music
    bio: >
      American singer-songwriter, actress, and philanthropist. Beyond her iconic music
      career, her Imagination Library has sent over 200 million free books to children worldwide.
    desc: Her radiance isn't confined to the stage. The Imagination Library has sent over 200 million
      free books to children. Her warmth is institutional, not occasional — built into the structure.

  - name: Jane Austen
    domain: Literature
    bio: >
      English novelist, 1775-1817. Author of Pride and Prejudice and Emma. Revealed
      the entire moral universe inside ordinary domestic life with steady, surgical warmth.
    desc: >
      She wrote about drawing rooms and marriage plots — and in doing so, revealed the entire moral
      universe inside ordinary life. Her warmth is delivered in steady, daily doses: a walk, a
      letter, a conversation. Never a lecture; always an education in noticing what matters.

  - name: Iroh
    domain: Animation
    bio: >
      Beloved character from Avatar: The Last Airbender. A retired general, grieving
      father, and tea-loving mentor whose warmth and wisdom pour out regardless of circumstances.
    desc: Exiled, grieving, underestimated — and still he pours tea for strangers and offers wisdom
      to anyone who needs it. His warmth doesn't depend on circumstances; it's just who he is.

  - name: Princess Zelda
    domain: Gaming
    bio: >
      Central figure of The Legend of Zelda series. In Breath of the Wild, she held
      the Calamity at bay alone for a century — sustained light, not a flash of power.
    desc: Held the Calamity at bay for a hundred years — alone. Not a flash of power, but a century
      of sustained holding. Her light endured long after everyone forgot she was still there.

growth: >
  Your gift is sustained warmth — you are the hearth people circle back to. Your work is to tend
  your own fire. Even a hearth needs fresh logs. Let someone else tend the flame sometimes.
