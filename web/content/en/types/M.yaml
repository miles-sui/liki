id: M
classical: >
  Metal follows a standard and reforms it — holding a measuring rod while knowing when to break and remake it. In the circular flow of qi, it descends on the right, drawing inward and downward. Its transformation is gathering and refining: filtering, selecting, giving form. Your core drive is the sieve — what doesn't pass doesn't get through, and when the sieve itself is wrong, you rebuild it.

portrait: >
  You have an internal gauge. Something is right or it isn't — and you know within seconds. You may not say it out loud, but substandard things don't get past you. People may find you exacting at first; later they realize that when you approve, it counts. Your gauge isn't rigid — when the standard itself is off, you revise the standard. You're not a rule-follower; you're a rule-maker. Just remember: that gauge of yours — turn it on yourself once in a while, but gently. The best standard isn't the strictest. It's the truest.

figures:
  - name: Marie Curie
    domain: Science
    bio: >
      Polish-French physicist and chemist, 1867-1934. First woman to win a Nobel Prize,
      first person to win two. Isolated radium by hand from tons of pitchblende — because nothing less than pure would do.
    desc: She isolated radium by hand, processing tons of pitchblende in a leaky shed, because nothing less than pure would do. Her standard wasn't set by the scientific establishment — she set it, and the establishment had to rise to meet her.

  - name: Hayao Miyazaki
    domain: Film & TV
    bio: >
      Japanese animator and filmmaker, born 1941. Co-founder of Studio Ghibli. Creator
      of Spirited Away, Princess Mononoke, My Neighbor Totoro. Scraps drawings not because they're wrong but because they're not right.
    desc: >
      He scraps a drawing not because it's wrong but because it's not right — and he knows the difference. His films are frame-by-frame sieves: only what passes his inner gauge makes it to the screen, and the world is richer for it.

  - name: Simone Biles
    domain: Sports
    bio: >
      American gymnast, born 1997. Most decorated gymnast in history. Invented skills so
      difficult no one else can execute them — because her internal gauge is set higher than the rulebook.
    desc: The most decorated gymnast in history. Her sport demands absolute precision — a millimeter off
      and the landing fails. She doesn't just perform routines; she redefines what the standard is,
      inventing moves no one else can execute because her gauge is set higher than the rulebook.

  - name: Sherlock Holmes
    domain: Literature
    bio: >
      Fictional detective created by Arthur Conan Doyle, first appearing in 1887. His
      mind is the ultimate filter — irrelevant facts don't enter, crucial details don't escape.
    desc: His mind is the ultimate filter — irrelevant facts don't enter, crucial details don't escape. He doesn't just solve cases; he refines the method of solving itself when the existing one fails.

  - name: Geralt of Rivia
    domain: Gaming
    bio: >
      Protagonist of The Witcher video game series and novels. A monster hunter who carries
      two swords — one for monsters, one for men. His code isn't written down but measured to the millimeter.
    desc: He carries two swords for a reason — one for monsters, one for men. His code isn't written down but it's measured to the millimeter. He doesn't explain his choices; he just passes every situation through a gauge honed over a century.

growth: >
  Your gift is precision. You keep good things from getting lost in the noise. Your work is lightening the gauge — on yourself, on others. Not everything needs an A. Sometimes a passing grade is exactly right, and the space you leave is where other people learn to grow their own standards.
