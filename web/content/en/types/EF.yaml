id: EF
classical: >
  Earth nourishes Fire (reverse sheng): the Cultivator's grounded steadiness (E) feeds the Luminary's
  warmth (F). Earth sows and reaps — your stability doesn't feel heavy; it feels like a place to
  recharge. This is the reversed order: the daily grounding is the soil, and the radiance grows from
  it. Not light first, then landing — landing first, then light.

portrait: >
  Leaning on you doesn't feel like burdening — it feels like plugging into a charger. Your warmth
  isn't shouted from a stage; it's embedded in what you do every day. You're not the person who
  walks in and lights up the whole room at once. You're the person people realize, months later,
  has been quietly warming their life all along. Your temperature takes time to register, but once
  it does, it doesn't cool. The shadow: you can be so low-key that people never realize how much
  warmth you carry. Sometimes you need to let them closer — your light isn't just yours to keep.

figures:
  - name: Keanu Reeves
    domain: Film & TV
    bio: >
      Canadian actor, born 1964. Star of The Matrix and John Wick series. Hollywood's most
      un-Hollywood star — rides the subway, gives up his seat, known for quiet decency in a thousand ordinary moments.
    desc: Hollywood's most un-Hollywood star. Rides the subway, gives up his seat, talks to homeless
      strangers. His warmth isn't in interviews — it's in a thousand ordinary moments no one films.

  - name: Jane Goodall
    domain: Science
    bio: >
      British primatologist and anthropologist, born 1934. Revolutionized the study of
      chimpanzees in Gombe, Tanzania, not with theories but by sitting patiently, day after day, until they accepted her.
    desc: She didn't parachute into Gombe with a theory. She sat patiently, day after day, until the
      chimpanzees accepted her presence. Her warmth built the trust that built the science.

  - name: Yo-Yo Ma
    domain: Music
    bio: >
      French-American cellist, born 1955. Child prodigy turned master. Six decades of
      showing up and practicing; audiences leave his concerts talking not about technique but about how they felt held.
    desc: >
      Six decades of cello — six decades of showing up and practicing. But no one leaves his
      concerts talking about technique. They talk about how they felt: held, seen, warmed. Daily
      discipline in service of human connection.

  - name: Atticus Finch
    domain: Literature
    bio: >
      The father and lawyer from Harper Lee's To Kill a Mockingbird. In a town boiling
      with prejudice, he stayed steady — fought not with speeches but by showing up, day after day, with quiet decency.
    desc: In a town boiling with prejudice, he stayed steady. He didn't fight with speeches — he
      fought by showing up, day after day, with quiet decency. His children learned warmth not from
      what he said, but from watching him live.

  - name: Aerith Gainsborough
    domain: Gaming
    bio: >
      Character from Final Fantasy VII. Tends flowers in a ruined church in the middle
      of a dying city. No weapon, no strategy — just daily care for living things. Her warmth outlasts everything.
    desc: Tends flowers in a ruined church in the middle of a dying city. No strategy, no weapon —
      just daily care for living things. Her warmth outlasts everything, even death.

growth: >
  Your gift is slow-burning warmth — your light is grown, not flashed. Your work is visibility.
  Sometimes people don't know how warm you are because you never let them close enough to feel it.
