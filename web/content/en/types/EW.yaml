id: EW
classical: >
  Earth restrains Wood (reverse ke) — the Cultivator (E) grounds the Pioneer (W). In the standard
  cycle, Wood restrains Earth; here the direction is reversed. E's steady daily action gives
  foundation to W's forward impulse. Ke is not suppression: the charge is not stopped — it is given
  a road. Solid ground first, then advance. The result is not slower — it is steadier, and over
  distance, steadier wins.

portrait: >
  You are not the one charging at the front of the pack — you are the one making sure the road
  behind the charge is paved. The pioneer lives in you, but it expresses itself as relentless
  continuity rather than dramatic bursts. You don't stop, and you don't need to — because your fuel
  is not adrenaline, it's the quiet satisfaction of another day done. You are the marathon runner
  who starts unremarkably and, mile by mile, watches the sprinters drop away. You are still moving
  at the same pace at the finish because your engine was never the drama of the start. Shadow side:
  your steady rhythm can become a rut — you may keep walking forward without looking up to check
  whether the direction still serves you.

figures:
  - name: George Washington
    domain: History
    bio: >
      First President of the United States, 1732-1799. Lost more battles than he won
      as commander of the Continental Army, but held a fragile coalition together through winters, desertions, and despair.
    desc: Lost more battles than he won, but never lost the Continental Army. His genius was not
      tactical brilliance — it was the daily, grinding work of holding a fragile coalition together
      through winters, desertions, and despair. He outlasted the British because he never broke.

  - name: Warren Buffett
    domain: Contemporary
    bio: >
      American investor and philanthropist, born 1930. One of the world's wealthiest
      people, yet has lived in the same modest house since 1958. His philosophy: patience and compounding.
    desc: >
      Has lived in the same house since 1958 and reads five hundred pages a day. His investment
      philosophy boils down to one word: patience. He doesn't chase; he waits, accumulates, and lets
      compounding do what drama cannot. Decades of steady have outperformed every sprint.

  - name: Lionel Messi
    domain: Sports
    bio: >
      Argentine footballer, born 1987. Widely considered the greatest of all time. Eight
      Ballon d'Or awards. Walks, watches, waits — then moves with devastating precision when the opening reveals itself.
    desc: He does not sprint through the whole match — he walks, watches, and waits, then moves with devastating precision when the opening reveals itself. His genius is not relentless pressure but patient reading of the game, letting the play unfold until the moment is right. Over two decades, his steadiness has outlasted every flashier rival.

  - name: Steve (Minecraft)
    domain: Gaming
    bio: >
      Default player character of Minecraft, the best-selling video game of all time.
      Starts with nothing — punches a tree, crafts a plank. A thousand days later, walks through a city built block by block.
    desc: >
      Day one: punch a tree, craft a plank. Day one thousand: walk through the gates of a city
      you built with your own hands, block by block. There is no shortcut and no magic — only the
      quiet accumulation of daily labor, and a world transformed because you never stopped placing
      blocks.

  - name: Morgan Freeman
    domain: Film & TV
    bio: >
      American actor, born 1937. Worked for decades in relative obscurity before breaking
      through in his fifties. The voice that now narrates the universe was honed in the years no camera was watching.
    desc: Worked for decades in relative obscurity before breaking through in his fifties. He did
      not arrive with a bang; he arrived having already put in a lifetime of quiet craft. The voice
      that now narrates the universe was honed in the years no camera was watching.

growth: >
  Your gift is unstoppable steadiness — you are not the fastest, but no one can make you stop.
  The edge to watch is forward drift without directional check: your every step is solid, but is the
  bearing still true? A steady walk on a wrong heading is just a longer walk home.
