id: R
classical: >
  Water seeps downward — finding every crevice, filling every hollow, gathering silently. In the circular flow of qi, it hides below, sinking to the deepest place and storing what it finds. Its transformation is preservation: keeping, saving, waiting for the right moment. Your core drive is descent — letting things sink in and connect on their own, accumulating until the connections surface by themselves.

portrait: >
  You're not antisocial — you just need more solitude than most. Being alone isn't lonely for you; it's how you recharge. You don't rush to speak. You let thoughts settle, let pieces find each other in the depths. What you say isn't the most — but it's often the thing no one else saw. You speak less than others, but when you do, the room quiets. While everyone skims the surface, you're plumbing below it. While others chase trends, you're finding what they overlooked in the depths. Just be careful — stay down too long and people won't know what you're connecting. You have to surface and tell them.

figures:
  - name: Emily Dickinson
    domain: History
    bio: >
      American poet, 1830-1886. Lived almost her entire life in one house in Amherst,
      Massachusetts — yet from that quiet depth produced nearly 1,800 poems that rearranged the English language.
    desc: She barely left her room in Amherst, but from that quiet depth she produced poems that rearranged the English language. She wasn't hiding from the world — she was sinking into it so deeply that what surfaced was permanent.

  - name: Bob Dylan
    domain: Music
    bio: >
      American singer-songwriter, born 1941. Nobel laureate in Literature. His lyrics
      aren't manufactured — they're sediment, compressed over time until they become diamond.
    desc: A journalist asks a question; he sits silent for ten seconds, then answers with one line. That line haunts the interviewer for years. His lyrics aren't manufactured — they're sediment, compressed over time until they become diamond.

  - name: Haruki Murakami
    domain: Contemporary
    bio: >
      Japanese novelist, born 1949. Author of Norwegian Wood and Kafka on the Shore. Up
      at four, writing in silence, running alone for hours — goes inward into the well of his own mind and brings up what reshapes readers.
    desc: Up at four, writing in silence, running alone for hours. He doesn't chase the literary world — he goes inward, into the well of his own mind, and what he brings up reshapes a generation of readers.

  - name: Franz Kafka
    domain: Literature
    bio: >
      Czech writer, 1883-1924. Worked a day job at an insurance office and wrote in the
      quiet hours — The Metamorphosis, The Trial, The Castle. Stories so deep they named an entire dimension of the human condition after him.
    desc: He worked a day job at an insurance office and wrote in the quiet hours when the world was asleep. From that solitude came stories so deep they named an entire dimension of the human condition after him.

  - name: Totoro
    domain: Animation
    bio: >
      The forest spirit from Hayao Miyazaki's My Neighbor Totoro. Doesn't speak. Stands
      in the forest, waiting, present — a power not in action but in the depth of stillness that makes things grow around it.
    desc: He doesn't speak. He stands in the forest, waiting, present. The children find him not by searching but by falling into his world. His power isn't in action — it's in the depth of his stillness, the kind that makes things grow around it.

growth: >
  Your gift is depth. You see what everyone else skims past. Your work is surfacing — the connections you make in the depths are invisible to others. Don't wait for someone to come find you. What you've gathered down there might be the key someone else has been searching for.
