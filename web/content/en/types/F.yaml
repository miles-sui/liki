id: F
classical: >
  Fire blazes upward and outward — radiating from center to periphery without direction. In the circular flow of qi, it sits at the top and disperses in every direction. Its transformation is expansion: growing, unfolding, reaching. Your core drive is presence — you don't need to illuminate anyone in particular. Light doesn't pick and choose; everyone falls within it.

portrait: >
  You walk in and the temperature shifts. It's not what you say or do — it's that you're here, and the air is different now. You don't go person to person working the room; you stand where you are and the room comes to you. People remember your presence more than your words. Your influence lives not in your actions but in your being. Just don't forget: a fire that never receives fuel burns out. After holding the room, find someone who can hold you.

figures:
  - name: Martin Luther King Jr.
    domain: History
    bio: >
      American Baptist minister and civil rights leader, 1955-1968. Led the Montgomery
      bus boycott and March on Washington; awarded the Nobel Peace Prize in 1964.
    desc: He didn't recruit followers one by one — he stood in his truth and millions gravitated toward it. His "I Have a Dream" speech wasn't a sales pitch; it was a man radiating conviction so brightly that a nation had to look.

  - name: Robin Williams
    domain: Film & TV
    bio: >
      American comedian and actor, 1951-2014. Known for rapid-fire improvisation and
      iconic roles in Dead Poets Society, Good Will Hunting, and Aladdin.
    desc: He walked into any room and the energy shifted before he said a word. He wasn't performing — he was emitting. Audiences across the world felt personally lit up by a man they'd never met.

  - name: Freddie Mercury
    domain: Music
    bio: >
      British singer and frontman of Queen, 1946-1991. Born in Zanzibar, became one of
      rock's most electrifying performers; his Live Aid set is legendary.
    desc: Live Aid wasn't a concert — it was seventy thousand people falling into the gravity well of one man's presence. He didn't sing to the crowd; he pulled the crowd into his orbit and made them part of the show.

  - name: Taylor Swift
    domain: Contemporary
    bio: >
      American singer-songwriter and the defining pop artist of the 21st century. Her
      intensely personal songwriting has built one of the most devoted fanbases in music.
    desc: Her concerts aren't performances — they're mass experiences of being seen. She writes her own story but millions find themselves inside it. The light she casts doesn't aim; it just reaches.

  - name: Walt Whitman
    domain: Literature
    bio: >
      American poet, 1819-1892. His collection Leaves of Grass revolutionized poetry
      with free verse and a boundless, democratic celebration of the self.
    desc: "\"I contain multitudes.\" His poetry didn't address you — it absorbed you. He wrote the self as something so vast that everyone fit inside. His presence on the page is still radiating, still pulling readers into a bigger idea of what a person can be."

growth: >
  Your gift is presence. You don't have to do anything — being there is enough. Your work is learning to turn some of that light back toward yourself. You can't burn without fuel. Solitude may not feel natural, but learning to sit alone and replenish is what keeps the fire from consuming itself.
