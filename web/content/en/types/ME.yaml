id: ME
classical: >
  Metal nourishes Earth (reverse sheng): the Refiner's discriminating standards (M) feed the
  Cultivator's nourishing soil (E). Metal cuts and reforms — your standards are high but not cold;
  there's soil underneath them. This is the reversed order: precision isn't for elimination — it's
  for growth. When you point out a flaw, the other person knows you're not rejecting them; you're
  giving them something to grow from.

portrait: >
  Your standards are high — but they don't break people, they build them. When you push someone,
  they feel the soil underneath the push. You're not the person who criticizes and walks away; you
  criticize and then hand over the fertilizer. Your precision has patience baked in. People seek your
  honest feedback not because it's gentle — it often isn't — but because they can feel it comes
  from a place that genuinely wants them to grow. The shadow: sometimes your standards arrive before
  your care does. Some people need to feel held before they can hear what needs to improve.

figures:
  - name: Ted Lasso
    domain: Film & TV
    bio: >
      Fictional American football coach from the TV series Ted Lasso, hired to manage an
      English soccer team. By all measures unqualified — but his standard is growth, not pedigree. Precision wrapped in soil.
    desc: An American football coach teaching English soccer — by all measures unqualified. But his
      standard isn't whether you're good enough; it's whether you're better than yesterday. Precision
      wrapped in soil.

  - name: Confucius
    domain: History
    bio: >
      Chinese philosopher, 551-479 BCE. His teachings shaped East Asian civilization for
      two millennia. Taught three thousand disciples, each to a different standard — not favoritism, but precision about where each one needed to grow.
    desc: Three thousand disciples, each taught differently. He held Zilu and Zigong to different
      standards — not favoritism, but precision about where each one needed to grow. High bar, deep
      soil.

  - name: Koro-sensei
    domain: Animation
    bio: >
      The octopus-like teacher from the manga and anime Assassination Classroom. A monster
      destined to destroy Earth who instead demands the impossible from every student — because he believes they can reach it.
    desc: A monster destined to destroy Earth becomes a teacher to Class 3-E. He demands the impossible
      from every student — and every student knows it's because he believes they can reach it.

  - name: Carlo Ancelotti
    domain: Sports
    bio: >
      Italian football manager, born 1959. Most decorated manager in UEFA Champions League
      history with five titles. Players describe him as a father before a tactician — high expectations, deep soil.
    desc: The most decorated manager in Champions League history, yet players describe him as a father before a tactician. He demands absolute excellence but delivers his critiques with a warmth that makes players want to meet the bar rather than resent it. High expectations, deep soil, five European Cups.

  - name: The Owl (Zelda)
    domain: Gaming
    bio: >
      Kaepora Gaebora, the wise owl from The Legend of Zelda series. Shows up and talks
      at length — sometimes annoyingly so. But every piece of advice is precise, and he waits until you've absorbed it.
    desc: Kaepora Gaebora shows up and talks at length — sometimes annoyingly so. But every piece of
      advice is precise, and he always waits until you've absorbed it before he flies away.

growth: >
  Your gift is high standards rooted in genuine care — your precision grows people. Your work is
  timing. Sometimes the soil needs to be felt before the ruler comes out. Hold first, then sharpen.
