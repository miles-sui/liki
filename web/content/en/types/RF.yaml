id: RF
classical: >
  Water restrains Fire — the Reservoir (R) tempers the Luminary (F). Water sinks deep, letting
  things settle before they surface; Fire flares outward, radiating presence. Ke is not suppression:
  the light is steeped in deep water before it emerges. What surfaces has been submerged long enough
  to be worth surfacing. Every emission is earned — nothing is broadcast on impulse.

portrait: >
  You go deep, and you emerge selectively. What comes out of you has been under for a while — every
  word carries weight because none of it was said the moment it occurred to you. People around you
  can feel there is far more you haven't shared than what you have, and they are right. You are not
  silent; you are steeping. The things you release are not half-formed — they are the entirety of
  what needed to surface, and not a syllable more. Shadow side: you can steep so long that the
  moment for sharing passes. What was meant to be spoken becomes a private artifact no one else
  ever benefits from.

figures:
  - name: Maya Angelou
    domain: History
    bio: >
      American poet and civil rights activist, 1928-2014. Author of I Know Why the Caged
      Bird Sings. After years of processing trauma in silence, when she finally spoke, every word was a depth charge.
    desc: Wrote I Know Why the Caged Bird Sings after years of processing childhood trauma in
      silence. When she finally spoke — on the page, on the stage — every word was a depth charge.
      She did not emote; she surfaced what had settled.

  - name: Leonard Cohen
    domain: Music
    bio: >
      Canadian singer-songwriter and poet, 1934-2016. Spent five years rewriting
      "Hallelujah" through dozens of verses — his performances felt less like concerts and more like confessions that had spent decades becoming unavoidable.
    desc: Spent five years on a single song, rewriting "Hallelujah" through dozens of verses before
      releasing the ones that survived. His performances felt less like concerts and more like
      confessions that had spent decades becoming unavoidable.

  - name: Andrei Tarkovsky
    domain: Film & TV
    bio: >
      Soviet filmmaker, 1932-1986. Made only seven feature films — Stalker, Solaris,
      Andrei Rublev — each one saturated with meaning earned through years of contemplation between projects.
    desc: Made only seven feature films, each one saturated with meaning earned through years of
      contemplation between projects. A Tarkovsky shot does not explain itself quickly — it has been
      submerged too long for that. It asks you to sit with it, the way he did.

  - name: Virginia Woolf
    domain: Literature
    bio: >
      English novelist, 1882-1941. Author of Mrs Dalloway, To the Lighthouse, The Waves.
      Each sentence the product of deep submersion in consciousness itself — she refused to broadcast anything half-formed.
    desc: Her novels — Mrs Dalloway, To the Lighthouse, The Waves — do not explain themselves
      quickly; they ask the reader to slow down and sink in. Each sentence was the product of deep
      submersion in consciousness itself, every image steeped in the private depths of a mind that
      refused to broadcast anything half-formed.

  - name: Banksy
    domain: Contemporary
    bio: >
      Anonymous English street artist and political activist, active since the 1990s. Drops
      a single stencil on a wall in the middle of the night and vanishes — the work arrives fully formed as if it had been waiting underwater for exactly the right moment.
    desc: Drops a single stencil on a wall in the middle of the night and vanishes, leaving the
      world to react. The work arrives fully formed, unexplained, and devastatingly on point — as if
      it had been waiting underwater for exactly the right moment to breach the surface.

growth: >
  Your gift is earned emission — nothing you share is trivial, because everything has been through
  the depths. The edge to watch is permanent submersion: not every truth needs to hit absolute
  bottom before it's ready. Sometimes what someone needs is the near-surface draft, shared now
  rather than the perfect version shared too late.
