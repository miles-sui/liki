day_masters:
  "1":
    stem: "甲"
    element: "Wood"
    name: "Jia Wood"
    portrait: "Like a towering tree — upright, principled, and naturally authoritative. Jia Wood people lead by example, stand firm in their convictions, and inspire others through quiet strength. They thrive on growth and purpose."
  "2":
    stem: "乙"
    element: "Wood"
    name: "Yi Wood"
    portrait: "Like a winding vine — flexible, adaptive, and quietly persistent. Yi Wood people excel at navigating complex situations with grace. They are creative connectors who flourish by finding their own path rather than forcing a straight line."
  "3":
    stem: "丙"
    element: "Fire"
    name: "Bing Fire"
    portrait: "Like the midday sun — radiant, generous, and impossible to ignore. Bing Fire people bring warmth and visibility to everything they touch. They are natural motivators whose enthusiasm lights up a room, but they need space to shine."
  "4":
    stem: "丁"
    element: "Fire"
    name: "Ding Fire"
    portrait: "Like a candle flame — focused, refined, and intensely present. Ding Fire people concentrate their energy with precision. They are perceptive and discerning, often drawn to what is meaningful rather than what is merely bright."
  "5":
    stem: "戊"
    element: "Earth"
    name: "Wu Earth"
    portrait: "Like a mountain range — stable, enduring, and deeply grounded. Wu Earth people are the bedrock others lean on. They build slowly and surely, value loyalty above all, and possess a quiet confidence that does not need to announce itself."
  "6":
    stem: "己"
    element: "Earth"
    name: "Ji Earth"
    portrait: "Like fertile garden soil — nurturing, receptive, and endlessly giving. Ji Earth people cultivate growth in others. They are empathetic mediators who create spaces where things — and people — can take root and flourish."
  "7":
    stem: "庚"
    element: "Metal"
    name: "Geng Metal"
    portrait: "Like forged steel — decisive, disciplined, and unyielding when it matters. Geng Metal people cut through ambiguity with clarity. They respect structure and competence, and their word, once given, is a contract."
  "8":
    stem: "辛"
    element: "Metal"
    name: "Xin Metal"
    portrait: "Like fine jewelry — elegant, precise, and meticulously crafted. Xin Metal people have an eye for detail that borders on artistry. They hold themselves to high standards and gravitate toward beauty, refinement, and things done properly."
  "9":
    stem: "壬"
    element: "Water"
    name: "Ren Water"
    portrait: "Like the open ocean — expansive, visionary, and impossible to contain. Ren Water people think in horizons. They are intuitive strategists who flow around obstacles rather than breaking through them, yet their reach is vast."
  "10":
    stem: "癸"
    element: "Water"
    name: "Gui Water"
    portrait: "Like a deep still lake — mysterious, reflective, and profoundly intuitive. Gui Water people perceive what lies beneath the surface. They are quiet observers whose depth is easily underestimated, and their wisdom runs in undercurrents."

match_levels:
  "上等匹配":
    label: "Superior Match"
    desc: "The two charts show strong elemental harmony — stems combine and branches cooperate. The five elements complement each other naturally, creating a relationship where both parties feel supported and energized. This is a rare and auspicious alignment."
  "中等匹配":
    label: "Good Match"
    desc: "Good overall compatibility with meaningful points of connection. While not every dimension aligns perfectly, the core elements interact constructively. The relationship has a solid foundation and room to deepen over time."
  "一般":
    label: "Average"
    desc: "A mixed picture — some dimensions show harmony while others indicate friction. The relationship is workable but may require conscious effort to bridge differences. Not destined, but not doomed either."
  "不合":
    label: "Challenging"
    desc: "Significant elemental conflicts across multiple dimensions. The charts suggest fundamental differences in energetic makeup. This does not mean the relationship is impossible, only that it will demand unusual awareness, compromise, and growth from both parties."
