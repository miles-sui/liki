---
layout: base.njk
permalink: "/{{ site.locale }}/profile.html"
pageClass: profile-page
title: Profile
description: Five-element personality profile.
noindex: true
---
<div class="max-w-5xl mx-auto px-6 lg:px-14 py-10 lg:py-14" x-data="profilePage()" x-init="init()">

  {% include "loading-spinner.njk" %}

  <!-- 404: profile not found / private -->
  <template x-if="!loading && !profile">
    {% set title = "$store.locale.t('profile.notFound')" %}{% set ctaText = "$store.locale.t('reviewLanding.goHome')" %}{% set ctaLink = "/" + site.locale + "/" %}{% set ctaClass = "btn-outline" %}{% include "empty-state.njk" %}
  </template>

  <!-- No data at all -->
  <template x-if="!loading && profile && !profile.profile && !profile.mingli_chart">
    <div>
      <div class="text-center py-12">
        <h2 class="text-xl font-bold mb-2" x-text="profile.user.name"></h2>
        <p class="text-base-content/60 mb-6" x-text="!isOwner ? $store.locale.t('profile.noAssessment') : ''"></p>
        <template x-if="isOwner">
          <a href="/{{ site.locale }}/assess" class="btn btn-primary" x-text="$store.locale.t('profile.startAssess')">Start Assessment</a>
        </template>
      </div>

      <!-- Owner: BaZi form directly available -->
      <template x-if="isOwner">
        <div class="border-t-2 border-base-300 pt-10 mt-10 max-w-lg mx-auto">
          {% set title = "$store.locale.t('profile.sectionMingli')" %}
          {% set desc = "$store.locale.t('profile.mingli.baziDesc')" %}
          {% include "section-header.njk" %}

          <!-- Form -->
          <template x-if="!chart && !editing">
            <div class="card bg-base-200 shadow-lg">
              <div class="card-body">
                {% include "birth-form.njk" %}
                <div class="card-actions justify-end mt-4">
                  <button class="btn btn-primary" @click="computeAndSave()" :disabled="baziLoading" x-text="baziLoading ? '...' : $store.locale.t('profile.mingli.baziComputeAndSave')">Compute & Save</button>
                </div>
              </div>
            </div>
          </template>

          <!-- Chart result -->
          <template x-if="chart && !editing">
            <div>
              {% include "mingli-chart-card.njk" %}
              <div class="flex gap-2 mt-6">
                <button class="btn btn-outline btn-sm flex-1" @click="startEdit()" x-text="$store.locale.t('profile.mingli.baziEdit')">Edit Birth Info</button>
                <a href="/{{ site.locale }}/hehun" class="btn btn-outline btn-sm flex-1" x-text="$store.locale.t('profile.mingli.baziMatchCta')">Compare charts</a>
              </div>
            </div>
          </template>

          <!-- Editing -->
          <template x-if="editing">
            <div class="card bg-base-200 shadow-lg">
              <div class="card-body">
                <h3 class="font-semibold mb-4" x-text="$store.locale.t('profile.mingli.baziEdit')">Edit Birth Info</h3>
                {% include "birth-form.njk" %}
                <div class="card-actions justify-end mt-4 gap-2">
                  <button class="btn btn-ghost" @click="cancelEdit()" x-text="$store.locale.t('profile.mingli.baziCancel')">Cancel</button>
                  <button class="btn btn-primary" @click="computeAndSave()" :disabled="baziLoading" x-text="baziLoading ? '...' : $store.locale.t('profile.mingli.baziComputeAndSave')">Compute & Save</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Error -->
      <template x-if="baziError">
        <div class="alert alert-error mt-4"><span x-text="baziError"></span></div>
      </template>
    </div>
  </template>

  <!-- BaZi only (no 25types profile, but has birth info) -->
  <template x-if="!loading && profile && !profile.profile && profile.mingli_chart">
    <div>
      {% set sectionTitle = "$store.locale.t('profile.sectionMingli')" %}
      <h2 class="text-sm font-semibold text-base-content/30 uppercase tracking-wider text-center mb-6" x-text="{{ sectionTitle }}">BaZi Destiny</h2>
      {% include "mingli-chart-card.njk" %}
      <div class="text-center mt-8 space-y-4" x-show="isOwner">
        <a href="/{{ site.locale }}/assess" class="btn btn-outline" x-text="$store.locale.t('profile.startAssess')">Start Assessment</a>
        <!-- Mingli chart match link management -->
        <div>
          <button class="btn btn-outline btn-sm" @click="createMingliMatchLink" x-text="$store.locale.t('profile.createMingliMatch')">Create BaZi Match Link</button>
          <div class="mt-2 space-y-1 text-left" x-show="baziMatchLinks.length > 0">
            <template x-for="link in baziMatchLinks" :key="link.id">
              <div class="flex items-center gap-2 text-sm bg-base-100 rounded-lg p-2">
                <span class="text-base-content/60" x-text="$store.locale.t('profile.mingliMatchLink')">BaZi Match</span>
                <span class="flex-1"></span>
                <button class="btn btn-ghost btn-xs shrink-0" @click="copyText(origin + '/{{ site.locale }}/b/' + link.token)">&#128279;</button>
                <button class="btn btn-ghost btn-xs text-error shrink-0" @click="deleteMingliMatchLink(link.id)" x-text="$store.locale.t('delete')">Delete</button>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Profile with data -->
  <template x-if="!loading && profile && profile.profile">
  <div>

    <!-- ═══════ 25types Section ═══════ -->
    {% set sectionTitle = "$store.locale.t('profile.section25types')" %}
    <h2 class="text-sm font-semibold text-base-content/30 uppercase tracking-wider text-center mb-6" x-text="{{ sectionTitle }}">25types Personality</h2>

    <!-- ═══════ Row 1: Profile Card + Current Flow ═══════ -->
    <div class="mb-10">
      <div :class="flowMonth ? 'grid grid-cols-1 lg:grid-cols-2 gap-8' : ''">
        <!-- Left: Profile Card -->
        <div class="flex flex-col">
          <div class="flex justify-center mb-2" x-show="isOwner && $store.auth.isSupporter">
            <span class="badge badge-accent" x-text="$store.locale.t('donate.supporterBadge')">Supporter</span>
          </div>
          {% set title = "$store.locale.t('profile.yourType')" %}{% set desc = "$store.locale.t('profile.yourTypeDesc')" %}{% include "section-header.njk" %}
          <div class="flex-1">
            {% set radarId = 'profile-radar' %}{% set radarSize = '280px' %}{% set badge = 'identity.category' %}{% set label = 'identity.label' %}{% set idText = 'identity.id' %}{% set desc = "typeDesc(identity.id)" %}{% include "profile-card.njk" %}
          </div>
          <!-- Owner primary actions -->
          <div class="mt-4 flex justify-center gap-2" x-show="isOwner">
            <button class="btn btn-outline btn-sm" @click="shareProfile" x-text="$store.locale.t('profile.shareProfile')">Share Profile</button>
            <button class="btn btn-outline btn-sm" @click="generateShareCard" x-text="$store.locale.t('profile.shareCard')">Share Card</button>
            <a href="/{{ site.locale }}/assess" class="btn btn-outline btn-sm" x-text="$store.locale.t('profile.reassess')">Re-assess</a>
          </div>
          <!-- Visitor primary actions -->
          <div class="mt-4 flex flex-wrap justify-center gap-3" x-show="!isOwner">
            <template x-if="auth.id && hasMyProfile">
              <button class="btn btn-primary" @click="compareWithMe" x-text="$store.locale.t('profile.compareWithMe')">Compare with Me</button>
            </template>
            <template x-if="!auth.id">
              <a href="/{{ site.locale }}/assess" class="btn btn-primary" x-text="$store.locale.t('profile.discoverYourType')">Discover Your Type</a>
            </template>
            <template x-if="auth.id && !hasMyProfile">
              <a href="/{{ site.locale }}/assess" class="btn btn-outline" x-text="$store.locale.t('profile.discoverYourType')">Discover Your Type</a>
            </template>
            <template x-if="auth.id && targetReviewToken">
              <a :href="'/' + currentLocale + '/r/' + targetReviewToken" class="btn btn-outline" x-text="$store.locale.t('profile.describeThem')">Describe Them</a>
            </template>
          </div>
        </div>

        <!-- Right: Current Flow -->
        <div x-show="flowMonth" class="flex flex-col">
          {% set flowMargin = '' %}{% set desc = "$store.locale.t('profile.flowDesc')" %}{% set showCond = '' %}{% set title = "$store.locale.t('profile.currentFlow')" %}{% set chartId = 'flow-mini-radar' %}{% set flowChartCls = 'chart-h-280' %}{% set deltaItems = 'flowDeltas' %}{% set flowClass = 'flex-1 flex flex-col' %}{% set flowCardClass = 'flex-1' %}{% include "flow-section.njk" %}
          <p class="text-xs text-base-content/40 text-center mt-2" x-text="$store.locale.t('flow.explanation')">Seasonal energy shifts your elemental balance.</p>
        </div>
      </div>
    </div>

    <!-- ═══════ Row 2: How Others See You + Bonds ═══════ -->
    <div class="border-t border-base-300 pt-10 mt-10">
      <div :class="isOwner ? 'grid grid-cols-1 lg:grid-cols-2 gap-8' : ''">
        <!-- Left: Peer View -->
        <div>
          <h3 class="text-xl font-bold text-center mb-2">
            <span x-text="$store.locale.t('profile.peerView')">How Others See You</span>
            <template x-if="hasPeers"><span class="badge badge-sm ml-2" x-text="profile.peers.count"></span></template>
          </h3>
          <p class="text-sm text-base-content/50 text-center mb-6 max-w-lg mx-auto" x-text="$store.locale.t('profile.peerDesc')"></p>

          <div x-show="hasPeers">
            <div class="card bg-base-200 shadow-sm">
              <div class="card-body items-center text-center p-5">
                {% set chartId = 'peers-radar' %}{% set badge = 'identity.category' %}{% set label = 'identity.label' %}{% set idText = 'identity.id' %}{% set selfP = 'pValues' %}{% set peerP = 'peerPValues' %}{% include "peer-section.njk" %}
              </div>
            </div>
          </div>
          <div class="text-center" x-show="isOwner && !hasPeers">
            <p class="text-base-content/50 text-sm" x-text="$store.locale.t('profile.noPeersHint')">No peer reviews yet.</p>
          </div>

          <!-- Review link management (owner only) -->
          <div class="mt-4 text-center" x-show="isOwner">
            <button class="btn btn-outline btn-sm" @click="createReviewLink" x-text="$store.locale.t('profile.createReview')">Create Review Link</button>
            <div class="mt-2 space-y-1 text-left" x-show="reviewLinks.length > 0">
              <template x-for="link in reviewLinks" :key="link.id">
                <div class="flex items-center gap-2 text-sm bg-base-100 rounded-lg p-2">
                  <span class="text-base-content/60" x-text="$store.locale.t('profile.reviewLink')">Review</span>
                  <span class="flex-1"></span>
                  <button class="btn btn-ghost btn-xs shrink-0" @click="copyText(origin + '/{{ site.locale }}/r/' + link.token)">&#128279;</button>
                  <button class="btn btn-ghost btn-xs text-error shrink-0" @click="deleteReviewLink(link.id)" x-text="$store.locale.t('delete')">Delete</button>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Right: Bonds (owner only) -->
        <div x-show="isOwner">
          {% set title = "$store.locale.t('profile.myBonds')" %}{% set desc = "$store.locale.t('profile.bondDesc')" %}{% include "section-header.njk" %}

          <div class="text-center mb-4" x-show="hasBonds">
            <a href="/app#bonds" class="btn btn-outline btn-sm" x-text="$store.locale.t('bondGallery.viewAll')">View All Bonds</a>
          </div>

          <!-- Latest bond radar -->
          <template x-if="hasLatestBond">
            <div class="mb-6">
              <h4 class="text-sm font-semibold text-base-content/60 mb-2" x-text="$store.locale.t('profile.latestBond')">Latest Bond</h4>
              <p class="text-sm text-base-content/50 mb-3">
                <span x-text="$store.locale.t('profile.bondWith') + ': '"></span>
                <span class="font-medium" x-text="latestBond.other_name || '—'"></span>
                <span class="mx-2">·</span>
                <span x-text="fmtDate(latestBond.created_at)"></span>
              </p>
              {% set gridClass = 'max-w-3xl' %}{% set badgeA = 'bondA.category' %}{% set labelA = 'bondA.label' %}{% set idTextA = 'bondA.id' %}{% set chartIdA = 'latest-bond-self' %}{% set influencerA = 'bondInfluencerA' %}{% set deltaA = 'bondDeltasA' %}{% set badgeB = 'bondB.category' %}{% set labelB = 'bondB.label' %}{% set idTextB = 'bondB.id' %}{% set chartIdB = 'latest-bond-other' %}{% set influencerB = 'bondInfluencerB' %}{% set deltaB = 'bondDeltasB' %}{% set concord = 'concordLabel' %}{% set concordBadgeClass = 'concordBadgeClass' %}{% set concordDesc = 'concordDesc' %}{% include "bond-pair.njk" %}
            </div>
          </template>

          <div class="text-center" x-show="!hasBonds">
            <p class="text-base-content/50 text-sm" x-text="$store.locale.t('profile.noBondsHint')">No bonds yet.</p>
          </div>

          <!-- Match link management (owner only) -->
          <div class="mt-4 text-center">
            <button class="btn btn-outline btn-sm" @click="createMatchLink" x-text="$store.locale.t('profile.createMatch')">Create Match Link</button>
            <div class="mt-2 space-y-1 text-left" x-show="matchLinks.length > 0">
              <template x-for="link in matchLinks" :key="link.id">
                <div class="flex items-center gap-2 text-sm bg-base-100 rounded-lg p-2">
                  <span class="text-base-content/60" x-text="$store.locale.t('profile.matchLink')">Match</span>
                  <span class="flex-1"></span>
                  <button class="btn btn-ghost btn-xs shrink-0" @click="copyText(origin + '/{{ site.locale }}/m/' + link.token)">&#128279;</button>
                  <button class="btn btn-ghost btn-xs text-error shrink-0" @click="deleteMatchLink(link.id)" x-text="$store.locale.t('delete')">Delete</button>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Bond Dynamics (compare cards) — visible to both owner and visitors -->
        <template x-if="showBond">
        <div class="mt-8">
          {% set title = "$store.locale.t('bond.title')" %}{% set desc = "$store.locale.t('bond.subtitle')" %}{% include "section-header.njk" %}
          {% set gridClass = 'max-w-3xl mx-auto' %}{% set badgeA = 'bondA.category' %}{% set labelA = 'bondA.label' %}{% set idTextA = 'bondA.id' %}{% set chartIdA = 'bond-influence-self' %}{% set influencerA = 'bondInfluencerA' %}{% set deltaA = 'bondDeltasA' %}{% set badgeB = 'bondB.category' %}{% set labelB = 'bondB.label' %}{% set idTextB = 'bondB.id' %}{% set chartIdB = 'bond-influence-other' %}{% set influencerB = 'bondInfluencerB' %}{% set deltaB = 'bondDeltasB' %}{% set concord = 'concordLabel' %}{% set concordBadgeClass = 'concordBadgeClass' %}{% set concordDesc = 'concordDesc' %}{% include "bond-pair.njk" %}
        </div>
        </template>
      </div>
    </div>

    <!-- ═══════ Row 3: Assessment History (owner only, needs 2+) ═══════ -->
    <div class="border-t border-base-300 pt-10 mt-10" x-show="isOwner && hasHistory">
      {% set hsBadges %}
        <template x-for="a in [...history].reverse()" :key="a.id">
          <span class="badge badge-sm" x-text="a.identity ? a.identity.label : '—'"></span>
        </template>
      {% endset %}
      {% set mt = 'mt-0' %}{% set desc = "$store.locale.t('profile.historyDesc')" %}{% set showCond = '' %}{% set title = "$store.locale.t('profile.history')" %}{% set chartId = 'history-chart' %}{% set badges = hsBadges %}{% include "history-section.njk" %}
    </div>

    <!-- ═══════ Row 4: Element River ═══════ -->
    <div class="border-t border-base-300 pt-10 mt-10" x-show="hasFlowRiver">
      {% set mt = 'mt-0' %}{% set desc = "$store.locale.t('profile.elementRiverDesc')" %}{% set showCond = '' %}{% set title = "$store.locale.t('result.elementRiver')" %}{% set chartId = 'flow-river-chart' %}{% include "history-section.njk" %}
    </div>

    <!-- ═══════ Row 5: BaZi Chart ═══════ -->
    <div class="border-t-2 border-base-300 pt-10 mt-10">

      <!-- Section header -->
      {% set title = "$store.locale.t('profile.sectionMingli')" %}
      {% set desc = "$store.locale.t('profile.mingli.baziDesc')" %}
      {% include "section-header.njk" %}

      <!-- Owner: no chart, not editing → show form -->
      <template x-if="isOwner && !chart && !editing">
        <div class="card bg-base-200 shadow-lg">
          <div class="card-body">
            <h3 class="font-semibold mb-4" x-text="$store.locale.t('mingli.bazi.title')">Four Pillars</h3>
            {% include "birth-form.njk" %}
            <div class="card-actions justify-end mt-4">
              <button class="btn btn-primary" @click="computeAndSave()" :disabled="baziLoading" x-text="baziLoading ? '...' : $store.locale.t('profile.mingli.baziComputeAndSave')">Compute & Save</button>
            </div>
          </div>
        </div>
      </template>

      <!-- Error -->
      <template x-if="baziError">
        <div class="alert alert-error mb-6"><span x-text="baziError"></span></div>
      </template>

      <!-- Has chart (owner or visitor) → show chart card -->
      <template x-if="chart && !editing">
        <div>
          <!-- Birth info summary -->
          <div class="flex flex-wrap items-center gap-x-6 gap-y-1 text-sm text-base-content/60 mb-4">
            <span>
              <span class="font-medium text-base-content/80" x-text="$store.locale.t('mingli.bazi.datetime')">Date & Time</span>
              <span class="mx-1" x-text="birthDate + ' ' + birthTime"></span>
            </span>
            <span>
              <span class="font-medium text-base-content/80" x-text="$store.locale.t('mingli.bazi.solarTime')">Solar Time</span>
              <span class="mx-1" x-text="fmtSolarTime(chart.solar_time)"></span>
            </span>
          </div>
          {% include "mingli-chart-card.njk" %}
          <!-- Edit + Compare actions (owner only) -->
          <div class="flex gap-2 mt-6" x-show="isOwner">
            <button class="btn btn-outline btn-sm flex-1" @click="startEdit()" x-text="$store.locale.t('profile.mingli.baziEdit')">Edit Birth Info</button>
            <a href="/{{ site.locale }}/hehun" class="btn btn-outline btn-sm flex-1" x-text="$store.locale.t('profile.mingli.baziMatchCta')">Compare charts</a>
          </div>
          <!-- BaZi match link management (owner only) -->
          <div class="mt-4 text-center" x-show="isOwner">
            <button class="btn btn-outline btn-sm" @click="createMingliMatchLink" x-text="$store.locale.t('profile.createMingliMatch')">Create BaZi Match Link</button>
            <div class="mt-2 space-y-1 text-left" x-show="baziMatchLinks.length > 0">
              <template x-for="link in baziMatchLinks" :key="link.id">
                <div class="flex items-center gap-2 text-sm bg-base-100 rounded-lg p-2">
                  <span class="text-base-content/60" x-text="$store.locale.t('profile.mingliMatchLink')">BaZi Match</span>
                  <span class="flex-1"></span>
                  <button class="btn btn-ghost btn-xs shrink-0" @click="copyText(origin + '/{{ site.locale }}/b/' + link.token)">&#128279;</button>
                  <button class="btn btn-ghost btn-xs text-error shrink-0" @click="deleteMingliMatchLink(link.id)" x-text="$store.locale.t('delete')">Delete</button>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Owner: editing → show form pre-filled -->
      <template x-if="isOwner && editing">
        <div class="card bg-base-200 shadow-lg">
          <div class="card-body">
            <h3 class="font-semibold mb-4" x-text="$store.locale.t('profile.mingli.baziEdit')">Edit Birth Info</h3>
            {% include "birth-form.njk" %}
            <div class="card-actions justify-end mt-4 gap-2">
              <button class="btn btn-ghost" @click="cancelEdit()" x-text="$store.locale.t('profile.mingli.baziCancel')">Cancel</button>
              <button class="btn btn-primary" @click="computeAndSave()" :disabled="baziLoading" x-text="baziLoading ? '...' : $store.locale.t('profile.mingli.baziComputeAndSave')">Compute & Save</button>
            </div>
          </div>
        </div>
      </template>

      <!-- Visitor: no chart (empty state) -->
      <template x-if="!isOwner && !chart">
        <div class="text-center py-6">
          <p class="text-sm text-base-content/40" x-text="$store.locale.t('profile.mingli.baziEmpty')">No birth info.</p>
        </div>
      </template>

    </div>

    <!-- ═══════ Bottom CTA (visitor) ═══════ -->
    <div class="mt-14" x-show="!isOwner && !auth.id">
      {% set link = "/" + site.locale + "/assess" %}{% set cta = "$store.locale.t('home.cta')" %}{% set guarantee = "$store.locale.t('home.guarantee')" %}{% include "cta-banner.njk" %}
    </div>

  </div>
  </template>
</div>

{% block pageScripts %}
<script src="/js/vendor/lunar.js"></script>
<script src="/js/mingli.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/profile.js"></script>
{% endblock %}
