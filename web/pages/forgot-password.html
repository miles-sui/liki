---
layout: base.njk
title: Forgot Password
description: Reset your 25 Types account password.
---
<div class="max-w-md mx-auto px-6 py-20" x-data="forgotPasswordPage()">
  <h1 class="text-2xl font-bold text-center mb-8" x-text="$store.locale.t('forgot.title')">Reset Password</h1>
  <template x-if="!sent">{% include "form-start.njk" %}
    <p class="text-base text-base-content/60" x-text="$store.locale.t('forgot.subtitle')">Enter your verified email and we'll send a reset link.</p>
    <input type="email" x-model="email" class="input input-bordered w-full" required :placeholder="$store.locale.t('forgot.email')">
    {% set labelKey = 'forgot.submit' %}{% include "submit-button.njk" %}
{% include "form-end.njk" %}</template>
  <template x-if="sent"><div class="text-center py-10"><div class="text-3xl mb-4">&#9993;</div><p class="text-base-content/60" x-text="$store.locale.t('forgot.sentMsg')">If that email is registered, you'll receive a reset link shortly.</p></div></template>
</div>
{% block pageScripts %}
<script src="/js/forgot-password.js"></script>
{% endblock %}
