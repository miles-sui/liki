---
layout: base.njk
permalink: "/{{ site.locale }}/donate.html"
pageClass: donate-page
title: Donate
description: Support 25types with a donation.
---
<div class="max-w-3xl mx-auto px-6 lg:px-14 py-10 lg:py-14" x-data="donatePage()" x-init="init()">

  {% include "loading-spinner.njk" %}

  <!-- Payment success — Dodo return -->
  <template x-if="!loading && paymentStatus === 'succeeded'">
    <div class="text-center py-20">
      <div class="text-5xl mb-6">🎁</div>
      <h2 class="text-3xl font-bold mb-4" x-text="$store.locale.t('donate.thankYouTitle')">Thank you for your support!</h2>
      <p class="text-base-content/60 mb-2" x-text="$store.locale.t('donate.thankYouDesc')">Your donation helps keep 25types free and open to everyone.</p>
      <p class="text-sm text-base-content/40" x-show="paymentEmail">Payment email: <span x-text="paymentEmail" class="font-medium"></span></p>
      <div class="mt-8">
        <a href="/{{ site.locale }}/" class="btn btn-primary" x-text="$store.locale.t('reviewLanding.goHome')">Go Home</a>
      </div>
    </div>
  </template>

  <!-- Payment failed -->
  <template x-if="!loading && paymentStatus === 'failed'">
    <div class="text-center py-20">
      <h2 class="text-2xl font-bold mb-4">Oops</h2>
      <p class="text-base-content/60 mb-8" x-text="$store.locale.t('donate.paymentFailed')">Something went wrong with your donation.</p>
      <a href="/{{ site.locale }}/donate" class="btn btn-primary" x-text="$store.locale.t('donate.cta')">Try Again</a>
    </div>
  </template>

  <!-- Not logged in and no return-from-Dodo -->
  <template x-if="!loading && paymentStatus === '' && !auth.id">
    <div class="text-center py-20">
      <h2 class="text-2xl font-bold mb-4" x-text="$store.locale.t('donate.title')">Support 25types</h2>
      <p class="text-base-content/60 mb-8 max-w-md mx-auto" x-text="$store.locale.t('donate.loginPrompt')">Log in to make a donation.</p>
      <a href="/{{ site.locale }}/login" class="btn btn-primary" x-text="$store.locale.t('nav.login')">Login</a>
    </div>
  </template>

  <!-- Logged in — donation UI -->
  <template x-if="!loading && paymentStatus === '' && auth.id">
  <div>
    <div class="text-center mb-10">
      <h2 class="text-2xl font-bold mb-3" x-text="$store.locale.t('donate.title')">Support 25types</h2>
      <p class="text-base-content/60 max-w-lg mx-auto" x-text="$store.locale.t('donate.subtitle')">Choose an amount to donate. Your support helps us keep 25types free and open to everyone.</p>
    </div>

    <!-- Tier selector -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <template x-for="tier in tiers" :key="tier.amount">
        <div class="card cursor-pointer transition-all duration-200 hover:shadow-md"
             :class="selectedAmount === tier.amount ? 'bg-primary/10 border-2 border-primary shadow-md' : 'bg-base-200 border-2 border-base-300'"
             @click="selectTier(tier.amount)">
          <div class="card-body items-center text-center p-6">
            <div class="text-3xl font-bold mb-2" x-text="tier.label"></div>
            <div class="text-sm text-base-content/60" x-text="$store.locale.t(tier.key)"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Donate button -->
    <div class="text-center">
      <button class="btn btn-primary btn-lg px-12" :disabled="submitting" @click="donate()">
        <span x-show="!submitting" x-text="$store.locale.t('donate.cta')">Donate</span>
        <span x-show="submitting" class="loading loading-spinner loading-sm"></span>
      </button>
      <p class="text-xs text-base-content/40 mt-3" x-text="$store.locale.t('donate.secure')">Secure payment via Dodo Payments</p>
    </div>

    <!-- Thank-you note -->
    <div class="mt-10 text-center text-sm text-base-content/50">
      <p x-text="$store.locale.t('donate.thankYouNote')">Every donation, no matter the amount, makes a difference. Thank you for your support!</p>
    </div>
  </div>
  </template>
</div>

{% block pageScripts %}
<script>
function donatePage() {
  return {
    loading: true,
    selectedAmount: 1990,
    submitting: false,
    paymentStatus: '',
    paymentEmail: '',

    get auth() { return Alpine.store('auth'); },

    init() {
      var params = new URLSearchParams(window.location.search);
      var status = params.get('status') || '';
      if (status === 'succeeded' || status === 'failed') {
        this.paymentStatus = status;
        this.paymentEmail = params.get('email') || '';
        // Confirm payment with backend (calls Dodo API to verify), then refresh.
        if (status === 'succeeded' && this.auth.id) {
          var self = this;
          var paymentId = params.get('payment_id') || '';
          var confirmAndRefresh = function () {
            var p = paymentId ? api('/api/payments/confirm', {
              method: 'POST',
              body: JSON.stringify({ payment_id: paymentId }),
              quiet: true,
            }).then(function (res) {
              return res && res.data && res.data.confirmed;
            }).catch(function () { return false; }) : Promise.resolve(false);
            p.then(function (confirmed) {
              return self.auth.fetchMe().then(function () {
                if (!self.auth.isSupporter && !confirmed) {
                  // Webhook might still be processing — poll a few times.
                  var attempts = 0;
                  var poll = function () {
                    if (self.auth.isSupporter || attempts >= 5) return;
                    attempts++;
                    setTimeout(function () {
                      self.auth.fetchMe().then(function () {
                        if (!self.auth.isSupporter && attempts < 5) poll();
                      });
                    }, 2000);
                  };
                  poll();
                }
              });
            });
          };
          confirmAndRefresh();
        }
        // Clean URL params without reload
        if (window.history && window.history.replaceState) {
          window.history.replaceState({}, '', window.location.pathname);
        }
      }
      this.loading = false;
    },

    get tiers() {
      return [
        { amount: 990, label: '$9.90', key: 'donate.tier1' },
        { amount: 1990, label: '$19.90', key: 'donate.tier2' },
        { amount: 2990, label: '$29.90', key: 'donate.tier3' },
      ];
    },

    selectTier(amount) {
      this.selectedAmount = amount;
    },

    async donate() {
      if (this.submitting) return;
      this.submitting = true;
      try {
        var resp = await api('/api/payments/checkout', {
          method: 'POST',
          body: JSON.stringify({ amount: this.selectedAmount }),
        });
        if (resp.data && resp.data.url) {
          window.location.href = resp.data.url;
        }
      } catch (e) {
        console.error(e);
      } finally {
        this.submitting = false;
      }
    },
  };
}
</script>
{% endblock %}
