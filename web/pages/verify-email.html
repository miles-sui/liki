---
layout: base.njk
title: Verify Email
description: Verify your email address for your 25 Types account.
---
<div class="max-w-md mx-auto px-6 py-20 text-center" x-data="verifyPage()" x-init="verify()">
  <h1 class="text-2xl font-bold mb-8" x-text="$store.locale.t('verify.title')">Email Verification</h1>
  <template x-if="loading"><span class="loading loading-spinner loading-lg text-primary"></span></template>
  <template x-if="!loading && ok"><div><div class="text-4xl mb-4">&#10003;</div><p class="mb-6" x-text="$store.locale.t('verify.success')">Email verified successfully.</p><a href="/{{ site.locale }}/settings" class="btn btn-primary" x-text="$store.locale.t('verify.goProfile')">Go to Profile</a></div></template>
  <template x-if="!loading && !ok"><div><p class="text-error mb-6" x-text="$store.locale.t('verify.invalid')">Invalid or expired token.</p><a href="/{{ site.locale }}/settings" class="btn btn-outline" x-text="$store.locale.t('verify.goProfile')">Go to Profile</a></div></template>
</div>
{% block pageScripts %}
<script src="/js/verify-email.js"></script>
{% endblock %}
