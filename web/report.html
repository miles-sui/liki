<!DOCTYPE html>
<html lang="zh-Hant" data-i18n-title="report.title.default" data-i18n-title-suffix="site.name">
<head>
<meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" data-i18n-content="report.meta.ogDesc" content="靈機（Liki）AI 起名顧問 | 起名報告。">
<meta property="og:title" data-i18n-content="report.meta.ogTitle" content="起名報告 · 靈機 Liki">
<meta property="og:description" data-i18n-content="report.meta.ogDesc" content="靈機（Liki）AI 起名顧問 | 起名報告。">
<meta property="og:type" content="website">
	<meta property="og:url" id="og-url" content="https://liki.hk/report.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" data-i18n-content="report.meta.twitterTitle" content="起名報告 · 靈機 Liki">
<meta name="twitter:description" data-i18n-content="report.meta.twitterDesc" content="靈機（Liki）AI 起名顧問 | 起名報告。">
	<meta property="og:image" content="https://liki.hk/img/og-image.png">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height" content="630">
	<meta name="twitter:image" content="https://liki.hk/img/og-image.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://liki.hk/zh-Hant/report.html">
<title>起名報告 · 靈機 Liki</title>
<script defer src="/js/marked.min.js"></script>
<script defer src="/js/purify.min.js"></script>
<script defer src="/js/api.js"></script>
    <script defer src="/js/payment.js"></script>
<script type="module" src="/js/report.js"></script>
<link rel="stylesheet" href="/css/app.css">
<script src="/js/common.js"></script>
</head>
<body class="bg-stone-50 min-h-screen">

<a href="#main" class="skip-link" data-i18n="a11y.skipLink">跳到主要內容</a>

<!-- Save banner -->
<div id="report-banner" style="display:none">
<div class="save-banner">
  <div class="max-w-4xl mx-auto px-4 py-2 flex items-center justify-between">
    <span class="text-sm text-amber-800" data-i18n="report.banner.text">🔗 這是您的專屬報告鏈接，建議收藏或複製保存。</span>
    <div class="flex gap-2">
      <button id="banner-copy-btn" class="btn-sm bg-white border border-amber-200 text-amber-700 hover:bg-amber-50 rounded"><span id="banner-copy-text" data-i18n="report.copyLink">複製鏈接</span></button>
      <button id="banner-close-btn" class="btn-sm text-amber-500 hover:text-amber-700">×</button>
    </div>
  </div>
</div>
</div>

<liki-header title="起名報告"></liki-header>

<main id="main" class="max-w-4xl mx-auto px-4 py-8">

  <!-- Transition overlay -->
  <div id="transition-overlay" class="transition-overlay" style="display:none">
    <div class="seal-transition">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36" fill="none" stroke="var(--stone-200)" stroke-width="2"/>
        <circle cx="40" cy="40" r="36" fill="none" stroke="var(--amber-600)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="226" stroke-dashoffset="226" class="seal-ring"/>
      </svg>
      <span class="seal-char">名</span>
    </div>
    <p id="transition-text" class="text-stone-600 mt-4 font-medium" data-i18n="report.transition.text">✓ 支付成功，正在爲您解鎖報告…</p>
  </div>

  <!-- Print cover -->
  <print-cover data-i18n-product="report.productName" product="八字起名報告"></print-cover>
    <div class="pc-date" id="print-date"></div>

  <!-- Status card container -->
  <div id="status-area"></div>

  <!-- Report content (shown when phase=ready) -->
  <div id="report-content" style="display:none">

    <print-brand></print-brand>

    <!-- === NAMING === -->
    <div id="naming-section" style="display:none">
      <div id="naming-summary"></div>
      <div id="naming-candidates"></div>
      <div class="section-card">
        <h2 data-i18n="report.section.naming">起名解讀</h2>
        <div class="report-content" id="naming-interpretation"></div>
      </div>
    </div>

    <print-bar variant="dynamic"></print-bar>

  </div>

</main>

<liki-footer></liki-footer>

</body>
</html>
